            "$project_api" --output "$RUNNER_TEMP/holding-emergency-project.json"
          EXPECTED_PROJECT_NAME="$expected_project_name" node -e '
            const { readFileSync } = require("node:fs");
            const project = JSON.parse(readFileSync(process.argv[1], "utf8"));
            const orgIds = [project.accountId, project.teamId].filter((value) => value !== undefined);
            if (project.id !== process.env.VERCEL_PROJECT_ID ||
                orgIds.length === 0 || orgIds.some((value) => value !== process.env.VERCEL_ORG_ID) ||
                (process.env.EXPECTED_PROJECT_NAME && project.name !== process.env.EXPECTED_PROJECT_NAME) ||
                project.paused !== true || project.autoAssignCustomDomains !== false) process.exit(1);
          ' "$RUNNER_TEMP/holding-emergency-project.json"
