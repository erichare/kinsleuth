name: Contain failed Kin Resolve public demo release
run-name: Contain public demo run ${{ github.event.workflow_run.id }} attempt ${{ github.event.workflow_run.run_attempt }}

on:
  workflow_run:
    workflows:
      - Release Kin Resolve public demo
    types:
      - completed

permissions:
  actions: read
  contents: read

concurrency:
  group: kinresolve-public-demo-release
  queue: max
  cancel-in-progress: false

jobs:
  authorize:
    name: Authorize the exact failed public demo release attempt
    if: >-
      github.event.workflow_run.conclusion == 'failure' ||
      github.event.workflow_run.conclusion == 'cancelled' ||
      github.event.workflow_run.conclusion == 'timed_out'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      action: ${{ steps.event.outputs.action }}
      authorized: ${{ steps.event.outputs.authorized }}
    steps:
      - name: Check out the trusted authorization gate from main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Node.js for the credential-free authorization gate
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Validate the exact failed public demo release event without protected credentials
        id: event
        env:
          ALLOWED_SOURCE_CONCLUSIONS: failure,cancelled,timed_out
          ALLOWED_SOURCE_EVENTS: workflow_dispatch
          DISPLAY_TITLE_TEMPLATES: >-
            [{"template":"Public demo {action} {head_sha} run {run_id} attempt {run_attempt}","captures":{"action":["release","rollback","contain"]}}]
          EXPECTED_SOURCE_WORKFLOW_NAME: Release Kin Resolve public demo
          EXPECTED_SOURCE_WORKFLOW_PATH: .github/workflows/public-demo-release.yml
          REQUIRED_HEAD_BRANCH: main
        run: node --experimental-strip-types scripts/authorize-workflow-run-source.mjs

      - name: Check out the exact failed public demo release revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify protected-main provenance without protected credentials
        env:
          SOURCE_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          git fetch origin main:refs/remotes/origin/main --force --no-tags
          test "$(git rev-parse --verify 'HEAD^{commit}')" = "$SOURCE_HEAD_SHA"
          git merge-base --is-ancestor "$SOURCE_HEAD_SHA" origin/main

  contain:
    name: Restore demo holding or fail-closed pause
    needs: authorize
    if: needs.authorize.result == 'success' && needs.authorize.outputs.authorized == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: demo-containment
    steps:
      - name: Check out the exact authorized public demo revision again
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up the pinned Node.js runtime
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Reverify protected-main provenance before containment
        env:
          SOURCE_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          git fetch origin main:refs/remotes/origin/main --force --no-tags
          test "$(git rev-parse --verify 'HEAD^{commit}')" = "$SOURCE_HEAD_SHA"
          git merge-base --is-ancestor "$SOURCE_HEAD_SHA" origin/main

      - name: Install the pinned Vercel CLI
        run: npm install --global --ignore-scripts vercel@56.1.0

      - name: Validate and link the isolated public demo project
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          EXPECTED_VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          EXPECTED_VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          MARKETING_VERCEL_PROJECT_ID: ${{ vars.MARKETING_VERCEL_PROJECT_ID }}
          PRODUCTION_VERCEL_PROJECT_ID: ${{ vars.PRODUCTION_VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          test "$APP_BASE_URL" = "https://demo.kinresolve.com"
          [[ "$EXPECTED_VERCEL_ORG_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          [[ "$EXPECTED_VERCEL_PROJECT_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          [[ "$MARKETING_VERCEL_PROJECT_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          [[ "$PRODUCTION_VERCEL_PROJECT_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          [[ "$VERCEL_ORG_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          [[ "$VERCEL_PROJECT_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          test "$VERCEL_ORG_ID" = "$EXPECTED_VERCEL_ORG_ID"
          test "$VERCEL_PROJECT_ID" = "$EXPECTED_VERCEL_PROJECT_ID"
          test "$VERCEL_PROJECT_ID" != "$PRODUCTION_VERCEL_PROJECT_ID"
          test "$VERCEL_PROJECT_ID" != "$MARKETING_VERCEL_PROJECT_ID"
          mkdir -p .vercel
          node -e '
            const { writeFileSync } = require("node:fs");
            writeFileSync(".vercel/project.json", JSON.stringify({
              orgId: process.env.VERCEL_ORG_ID,
              projectId: process.env.VERCEL_PROJECT_ID
            }) + "\n", { mode: 0o600 });
          '

      - name: Fetch and validate the pinned demo holding record
        id: holding-record
        continue-on-error: true
        env:
          APPROVED_HOLDING_DEPLOYMENT_ID: ${{ secrets.DEMO_HOLDING_DEPLOYMENT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          [[ "$APPROVED_HOLDING_DEPLOYMENT_ID" =~ ^dpl_[A-Za-z0-9]{8,96}$ ]]
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
            --fail --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v13/deployments/$APPROVED_HOLDING_DEPLOYMENT_ID$scope_query" \
            --output "$RUNNER_TEMP/public-demo-safety-holding-record.json"
          node --experimental-strip-types scripts/validate-vercel-deployment.mjs holding-record \
            "$RUNNER_TEMP/public-demo-safety-holding-record.json"

      - name: Restore the pinned demo holding deployment
        id: restore
        if: always() && steps.holding-record.outcome == 'success'
        continue-on-error: true
        timeout-minutes: 10
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          APPROVED_HOLDING_DEPLOYMENT_ID: ${{ secrets.DEMO_HOLDING_DEPLOYMENT_ID }}
          HOLDING_DEPLOYMENT_URL: ${{ steps.holding-record.outputs.deployment_url }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          deployment_host="${APP_BASE_URL#https://}"
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          holding_is_current() {
            local output_path="$1"
            rm -f "$output_path"
            curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
              --fail --silent --show-error --header "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
              --output "$output_path" \
            && env -u GITHUB_OUTPUT node --experimental-strip-types \
              scripts/validate-vercel-deployment.mjs holding \
              "$output_path" "$deployment_host" >/dev/null 2>&1
          }
          if holding_is_current "$RUNNER_TEMP/public-demo-safety-current-before.json"; then
            echo "The exact pinned holding deployment is already current."
            exit 0
          fi
          if vercel rollback "$HOLDING_DEPLOYMENT_URL" --yes --timeout=5m; then
            exit 0
          fi
          if holding_is_current "$RUNNER_TEMP/public-demo-safety-current-after.json"; then
            echo "The exact pinned holding deployment became current during restoration."
            exit 0
          fi
          exit 1

      - name: Repair and independently attest demo domain auto-assignment
        id: project-safety
        if: always() && steps.restore.outcome == 'success'
        continue-on-error: true
        env:
          EXPECTED_VERCEL_PROJECT_NAME: kinresolve-demo
          EXPECTED_VERCEL_PROJECT_PAUSED: "false"
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          project_api="https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID$scope_query"
          curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
            --fail --silent --show-error --request PATCH \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            --header "Content-Type: application/json" \
            --data '{"autoAssignCustomDomains":false}' \
            "$project_api" --output "$RUNNER_TEMP/public-demo-safety-project-patch.json"
          curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
            --fail --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "$project_api" --output "$RUNNER_TEMP/public-demo-safety-project.json"
          node --experimental-strip-types scripts/validate-vercel-project-safety.mjs \
            "$RUNNER_TEMP/public-demo-safety-project.json"

      - name: Restore and prove dedicated demo hostname ownership
        id: domain-ownership
        if: always() && steps.project-safety.outcome == 'success'
        continue-on-error: true
        timeout-minutes: 10
        env:
          DEMO_DOMAIN: demo.kinresolve.com
          EXPECTED_VERCEL_DOMAIN: demo.kinresolve.com
          MARKETING_VERCEL_PROJECT_ID: ${{ vars.MARKETING_VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          [[ "$MARKETING_VERCEL_PROJECT_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          [[ "$VERCEL_PROJECT_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          test "$MARKETING_VERCEL_PROJECT_ID" != "$VERCEL_PROJECT_ID"
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          destination_api="https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/domains/$DEMO_DOMAIN$scope_query"
          destination_status="$(curl --connect-timeout 10 --max-time 30 --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            --output "$RUNNER_TEMP/public-demo-safety-domain-before.json" \
            --write-out '%{http_code}' "$destination_api")"
          if test "$destination_status" = "200"; then
            node --experimental-strip-types scripts/validate-vercel-project-domain.mjs \
              "$RUNNER_TEMP/public-demo-safety-domain-before.json"
          else
            test "$destination_status" = "404"
            curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
              --fail --silent --show-error --header "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v9/projects/$MARKETING_VERCEL_PROJECT_ID/domains/$DEMO_DOMAIN$scope_query" \
              --output "$RUNNER_TEMP/public-demo-safety-marketing-domain-before.json"
            VERCEL_PROJECT_ID="$MARKETING_VERCEL_PROJECT_ID" \
              node --experimental-strip-types scripts/validate-vercel-project-domain.mjs \
                "$RUNNER_TEMP/public-demo-safety-marketing-domain-before.json"
            node -e '
              const { writeFileSync } = require("node:fs");
              writeFileSync(process.env.RUNNER_TEMP + "/public-demo-safety-domain-move.json", JSON.stringify({
                "projectId": process.env.VERCEL_PROJECT_ID
              }) + "\n", { mode: 0o600 });
            '
            curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
              --fail --silent --show-error --request POST \
              --header "Authorization: Bearer $VERCEL_TOKEN" \
              --header "Content-Type: application/json" \
              --data-binary "@$RUNNER_TEMP/public-demo-safety-domain-move.json" \
              "https://api.vercel.com/v1/projects/$MARKETING_VERCEL_PROJECT_ID/domains/$DEMO_DOMAIN/move$scope_query" \
              --output "$RUNNER_TEMP/public-demo-safety-domain-moved.json"
            node --experimental-strip-types scripts/validate-vercel-project-domain.mjs \
              "$RUNNER_TEMP/public-demo-safety-domain-moved.json"
          fi
          curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
            --fail --silent --show-error --header "Authorization: Bearer $VERCEL_TOKEN" \
            "$destination_api" --output "$RUNNER_TEMP/public-demo-safety-domain-after.json"
          node --experimental-strip-types scripts/validate-vercel-project-domain.mjs \
            "$RUNNER_TEMP/public-demo-safety-domain-after.json"
          marketing_status="$(curl --connect-timeout 10 --max-time 30 --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            --output "$RUNNER_TEMP/public-demo-safety-marketing-domain-after.json" \
            --write-out '%{http_code}' \
            "https://api.vercel.com/v9/projects/$MARKETING_VERCEL_PROJECT_ID/domains/$DEMO_DOMAIN$scope_query")"
          test "$marketing_status" = "404"

      - name: Prove the canonical demo holding restoration
        id: holding-proof
        if: >-
          always() &&
          steps.holding-record.outcome == 'success' &&
          steps.restore.outcome == 'success' &&
          steps.project-safety.outcome == 'success' &&
          steps.domain-ownership.outcome == 'success'
        continue-on-error: true
        timeout-minutes: 10
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          APPROVED_HOLDING_DEPLOYMENT_ID: ${{ secrets.DEMO_HOLDING_DEPLOYMENT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          deployment_host="${APP_BASE_URL#https://}"
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          canonical_ready="false"
          for attempt in $(seq 1 20); do
            rm -f "$RUNNER_TEMP/public-demo-safety-canonical.json"
            if curl --connect-timeout 10 --max-time 30 --fail --silent --show-error \
                --header "Authorization: Bearer $VERCEL_TOKEN" \
                "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
                --output "$RUNNER_TEMP/public-demo-safety-canonical.json" \
              && env -u GITHUB_OUTPUT node --experimental-strip-types \
                 scripts/validate-vercel-deployment.mjs holding \
                 "$RUNNER_TEMP/public-demo-safety-canonical.json" \
                 "${APP_BASE_URL#https://}" >/dev/null 2>&1; then
              canonical_ready="true"
              break
            fi
            if [[ "$attempt" = 20 ]]; then exit 1; fi
            sleep 3
          done
          test "$canonical_ready" = "true"
          for attempt in $(seq 1 20); do
            status="$(curl --connect-timeout 10 --max-time 30 --silent --show-error \
              --max-filesize 1048576 \
              --output "$RUNNER_TEMP/public-demo-safety-canonical.html" \
              --write-out '%{http_code}' "$APP_BASE_URL/")"
            health_status="$(curl --connect-timeout 10 --max-time 30 --silent --show-error \
              --output /dev/null --write-out '%{http_code}' "$APP_BASE_URL/api/health")"
            if test "$status" = "200" && test "$health_status" = "404" && \
                cmp "$RUNNER_TEMP/public-demo-safety-canonical.html" holding/login.html; then
              exit 0
            fi
            if [[ "$attempt" = 20 ]]; then exit 1; fi
            sleep 3
          done

      - name: Fail closed by pausing the demo project when holding restoration cannot be proved
        id: pause-fallback
        if: >-
          always() &&
          (steps.holding-record.outcome != 'success' ||
           steps.restore.outcome != 'success' ||
           steps.project-safety.outcome != 'success' ||
           steps.domain-ownership.outcome != 'success' ||
           steps.holding-proof.outcome != 'success')
        env:
          EXPECTED_VERCEL_PROJECT_PAUSED: "true"
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          project_api="https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID$scope_query"
          curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
            --fail --silent --show-error --request PATCH \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            --header "Content-Type: application/json" \
            --data '{"autoAssignCustomDomains":false}' \
            "$project_api" --output "$RUNNER_TEMP/public-demo-safety-pause-patch.json"
          curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
            --fail --silent --show-error --request POST \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v1/projects/$VERCEL_PROJECT_ID/pause$scope_query" \
            --output "$RUNNER_TEMP/public-demo-safety-pause.json" || true
          curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
            --fail --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "$project_api" --output "$RUNNER_TEMP/public-demo-safety-project-paused.json"
          node --experimental-strip-types scripts/validate-vercel-project-safety.mjs \
            "$RUNNER_TEMP/public-demo-safety-project-paused.json"

      - name: Require verified demo holding restoration or fail-closed pause
        if: always()
        env:
          HOLDING_RECORD_OUTCOME: ${{ steps.holding-record.outcome }}
          HOLDING_PROOF_OUTCOME: ${{ steps.holding-proof.outcome }}
          DOMAIN_OWNERSHIP_OUTCOME: ${{ steps.domain-ownership.outcome }}
          PAUSE_OUTCOME: ${{ steps.pause-fallback.outcome }}
          PROJECT_SAFETY_OUTCOME: ${{ steps.project-safety.outcome }}
          RESTORE_OUTCOME: ${{ steps.restore.outcome }}
        run: |
          set -euo pipefail
          if [[ "$HOLDING_RECORD_OUTCOME" = "success" &&
                "$RESTORE_OUTCOME" = "success" &&
                "$PROJECT_SAFETY_OUTCOME" = "success" &&
                "$DOMAIN_OWNERSHIP_OUTCOME" = "success" &&
                "$HOLDING_PROOF_OUTCOME" = "success" ]]; then
            exit 0
          fi
          test "$PAUSE_OUTCOME" = "success"

      - name: Record the exact public demo safety receipt
        if: success()
        env:
          ACTION: ${{ needs.authorize.outputs.action }}
          SOURCE_RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          {
            printf '## Kin Resolve public demo safety\n\n'
            printf -- '- Source release: %s attempt %s\n' "$SOURCE_RUN_ID" "$SOURCE_RUN_ATTEMPT"
            printf -- '- Requested action: %s\n' "$ACTION"
            printf -- '- Pinned holding restored or demo fail-closed paused: true\n'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Remove public demo safety material
        if: always()
        run: |
          rm -f .vercel/project.json
          rm -f "$RUNNER_TEMP/public-demo-safety-"*.json

  emergency-pause:
    name: Independently pause the demo project after containment failure
    needs: [authorize, contain]
    if: >-
      always() &&
      needs.authorize.result == 'success' &&
      needs.authorize.outputs.authorized == 'true' &&
      needs.contain.result != 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: demo-containment
    steps:
      - name: Idempotently pause and attest the exact isolated demo project
        env:
          EXPECTED_VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          EXPECTED_VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          MARKETING_VERCEL_PROJECT_ID: ${{ vars.MARKETING_VERCEL_PROJECT_ID }}
          PRODUCTION_VERCEL_PROJECT_ID: ${{ vars.PRODUCTION_VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          [[ "$EXPECTED_VERCEL_ORG_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          [[ "$EXPECTED_VERCEL_PROJECT_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          [[ "$MARKETING_VERCEL_PROJECT_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          [[ "$PRODUCTION_VERCEL_PROJECT_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          [[ "$VERCEL_ORG_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          [[ "$VERCEL_PROJECT_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          test "$VERCEL_ORG_ID" = "$EXPECTED_VERCEL_ORG_ID"
          test "$VERCEL_PROJECT_ID" = "$EXPECTED_VERCEL_PROJECT_ID"
          test "$VERCEL_PROJECT_ID" != "$MARKETING_VERCEL_PROJECT_ID"
          test "$VERCEL_PROJECT_ID" != "$PRODUCTION_VERCEL_PROJECT_ID"
          test -n "$VERCEL_TOKEN"
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          project_api="https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID$scope_query"
          curl --connect-timeout 10 --max-time 30 --retry 2 --retry-all-errors \
            --fail --silent --show-error --request PATCH \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            --header "Content-Type: application/json" \
            --data '{"autoAssignCustomDomains":false}' \
            "$project_api" --output "$RUNNER_TEMP/public-demo-emergency-patch.json" || true
          curl --connect-timeout 10 --max-time 30 --retry 2 --retry-all-errors \
            --fail --silent --show-error --request POST \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v1/projects/$VERCEL_PROJECT_ID/pause$scope_query" \
            --output "$RUNNER_TEMP/public-demo-emergency-pause.json" || true
          curl --connect-timeout 10 --max-time 30 --retry 2 --retry-all-errors \
            --fail --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "$project_api" --output "$RUNNER_TEMP/public-demo-emergency-project.json"
          node -e '
            const { readFileSync } = require("node:fs");
            const project = JSON.parse(readFileSync(process.argv[1], "utf8"));
            const orgIds = [project.accountId, project.teamId].filter((value) => value !== undefined);
            if (project.id !== process.env.VERCEL_PROJECT_ID ||
                orgIds.length === 0 || orgIds.some((value) => value !== process.env.VERCEL_ORG_ID) ||
                project.name !== "kinresolve-demo" || project.paused !== true ||
                project.autoAssignCustomDomains !== false) process.exit(1);
          ' "$RUNNER_TEMP/public-demo-emergency-project.json"
