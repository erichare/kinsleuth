name: Marketing site deploy

on:
  workflow_dispatch:
    inputs:
      production:
        description: "Publish to the production Vercel target"
        required: true
        type: boolean
        default: false
      beta_application_mode:
        description: Explicit static beta form mode; production application activation belongs to the product release gate
        required: true
        type: choice
        default: mailto
        options:
          - mailto
          - application
      demo_mode:
        description: Explicit static public-demo mode; live is the one-input public demo launch flip
        required: true
        type: choice
        default: pending
        options:
          - pending
          - live

permissions:
  contents: read

concurrency:
  group: marketing-site-deploy-${{ inputs.production && 'production' || 'preview' }}
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: ${{ inputs.production && 'production' || 'preview' }}
    defaults:
      run:
        working-directory: site
    env:
      DEPLOY_ENV: ${{ inputs.production && 'production' || 'preview' }}
      KINRESOLVE_MARKETING_BETA_APPLICATION_MODE: ${{ inputs.beta_application_mode }}
      KINRESOLVE_MARKETING_DEMO_MODE: ${{ inputs.demo_mode }}
      KINRESOLVE_MARKETING_RELEASE_MODE: prelaunch
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            site/package-lock.json

      - name: Install launch-media validator dependencies
        working-directory: .
        run: npm ci

      - name: Install marketing dependencies
        run: npm ci

      - name: Validate the committed synthetic launch media
        working-directory: .
        run: npm run launch:media:validate

      - name: Refuse out-of-band production application activation
        if: inputs.production && inputs.beta_application_mode == 'application'
        run: |
          echo "Production application-mode activation requires the product release workflow evidence gate." >&2
          exit 1

      - name: Verify the explicitly selected static site mode
        run: rm -rf .next out

      - name: Verify static site
        run: npm run verify

      - name: Install the pinned Vercel CLI before loading deploy credentials
        run: npm install --global --ignore-scripts vercel@56.1.0

      - name: Pull Vercel project settings
        env:
          DEMO_DOMAIN: demo.kinresolve.com
          DEMO_VERCEL_PROJECT_ID: ${{ vars.DEMO_VERCEL_PROJECT_ID }}
          EXPECTED_VERCEL_DOMAIN: demo.kinresolve.com
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.MARKETING_VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          [[ "$DEMO_VERCEL_PROJECT_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          [[ "$VERCEL_PROJECT_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          test "$DEMO_VERCEL_PROJECT_ID" != "$VERCEL_PROJECT_ID"
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
            --fail --silent --show-error --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$DEMO_VERCEL_PROJECT_ID/domains/$DEMO_DOMAIN$scope_query" \
            --output "$RUNNER_TEMP/marketing-demo-domain-before.json"
          VERCEL_PROJECT_ID="$DEMO_VERCEL_PROJECT_ID" \
            node --experimental-strip-types ../scripts/validate-vercel-project-domain.mjs \
              "$RUNNER_TEMP/marketing-demo-domain-before.json"
          marketing_domain_status="$(curl --connect-timeout 10 --max-time 30 --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            --output "$RUNNER_TEMP/marketing-domain-before.json" \
            --write-out '%{http_code}' \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/domains/$DEMO_DOMAIN$scope_query")"
          test "$marketing_domain_status" = "404"
          vercel pull --yes --environment="$DEPLOY_ENV"

      - name: Build preview
        if: env.DEPLOY_ENV == 'preview'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.MARKETING_VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build

      - name: Build production release
        if: env.DEPLOY_ENV == 'production'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.MARKETING_VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod

      - name: Deploy preview
        if: env.DEPLOY_ENV == 'preview'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.MARKETING_VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          DEPLOYMENT_URL="$(vercel deploy --prebuilt --target=preview --yes)"
          echo "### Marketing preview" >> "$GITHUB_STEP_SUMMARY"
          echo "$DEPLOYMENT_URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy production release
        if: env.DEPLOY_ENV == 'production'
        env:
          DEMO_DOMAIN: demo.kinresolve.com
          DEMO_VERCEL_PROJECT_ID: ${{ vars.DEMO_VERCEL_PROJECT_ID }}
          EXPECTED_VERCEL_DOMAIN: demo.kinresolve.com
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.MARKETING_VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          [[ "$DEMO_VERCEL_PROJECT_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          [[ "$VERCEL_PROJECT_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          test "$DEMO_VERCEL_PROJECT_ID" != "$VERCEL_PROJECT_ID"
          DEPLOYMENT_URL="$(vercel deploy --prebuilt --prod --yes)"
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
            --fail --silent --show-error --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$DEMO_VERCEL_PROJECT_ID/domains/$DEMO_DOMAIN$scope_query" \
            --output "$RUNNER_TEMP/marketing-demo-domain-after.json"
          VERCEL_PROJECT_ID="$DEMO_VERCEL_PROJECT_ID" \
            node --experimental-strip-types ../scripts/validate-vercel-project-domain.mjs \
              "$RUNNER_TEMP/marketing-demo-domain-after.json"
          marketing_domain_status="$(curl --connect-timeout 10 --max-time 30 --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            --output "$RUNNER_TEMP/marketing-domain-after.json" \
            --write-out '%{http_code}' \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/domains/$DEMO_DOMAIN$scope_query")"
          test "$marketing_domain_status" = "404"
          echo "### Marketing production deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "$DEPLOYMENT_URL" >> "$GITHUB_STEP_SUMMARY"
