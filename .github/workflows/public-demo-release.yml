name: Release Kin Resolve public demo
run-name: Public demo ${{ inputs.action }} ${{ inputs.release_commit }} run ${{ github.run_id }} attempt ${{ github.run_attempt }}

on:
  workflow_dispatch:
    inputs:
      action:
        description: Release exact main, roll back to a validated deployment, or contain to holding
        required: true
        type: choice
        options:
          - release
          - rollback
          - contain
      release_commit:
        description: Exact 40-character commit SHA currently at main
        required: true
        type: string
      rollback_deployment_id:
        description: Exact prior deployment ID; required only for rollback
        required: false
        default: ""
        type: string

permissions:
  actions: read
  contents: read
  security-events: read

concurrency:
  group: kinresolve-public-demo-release
  cancel-in-progress: false

jobs:
  authorize:
    name: Authorize exact current-main demo operation
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      action: ${{ steps.request.outputs.action }}
      package_version: ${{ steps.request.outputs.package_version }}
      release_tag: ${{ steps.request.outputs.release_tag }}
      rollback_deployment_id: ${{ steps.request.outputs.rollback_deployment_id }}
    steps:
      - name: Check out the exact requested revision without credentials
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          ref: ${{ inputs.release_commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate the exact request against current main
        id: request
        env:
          ACTION: ${{ inputs.action }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          ROLLBACK_DEPLOYMENT_ID: ${{ inputs.rollback_deployment_id }}
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = "refs/heads/main"
          [[ "$RELEASE_COMMIT" =~ ^[a-f0-9]{40}$ ]]
          git fetch origin main:refs/remotes/origin/main --force --no-tags
          test "$(git rev-parse --verify 'HEAD^{commit}')" = "$RELEASE_COMMIT"
          test "$(git rev-parse refs/remotes/origin/main)" = "$RELEASE_COMMIT"
          case "$ACTION" in
            release|contain)
              test -z "$ROLLBACK_DEPLOYMENT_ID"
              ;;
            rollback)
              [[ "$ROLLBACK_DEPLOYMENT_ID" =~ ^dpl_[A-Za-z0-9]{8,96}$ ]]
              ;;
            *) exit 1 ;;
          esac
          package_version="$(node -p 'require("./package.json").version')"
          [[ "$package_version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]
          {
            printf 'action=%s\n' "$ACTION"
            printf 'package_version=%s\n' "$package_version"
            printf 'release_tag=v%s\n' "$package_version"
            printf 'rollback_deployment_id=%s\n' "$ROLLBACK_DEPLOYMENT_ID"
          } >> "$GITHUB_OUTPUT"

      - name: Refuse unresolved release or containment safety work
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SAFETY_CURRENT_WORKFLOW: public-demo
        run: node --experimental-strip-types scripts/validate-release-safety-queue.mjs

      - name: Require the legacy staging demo controller to be disabled and idle
        if: inputs.action == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_API_URL: ${{ github.api_url }}
          KINRESOLVE_STAGING_DEMO_WORKFLOW_ID: ${{ vars.KINRESOLVE_STAGING_DEMO_WORKFLOW_ID }}
        run: node --experimental-strip-types scripts/validate-legacy-demo-retirement.mjs

      - name: Require successful current-main CI and zero open high-severity code alerts
        if: inputs.action == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_API_URL: ${{ github.api_url }}
          PRODUCT_CI_WORKFLOW_ID: ${{ vars.PRODUCT_CI_WORKFLOW_ID }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
        run: node scripts/public-demo-github-readiness.mjs

  release:
    name: Build, prove, and promote the public demo candidate
    needs: authorize
    if: needs.authorize.outputs.action == 'release'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    environment: demo-production
    steps:
      - name: Check out the exact authorized release revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          ref: ${{ inputs.release_commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up the pinned Node.js runtime
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install exact application and Vercel dependencies
        run: |
          set -euo pipefail
          npm ci
          npx playwright install --with-deps chromium webkit firefox
          npm install --global --ignore-scripts vercel@56.1.0

      - name: Reverify exact current main before protected configuration
        env:
          RELEASE_COMMIT: ${{ inputs.release_commit }}
        run: |
          set -euo pipefail
          git fetch origin main:refs/remotes/origin/main --force --no-tags
          test "$(git rev-parse --verify 'HEAD^{commit}')" = "$RELEASE_COMMIT"
          test "$(git rev-parse refs/remotes/origin/main)" = "$RELEASE_COMMIT"

      - name: Bind the isolated hosted-demo release identities
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          EXPECTED_ARCHIVE_ID: kinresolve-demo-public
          EXPECTED_DATASET_MODE: demo
          EXPECTED_VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          EXPECTED_VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          KINRESOLVE_DATABASE_IDENTITY: ${{ vars.KINRESOLVE_DATABASE_IDENTITY }}
          KINRESOLVE_DEPLOYMENT_MODE: hosted
          KINRESOLVE_PUBLIC_DEMO_ENABLED: "true"
          KINRESOLVE_RELEASE_ROLE: public-demo
          MARKETING_VERCEL_PROJECT_ID: ${{ vars.MARKETING_VERCEL_PROJECT_ID }}
          PRODUCTION_DATABASE_IDENTITY: ${{ vars.PRODUCTION_DATABASE_IDENTITY }}
          PRODUCTION_VERCEL_PROJECT_ID: ${{ vars.PRODUCTION_VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          test "$APP_BASE_URL" = "https://demo.kinresolve.com"
          test "$EXPECTED_ARCHIVE_ID" = "kinresolve-demo-public"
          test "$EXPECTED_DATASET_MODE" = "demo"
          test "$KINRESOLVE_DEPLOYMENT_MODE" = "hosted"
          test "$KINRESOLVE_PUBLIC_DEMO_ENABLED" = "true"
          test "$KINRESOLVE_RELEASE_ROLE" = "public-demo"
          [[ "$VERCEL_ORG_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          [[ "$EXPECTED_VERCEL_ORG_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          [[ "$VERCEL_PROJECT_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          [[ "$MARKETING_VERCEL_PROJECT_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          test "$VERCEL_ORG_ID" = "$EXPECTED_VERCEL_ORG_ID"
          test "$VERCEL_PROJECT_ID" = "$EXPECTED_VERCEL_PROJECT_ID"
          test "$VERCEL_PROJECT_ID" != "$PRODUCTION_VERCEL_PROJECT_ID"
          test "$VERCEL_PROJECT_ID" != "$MARKETING_VERCEL_PROJECT_ID"
          [[ "$KINRESOLVE_DATABASE_IDENTITY" =~ ^[a-f0-9]{64}$ ]]
          [[ "$PRODUCTION_DATABASE_IDENTITY" =~ ^[a-f0-9]{64}$ ]]
          test "$KINRESOLVE_DATABASE_IDENTITY" != "$PRODUCTION_DATABASE_IDENTITY"
          install -d -m 700 .vercel
          node -e '
            const { writeFileSync } = require("node:fs");
            writeFileSync(".vercel/project.json", JSON.stringify({
              orgId: process.env.VERCEL_ORG_ID,
              projectId: process.env.VERCEL_PROJECT_ID
            }) + "\n", { mode: 0o600 });
          '

      - name: Capture the current healthy canonical deployment for rollback
        id: previous
        env:
          APPROVED_HOLDING_DEPLOYMENT_ID: ${{ secrets.DEMO_HOLDING_DEPLOYMENT_ID }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          deployment_host="${APP_BASE_URL#https://}"
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
            --fail --silent --show-error --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
            --output "$RUNNER_TEMP/public-demo-previous.json"
          node --experimental-strip-types scripts/validate-vercel-deployment.mjs holding-record \
            "$RUNNER_TEMP/public-demo-previous.json"
          printf 'rollback_kind=holding\n' >> "$GITHUB_OUTPUT"

      - name: Require verified holding before public demo release
        env:
          ROLLBACK_KIND: ${{ steps.previous.outputs.rollback_kind }}
        run: |
          set -euo pipefail
          test "$ROLLBACK_KIND" = "holding"

      - name: Prove the captured rollback target is healthy before candidate deployment
        id: holding_preflight
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
        run: |
          set -euo pipefail
          status="$(curl --connect-timeout 10 --max-time 30 --silent --show-error \
            --max-filesize 1048576 --output "$RUNNER_TEMP/public-demo-previous.html" \
            --write-out '%{http_code}' "$APP_BASE_URL/")"
          test "$status" = "200"
          cmp "$RUNNER_TEMP/public-demo-previous.html" holding/login.html
          health_status="$(curl --connect-timeout 10 --max-time 30 --silent --show-error \
            --output /dev/null --write-out '%{http_code}' "$APP_BASE_URL/api/health")"
          test "$health_status" = "404"
          printf 'verified_at_epoch=%s\n' "$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Prove automatic custom-domain assignment remains disabled
        env:
          EXPECTED_VERCEL_PROJECT_NAME: kinresolve-demo
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          project_api="https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID$scope_query"
          curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
            --fail --silent --show-error --request PATCH \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            --header "Content-Type: application/json" \
            --data '{"autoAssignCustomDomains":false}' \
            "$project_api" --output "$RUNNER_TEMP/public-demo-project-patch.json"
          curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
            --fail --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "$project_api" --output "$RUNNER_TEMP/public-demo-project.json"
          EXPECTED_VERCEL_PROJECT_PAUSED="false" \
            node --experimental-strip-types scripts/validate-vercel-project-safety.mjs \
              "$RUNNER_TEMP/public-demo-project.json"

      - name: Prove the public demo hostname belongs only to the dedicated project
        env:
          EXPECTED_VERCEL_DOMAIN: demo.kinresolve.com
          MARKETING_VERCEL_PROJECT_ID: ${{ vars.MARKETING_VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
            --fail --silent --show-error --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/domains/demo.kinresolve.com$scope_query" \
            --output "$RUNNER_TEMP/public-demo-domain.json"
          node --experimental-strip-types scripts/validate-vercel-project-domain.mjs \
            "$RUNNER_TEMP/public-demo-domain.json"
          marketing_status="$(curl --connect-timeout 10 --max-time 30 --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            --output "$RUNNER_TEMP/public-demo-marketing-domain.json" \
            --write-out '%{http_code}' \
            "https://api.vercel.com/v9/projects/$MARKETING_VERCEL_PROJECT_ID/domains/demo.kinresolve.com$scope_query")"
          test "$marketing_status" = "404"

      - name: Prove the dedicated AI Gateway key remains inside its hard budget
        env:
          EXPECTED_AI_GATEWAY_API_KEY_ID: ${{ vars.AI_GATEWAY_API_KEY_ID }}
          EXPECTED_AI_GATEWAY_MONTHLY_BUDGET_USD: ${{ vars.AI_GATEWAY_MONTHLY_BUDGET_USD }}
          EXPECTED_AI_GATEWAY_TEAM_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
            --fail --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v1/api-keys?teamId=$VERCEL_ORG_ID" \
            --output "$RUNNER_TEMP/public-demo-ai-gateway-keys.json"
          node --experimental-strip-types scripts/validate-public-demo-ai-gateway-key.mjs \
            "$RUNNER_TEMP/public-demo-ai-gateway-keys.json"

      - name: Pull and validate the exact public demo runtime contract
        env:
          EXPECTED_DATABASE_IDENTITY: ${{ vars.KINRESOLVE_DATABASE_IDENTITY }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          umask 077
          scope_query="limit=100"
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then
            scope_query="$scope_query&teamId=$VERCEL_ORG_ID"
          fi
          curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
            --fail --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env?$scope_query" \
            --output "$RUNNER_TEMP/public-demo-environment.json"
          vercel pull --yes --environment=production
          EXPECTED_VERCEL_ENVIRONMENT_PROFILE=public-demo \
            node --experimental-strip-types scripts/validate-vercel-environment.mjs \
              "$RUNNER_TEMP/public-demo-environment.json" \
              .vercel/.env.production.local
          node --env-file=.vercel/.env.production.local - <<'NODE'
          const exact = {
            AI_API_MODE: "responses",
            AI_BASE_URL: "https://ai-gateway.vercel.sh/v1",
            AI_CHAT_MODEL: "openai/gpt-5-mini",
            APP_BASE_URL: "https://demo.kinresolve.com",
            DATABASE_AUTO_MIGRATE: "false",
            KINSLEUTH_ARCHIVE_ID: "kinresolve-demo-public",
            KINSLEUTH_ALLOW_SIGNUPS: "false",
            KINRESOLVE_API_V1_ENABLED: "false",
            KINRESOLVE_DATASET_MODE: "demo",
            KINRESOLVE_DEPLOYMENT_MODE: "hosted",
            KINRESOLVE_DNA_ENABLED: "true",
            KINRESOLVE_EVIDENCE_BINARY_UPLOADS_ENABLED: "false",
            KINRESOLVE_EXTERNAL_AI_ENABLED: "true",
            KINRESOLVE_PACKAGE_MEDIA_ENABLED: "false",
            KINRESOLVE_PLAIN_GEDCOM_ENABLED: "false",
            KINRESOLVE_PUBLIC_ARCHIVE_ENABLED: "true",
            KINRESOLVE_PUBLIC_DEMO_ANALYTICS: "plausible",
            KINRESOLVE_PUBLIC_DEMO_ENABLED: "true",
            KINRESOLVE_PUBLIC_DEMO_ORIGIN: "https://demo.kinresolve.com",
            KINRESOLVE_PUBLIC_PUBLISHING_ENABLED: "false",
            KINRESOLVE_SCHEDULED_WRITES_ENABLED: "true"
          };
          for (const [name, expected] of Object.entries(exact)) {
            if (process.env[name] !== expected) process.exit(1);
          }
          if (process.env.KINRESOLVE_DATABASE_IDENTITY !== process.env.EXPECTED_DATABASE_IDENTITY) {
            process.exit(1);
          }
          NODE

      - name: Verify migrations and the fictional demo boundary
        run: |
          set -euo pipefail
          npm run migrations:verify
          npm run demo:verify

      - name: Attest the exact demo migration database before mutation
        env:
          DATABASE_IDENTITY_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
          EXPECTED_DATABASE_IDENTITY: ${{ vars.KINRESOLVE_DATABASE_IDENTITY }}
        run: |
          set -euo pipefail
          actual_database_identity="$(npm run --silent db:identity)"
          [[ "$actual_database_identity" =~ ^[a-f0-9]{64}$ ]]
          test "$actual_database_identity" = "$EXPECTED_DATABASE_IDENTITY"

      - name: Migrate and provision only the isolated demo database
        env:
          DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
          DEMO_FIXTURE_ROTATION_CONFIRMATION: ROTATE-DEMO-FIXTURE:kinresolve-demo-public:4:5
          KINSLEUTH_ARCHIVE_ID: kinresolve-demo-public
          KINRESOLVE_DATASET_MODE: demo
          KINRESOLVE_DEPLOYMENT_MODE: hosted
          KINRESOLVE_PUBLIC_DEMO_ENABLED: "true"
        run: |
          set -euo pipefail
          npm run db:migrate
          npm run archive:rotate-public-demo-fixture -- --from-version 4
          npm run archive:provision -- --mode demo

      - name: Verify the exact demo migration ledger and canonical archive
        env:
          EXPECTED_ARCHIVE_ID: kinresolve-demo-public
          KINRESOLVE_DATABASE_IDENTITY: ${{ vars.KINRESOLVE_DATABASE_IDENTITY }}
          MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
        run: npm run db:migrations:verify-production

      - name: Grant and re-attest public demo runtime access
        id: runtime_grants
        env:
          EXPECTED_DATABASE_IDENTITY: ${{ vars.KINRESOLVE_DATABASE_IDENTITY }}
          MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
          PUBLIC_DEMO_RUNTIME_DATABASE_URL: ${{ secrets.PUBLIC_DEMO_RUNTIME_DATABASE_URL }}
        run: |
          set -euo pipefail
          umask 077
          output="$RUNNER_TEMP/public-demo-runtime-grants.json"
          npm run db:runtime-role:grant-beta-operations -- "$output" --public-demo
          jq -e --arg database_identity "$EXPECTED_DATABASE_IDENTITY" '
            (. | keys | sort) == ([
              "credentialsDistinct", "databaseCreate", "databaseIdentity", "exactPrivilegesAttested",
              "grantContract", "managedTablePrivileges", "persistentDataMutation",
              "protectedTablePrivileges", "publicSchemaCreate", "publicSchemaUsage",
              "representativeAppWriteRolledBack", "runtimeRoleIdentitySha256",
              "safeRuntimeRoleReattested", "sameDatabaseSessionVerified", "schemaVersion"
            ] | sort) and
            .schemaVersion == 1 and .grantContract == "beta-operations-v1" and
            .databaseIdentity == $database_identity and
            (.runtimeRoleIdentitySha256 | test("^[a-f0-9]{64}$")) and
            .credentialsDistinct == true and .sameDatabaseSessionVerified == true and
            .safeRuntimeRoleReattested == true and .databaseCreate == false and
            .publicSchemaUsage == true and .publicSchemaCreate == false and
            .exactPrivilegesAttested == true and
            .representativeAppWriteRolledBack == true and .persistentDataMutation == false and
            (.managedTablePrivileges | map({table, select, insert, update, delete})) == [
              {"table":"auth_rate_limit_buckets","select":true,"insert":true,"update":true,"delete":true},
              {"table":"beta_applications","select":true,"insert":true,"update":true,"delete":true},
              {"table":"beta_data_operations","select":true,"insert":true,"update":true,"delete":false},
              {"table":"beta_worker_heartbeats","select":true,"insert":true,"update":true,"delete":false},
              {"table":"api_tokens","select":true,"insert":true,"update":true,"delete":false},
              {"table":"api_rate_limit_buckets","select":true,"insert":true,"update":true,"delete":true},
              {"table":"public_demo_capacity","select":true,"insert":true,"update":true,"delete":false},
              {"table":"public_demo_sessions","select":true,"insert":true,"update":true,"delete":true},
              {"table":"public_demo_rate_limits","select":true,"insert":true,"update":true,"delete":true},
              {"table":"public_demo_generations","select":true,"insert":true,"update":true,"delete":true},
              {"table":"public_demo_ai_attempts","select":true,"insert":true,"update":true,"delete":true},
              {"table":"public_demo_events","select":true,"insert":true,"update":false,"delete":true},
              {"table":"public_demo_stats","select":true,"insert":false,"update":true,"delete":false},
              {"table":"security_events","select":false,"insert":true,"update":false,"delete":false}
            ] and
            all(.managedTablePrivileges[];
              (. | keys | sort) == ([
                "delete", "grantOptions", "insert", "maintain", "references",
                "select", "table", "trigger", "truncate", "update"
              ] | sort) and .truncate == false and .references == false and
              .trigger == false and .maintain == false and .grantOptions == false) and
            (.protectedTablePrivileges | map(.table)) == [
              "release_write_fences", "schema_migrations"
            ] and
            all(.protectedTablePrivileges[];
              (. | keys | sort) == ([
                "delete", "grantOptions", "insert", "maintain", "references",
                "select", "table", "trigger", "truncate", "update"
              ] | sort) and .select == true and .insert == false and .update == false and
              .delete == false and .truncate == false and .references == false and
              .trigger == false and .maintain == false and .grantOptions == false)
          ' "$output" > /dev/null
          runtime_role_identity_sha256="$(
            jq -er '.runtimeRoleIdentitySha256 | select(test("^[a-f0-9]{64}$"))' "$output"
          )"
          printf 'runtime_role_identity_sha256=%s\n' "$runtime_role_identity_sha256" >> "$GITHUB_OUTPUT"

      - name: Fetch and validate the pinned demo holding deployment
        id: holding
        env:
          APPROVED_HOLDING_DEPLOYMENT_ID: ${{ secrets.DEMO_HOLDING_DEPLOYMENT_ID }}
          DEMO_HOLDING_DEPLOYMENT_ID: ${{ secrets.DEMO_HOLDING_DEPLOYMENT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          [[ "$DEMO_HOLDING_DEPLOYMENT_ID" =~ ^dpl_[A-Za-z0-9]{8,96}$ ]]
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
            --fail --silent --show-error --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v13/deployments/$DEMO_HOLDING_DEPLOYMENT_ID$scope_query" \
            --output "$RUNNER_TEMP/public-demo-holding.json"
          node --experimental-strip-types scripts/validate-vercel-deployment.mjs holding-record \
            "$RUNNER_TEMP/public-demo-holding.json"

      - name: Build the immutable public demo artifact
        env:
          KINRESOLVE_BUILD_COMMIT_SHA: ${{ inputs.release_commit }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod

      - name: Deploy the unaliased public demo candidate
        id: deploy
        env:
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RELEASE_TAG: ${{ needs.authorize.outputs.release_tag }}
          RELEASE_VERSION: ${{ needs.authorize.outputs.package_version }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          deployment_url="$(vercel deploy --prebuilt --prod --skip-domain --no-wait --yes \
            --meta "githubCommitSha=$RELEASE_COMMIT" \
            --meta "githubRunId=$GITHUB_RUN_ID" \
            --meta "githubRunAttempt=$GITHUB_RUN_ATTEMPT" \
             --meta "releaseTag=$RELEASE_TAG" \
             --meta "packageVersion=$RELEASE_VERSION" \
             --meta "releaseRole=public-demo" \
             --meta "datasetMode=demo" \
             --meta "canonicalArchiveId=kinresolve-demo-public")"
          DEPLOYMENT_URL="$deployment_url" node -e '
            const url = new URL(process.env.DEPLOYMENT_URL);
            if (url.protocol !== "https:" || url.origin !== process.env.DEPLOYMENT_URL ||
                !url.hostname.endsWith(".vercel.app") || url.hostname === "vercel.app") process.exit(1);
          '
          printf 'deployment_url=%s\n' "$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Fetch and validate the exact candidate record
        id: candidate
        timeout-minutes: 10
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          CANDIDATE_DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment_url }}
          EXPECTED_GITHUB_COMMIT_SHA: ${{ inputs.release_commit }}
          EXPECTED_GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          EXPECTED_GITHUB_RUN_ID: ${{ github.run_id }}
          PACKAGE_VERSION: ${{ needs.authorize.outputs.package_version }}
          PREVIOUS_DEPLOYMENT_ID: ${{ steps.previous.outputs.deployment_id }}
          RELEASE_TAG: ${{ needs.authorize.outputs.release_tag }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          deployment_host="${CANDIDATE_DEPLOYMENT_URL#https://}"
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          candidate_validated="false"
          for attempt in $(seq 1 30); do
            rm -f "$RUNNER_TEMP/public-demo-candidate.json"
            if curl --connect-timeout 5 --max-time 10 \
                --fail --silent --show-error --header "Authorization: Bearer $VERCEL_TOKEN" \
                "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
                --output "$RUNNER_TEMP/public-demo-candidate.json"; then
              if jq -e '
                  ((.readyState // .state) == "ERROR") or
                  ((.readyState // .state) == "CANCELED") or
                  (.errorCode != null) or
                  (.errorMessage != null)
                ' "$RUNNER_TEMP/public-demo-candidate.json" >/dev/null; then
                echo "The Vercel candidate entered a terminal failure state." >&2
                exit 1
              fi
              if jq -e '
                  .readyState == "READY" and
                  .readySubstate == "STAGED" and
                  .errorCode == null and
                  .errorMessage == null
                ' "$RUNNER_TEMP/public-demo-candidate.json" >/dev/null \
                && env -u GITHUB_OUTPUT node --experimental-strip-types \
                  scripts/validate-vercel-deployment.mjs demo-candidate \
                  "$RUNNER_TEMP/public-demo-candidate.json" >/dev/null 2>&1; then
                candidate_validated="true"
                break
              fi
            fi
            echo "Waiting for the exact Vercel candidate to become READY and STAGED ($attempt/30)."
            sleep 5
          done
          test "$candidate_validated" = "true"
          node --experimental-strip-types scripts/validate-vercel-deployment.mjs demo-candidate \
            "$RUNNER_TEMP/public-demo-candidate.json"

      - name: Prove every generated candidate origin remains protected
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: >-
          node --experimental-strip-types scripts/probe-vercel-candidate-protection.mjs
          "$RUNNER_TEMP/public-demo-candidate.json"

      - name: Reprove canonical holding after request quiescence
        env:
          APPROVED_HOLDING_DEPLOYMENT_ID: ${{ secrets.DEMO_HOLDING_DEPLOYMENT_ID }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          EXPECTED_HOLDING_DEPLOYMENT_ID: ${{ steps.previous.outputs.deployment_id }}
          HOLDING_VERIFIED_AT_EPOCH: ${{ steps.holding_preflight.outputs.verified_at_epoch }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          [[ "$HOLDING_VERIFIED_AT_EPOCH" =~ ^[0-9]{10}$ ]]
          [[ "$EXPECTED_HOLDING_DEPLOYMENT_ID" =~ ^dpl_[A-Za-z0-9]{8,96}$ ]]
          minimum_quiescence_seconds=65
          now_epoch="$(date +%s)"
          elapsed_seconds=$((now_epoch - HOLDING_VERIFIED_AT_EPOCH))
          test "$elapsed_seconds" -ge 0
          if test "$elapsed_seconds" -lt "$minimum_quiescence_seconds"; then
            sleep "$((minimum_quiescence_seconds - elapsed_seconds))"
          fi
          deployment_host="${APP_BASE_URL#https://}"
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
            --fail --silent --show-error --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
            --output "$RUNNER_TEMP/public-demo-held-before-drain.json"
          env -u GITHUB_OUTPUT node --experimental-strip-types \
            scripts/validate-vercel-deployment.mjs holding-record \
            "$RUNNER_TEMP/public-demo-held-before-drain.json"
          actual_holding_id="$(jq -er '.id | select(test("^dpl_[A-Za-z0-9]{8,96}$"))' \
            "$RUNNER_TEMP/public-demo-held-before-drain.json")"
          test "$actual_holding_id" = "$EXPECTED_HOLDING_DEPLOYMENT_ID"
          status="$(curl --connect-timeout 10 --max-time 30 --silent --show-error \
            --max-filesize 1048576 --output "$RUNNER_TEMP/public-demo-held-before-drain.html" \
            --write-out '%{http_code}' "$APP_BASE_URL/")"
          test "$status" = "200"
          cmp "$RUNNER_TEMP/public-demo-held-before-drain.html" holding/login.html
          health_status="$(curl --connect-timeout 10 --max-time 30 --silent --show-error \
            --output /dev/null --write-out '%{http_code}' "$APP_BASE_URL/api/health")"
          test "$health_status" = "404"

      - name: Bootstrap lifecycle cleanup before staged candidate health
        timeout-minutes: 5
        env:
          DATABASE_AUTO_MIGRATE: "false"
          EXPECTED_RUNTIME_ROLE_IDENTITY_SHA256: ${{ steps.runtime_grants.outputs.runtime_role_identity_sha256 }}
          KINRESOLVE_DATASET_MODE: demo
          KINRESOLVE_PUBLIC_DEMO_ENABLED: "true"
          PUBLIC_DEMO_RUNTIME_DATABASE_URL: ${{ secrets.PUBLIC_DEMO_RUNTIME_DATABASE_URL }}
          ROLLBACK_KIND: ${{ steps.previous.outputs.rollback_kind }}
        run: node --import tsx scripts/public-demo-cleanup-bootstrap.mjs

      - name: Prove protected public demo operational health on the candidate
        env:
          EXPECTED_RUNTIME_ROLE_IDENTITY_SHA256: ${{ steps.runtime_grants.outputs.runtime_role_identity_sha256 }}
          KINRESOLVE_OBSERVABILITY_PROBE_SECRET: ${{ secrets.KINRESOLVE_OBSERVABILITY_PROBE_SECRET }}
          PUBLIC_DEMO_ORIGIN: ${{ steps.candidate.outputs.deployment_url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: node --experimental-strip-types scripts/public-demo-internal-health-monitor.mjs

      - name: Run the protected cross-browser public demo canaries
        env:
          KINRESOLVE_DEMO_CANARY_SECRET: ${{ secrets.KINRESOLVE_DEMO_CANARY_SECRET }}
          PUBLIC_DEMO_ORIGIN: ${{ steps.candidate.outputs.deployment_url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail
          for browser in chromium webkit firefox; do
            KINRESOLVE_DEMO_BROWSER="$browser" \
              node --experimental-strip-types scripts/public-demo-browser-canary.mjs
          done

      - name: Reprove canonical holding immediately before final lifecycle drain
        env:
          APPROVED_HOLDING_DEPLOYMENT_ID: ${{ secrets.DEMO_HOLDING_DEPLOYMENT_ID }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          EXPECTED_HOLDING_DEPLOYMENT_ID: ${{ steps.previous.outputs.deployment_id }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          [[ "$EXPECTED_HOLDING_DEPLOYMENT_ID" =~ ^dpl_[A-Za-z0-9]{8,96}$ ]]
          deployment_host="${APP_BASE_URL#https://}"
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
            --fail --silent --show-error --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
            --output "$RUNNER_TEMP/public-demo-held-before-final-drain.json"
          env -u GITHUB_OUTPUT node --experimental-strip-types \
            scripts/validate-vercel-deployment.mjs holding-record \
            "$RUNNER_TEMP/public-demo-held-before-final-drain.json"
          actual_holding_id="$(jq -er '.id | select(test("^dpl_[A-Za-z0-9]{8,96}$"))' \
            "$RUNNER_TEMP/public-demo-held-before-final-drain.json")"
          test "$actual_holding_id" = "$EXPECTED_HOLDING_DEPLOYMENT_ID"
          status="$(curl --connect-timeout 10 --max-time 30 --silent --show-error \
            --max-filesize 1048576 --output "$RUNNER_TEMP/public-demo-held-before-final-drain.html" \
            --write-out '%{http_code}' "$APP_BASE_URL/")"
          test "$status" = "200"
          cmp "$RUNNER_TEMP/public-demo-held-before-final-drain.html" holding/login.html
          health_status="$(curl --connect-timeout 10 --max-time 30 --silent --show-error \
            --output /dev/null --write-out '%{http_code}' "$APP_BASE_URL/api/health")"
          test "$health_status" = "404"

      - name: Final zero-capacity lifecycle drain before load
        timeout-minutes: 5
        env:
          DATABASE_AUTO_MIGRATE: "false"
          EXPECTED_RUNTIME_ROLE_IDENTITY_SHA256: ${{ steps.runtime_grants.outputs.runtime_role_identity_sha256 }}
          KINRESOLVE_DATASET_MODE: demo
          KINRESOLVE_PUBLIC_DEMO_ENABLED: "true"
          PUBLIC_DEMO_RUNTIME_DATABASE_URL: ${{ secrets.PUBLIC_DEMO_RUNTIME_DATABASE_URL }}
          ROLLBACK_KIND: ${{ steps.previous.outputs.rollback_kind }}
        run: node --import tsx scripts/public-demo-cleanup-bootstrap.mjs

      - name: Prove 25-session capacity and five-second p95 on the held demo cell
        env:
          KINRESOLVE_DEMO_CANARY_SECRET: ${{ secrets.KINRESOLVE_DEMO_CANARY_SECRET }}
          PUBLIC_DEMO_ORIGIN: ${{ steps.candidate.outputs.deployment_url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: node --experimental-strip-types scripts/public-demo-load-test.mjs

      - name: Reverify exact current main immediately before promotion
        env:
          RELEASE_COMMIT: ${{ inputs.release_commit }}
        run: |
          set -euo pipefail
          git fetch origin main:refs/remotes/origin/main --force --no-tags
          test "$(git rev-parse --verify 'HEAD^{commit}')" = "$RELEASE_COMMIT"
          test "$(git rev-parse refs/remotes/origin/main)" = "$RELEASE_COMMIT"

      - name: Promote the exact proven public demo candidate
        id: promote
        timeout-minutes: 10
        env:
          CANDIDATE_DEPLOYMENT_URL: ${{ steps.candidate.outputs.deployment_url }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel promote "$CANDIDATE_DEPLOYMENT_URL" --yes --timeout=5m

      - name: Prove canonical promotion and run the full public demo monitor
        id: canonical-proof
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          CANDIDATE_DEPLOYMENT_ID: ${{ steps.candidate.outputs.deployment_id }}
          EXPECTED_RUNTIME_ROLE_IDENTITY_SHA256: ${{ steps.runtime_grants.outputs.runtime_role_identity_sha256 }}
          KINRESOLVE_DEMO_CANARY_SECRET: ${{ secrets.KINRESOLVE_DEMO_CANARY_SECRET }}
          KINRESOLVE_OBSERVABILITY_PROBE_SECRET: ${{ secrets.KINRESOLVE_OBSERVABILITY_PROBE_SECRET }}
          PUBLIC_DEMO_ORIGIN: ${{ vars.APP_BASE_URL }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          deployment_host="${APP_BASE_URL#https://}"
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          for attempt in $(seq 1 20); do
            rm -f "$RUNNER_TEMP/public-demo-promoted.json"
            if curl --connect-timeout 10 --max-time 30 --fail --silent --show-error \
                --header "Authorization: Bearer $VERCEL_TOKEN" \
                "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
                --output "$RUNNER_TEMP/public-demo-promoted.json" \
              && env -u GITHUB_OUTPUT node --experimental-strip-types \
                scripts/validate-vercel-deployment.mjs promoted \
                "$RUNNER_TEMP/public-demo-promoted.json" "$deployment_host" >/dev/null 2>&1; then
              break
            fi
            if test "$attempt" = 20; then exit 1; fi
            sleep 3
          done
          node --experimental-strip-types scripts/public-demo-monitor.mjs full
          node --experimental-strip-types scripts/public-demo-internal-health-monitor.mjs

      - name: Roll back a failed promotion to the previously validated deployment
        id: rollback
        if: failure() && steps.promote.outcome == 'success'
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          CANDIDATE_DEPLOYMENT_ID: ${{ steps.previous.outputs.deployment_id }}
          PREVIOUS_DEPLOYMENT_ID: ${{ steps.previous.outputs.deployment_id }}
          PREVIOUS_DEPLOYMENT_URL: ${{ steps.previous.outputs.deployment_url }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          [[ "$PREVIOUS_DEPLOYMENT_ID" =~ ^dpl_[A-Za-z0-9]{8,96}$ ]]
          deployment_host="${APP_BASE_URL#https://}"
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          target_is_current() {
            local output_path="$1"
            rm -f "$output_path"
            curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
              --fail --silent --show-error --header "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
              --output "$output_path" \
            && env -u GITHUB_OUTPUT node --experimental-strip-types \
              scripts/validate-vercel-deployment.mjs promoted \
              "$output_path" "$deployment_host" >/dev/null 2>&1
          }
          if target_is_current "$RUNNER_TEMP/public-demo-rollback-current-before.json"; then
            echo "The exact rollback deployment is already current."
            exit 0
          fi
          if vercel rollback "$PREVIOUS_DEPLOYMENT_URL" --yes --timeout=5m; then
            exit 0
          fi
          if target_is_current "$RUNNER_TEMP/public-demo-rollback-current-after.json"; then
            echo "The exact rollback deployment became current during restoration."
            exit 0
          fi
          exit 1

      - name: Prove the automatic rollback at the canonical hostname
        id: rollback-proof
        if: >-
          always() &&
          steps.promote.outcome == 'success' &&
          steps.canonical-proof.outcome != 'success' &&
          steps.rollback.outcome == 'success'
        continue-on-error: true
        timeout-minutes: 10
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          CANDIDATE_DEPLOYMENT_ID: ${{ steps.previous.outputs.deployment_id }}
          EXPECTED_RUNTIME_ROLE_IDENTITY_SHA256: ${{ steps.runtime_grants.outputs.runtime_role_identity_sha256 }}
          KINRESOLVE_DEMO_CANARY_SECRET: ${{ secrets.KINRESOLVE_DEMO_CANARY_SECRET }}
          KINRESOLVE_OBSERVABILITY_PROBE_SECRET: ${{ secrets.KINRESOLVE_OBSERVABILITY_PROBE_SECRET }}
          PUBLIC_DEMO_ORIGIN: ${{ vars.APP_BASE_URL }}
          ROLLBACK_KIND: ${{ steps.previous.outputs.rollback_kind }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          deployment_host="${APP_BASE_URL#https://}"
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          for attempt in $(seq 1 20); do
            curl --connect-timeout 10 --max-time 30 --fail --silent --show-error \
              --header "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
              --output "$RUNNER_TEMP/public-demo-automatic-rollback.json"
            if env -u GITHUB_OUTPUT node --experimental-strip-types \
                scripts/validate-vercel-deployment.mjs promoted \
                "$RUNNER_TEMP/public-demo-automatic-rollback.json" "$deployment_host" \
                >/dev/null 2>&1; then
              break
            fi
            if test "$attempt" = 20; then exit 1; fi
            sleep 3
          done
          if test "$ROLLBACK_KIND" = "holding"; then
            status="$(curl --connect-timeout 10 --max-time 30 --silent --show-error \
              --max-filesize 1048576 --output "$RUNNER_TEMP/public-demo-rollback.html" \
              --write-out '%{http_code}' "$APP_BASE_URL/")"
            test "$status" = "200"
            cmp "$RUNNER_TEMP/public-demo-rollback.html" holding/login.html
            health_status="$(curl --connect-timeout 10 --max-time 30 --silent --show-error \
              --output /dev/null --write-out '%{http_code}' "$APP_BASE_URL/api/health")"
            test "$health_status" = "404"
          else
            test "$ROLLBACK_KIND" = "public-demo"
            node --experimental-strip-types scripts/public-demo-monitor.mjs full
            node --experimental-strip-types scripts/public-demo-internal-health-monitor.mjs
          fi

      - name: Fail closed to the pinned holding page if rollback cannot be proved
        id: holding-fallback
        if: >-
          always() &&
          steps.promote.outcome == 'success' &&
          steps.canonical-proof.outcome != 'success' &&
          steps.rollback-proof.outcome != 'success'
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          CANDIDATE_DEPLOYMENT_ID: ${{ steps.holding.outputs.deployment_id }}
          DEMO_HOLDING_DEPLOYMENT_ID: ${{ steps.holding.outputs.deployment_id }}
          HOLDING_DEPLOYMENT_URL: ${{ steps.holding.outputs.deployment_url }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          [[ "$DEMO_HOLDING_DEPLOYMENT_ID" =~ ^dpl_[A-Za-z0-9]{8,96}$ ]]
          deployment_host="${APP_BASE_URL#https://}"
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          target_is_current() {
            local output_path="$1"
            rm -f "$output_path"
            curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
              --fail --silent --show-error --header "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
              --output "$output_path" \
            && env -u GITHUB_OUTPUT node --experimental-strip-types \
              scripts/validate-vercel-deployment.mjs promoted \
              "$output_path" "$deployment_host" >/dev/null 2>&1
          }
          if target_is_current "$RUNNER_TEMP/public-demo-holding-current-before.json"; then
            echo "The exact holding deployment is already current."
            exit 0
          fi
          if vercel rollback "$HOLDING_DEPLOYMENT_URL" --yes --timeout=5m; then
            exit 0
          fi
          if target_is_current "$RUNNER_TEMP/public-demo-holding-current-after.json"; then
            echo "The exact holding deployment became current during restoration."
            exit 0
          fi
          exit 1

      - name: Prove the emergency holding fallback at the canonical hostname
        id: holding-fallback-proof
        if: always() && steps.holding-fallback.outcome == 'success'
        continue-on-error: true
        timeout-minutes: 10
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          APPROVED_HOLDING_DEPLOYMENT_ID: ${{ steps.holding.outputs.deployment_id }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          deployment_host="${APP_BASE_URL#https://}"
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          for attempt in $(seq 1 20); do
            curl --connect-timeout 10 --max-time 30 --fail --silent --show-error \
              --header "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
              --output "$RUNNER_TEMP/public-demo-holding-fallback.json"
            if env -u GITHUB_OUTPUT node --experimental-strip-types \
                scripts/validate-vercel-deployment.mjs holding \
                "$RUNNER_TEMP/public-demo-holding-fallback.json" "$deployment_host" \
                >/dev/null 2>&1; then
              break
            fi
            if test "$attempt" = 20; then exit 1; fi
            sleep 3
          done
          status="$(curl --connect-timeout 10 --max-time 30 --silent --show-error \
            --max-filesize 1048576 --output "$RUNNER_TEMP/public-demo-holding-fallback.html" \
            --write-out '%{http_code}' "$APP_BASE_URL/")"
          test "$status" = "200"
          cmp "$RUNNER_TEMP/public-demo-holding-fallback.html" holding/login.html
          health_status="$(curl --connect-timeout 10 --max-time 30 --silent --show-error \
            --output /dev/null --write-out '%{http_code}' "$APP_BASE_URL/api/health")"
          test "$health_status" = "404"

      - name: Require a proven automatic rollback or emergency holding fallback
        if: >-
          always() &&
          steps.promote.outcome == 'success' &&
          steps.canonical-proof.outcome != 'success'
        env:
          HOLDING_FALLBACK_PROOF_OUTCOME: ${{ steps.holding-fallback-proof.outcome }}
          ROLLBACK_PROOF_OUTCOME: ${{ steps.rollback-proof.outcome }}
        run: |
          if test "$ROLLBACK_PROOF_OUTCOME" = "success"; then exit 0; fi
          test "$HOLDING_FALLBACK_PROOF_OUTCOME" = "success"

  containment:
    name: Roll back or contain the public demo alias
    needs: authorize
    if: needs.authorize.outputs.action == 'rollback' || needs.authorize.outputs.action == 'contain'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: demo-containment
    steps:
      - name: Check out the exact authorized containment revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          ref: ${{ inputs.release_commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up the pinned Node.js runtime
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install exact containment dependencies
        run: |
          set -euo pipefail
          npm ci
          npm install --global --ignore-scripts vercel@56.1.0

      - name: Reverify exact current main and isolated Vercel identity
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          EXPECTED_VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          MARKETING_VERCEL_PROJECT_ID: ${{ vars.MARKETING_VERCEL_PROJECT_ID }}
          PRODUCTION_VERCEL_PROJECT_ID: ${{ vars.PRODUCTION_VERCEL_PROJECT_ID }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          git fetch origin main:refs/remotes/origin/main --force --no-tags
          test "$(git rev-parse --verify 'HEAD^{commit}')" = "$RELEASE_COMMIT"
          test "$(git rev-parse refs/remotes/origin/main)" = "$RELEASE_COMMIT"
          test "$APP_BASE_URL" = "https://demo.kinresolve.com"
          test "$VERCEL_PROJECT_ID" = "$EXPECTED_VERCEL_PROJECT_ID"
          test "$VERCEL_PROJECT_ID" != "$PRODUCTION_VERCEL_PROJECT_ID"
          test "$VERCEL_PROJECT_ID" != "$MARKETING_VERCEL_PROJECT_ID"

      - name: Fetch and validate the requested rollback or holding deployment
        id: target
        env:
          ACTION: ${{ needs.authorize.outputs.action }}
          APPROVED_HOLDING_DEPLOYMENT_ID: ${{ secrets.DEMO_HOLDING_DEPLOYMENT_ID }}
          DEMO_HOLDING_DEPLOYMENT_ID: ${{ secrets.DEMO_HOLDING_DEPLOYMENT_ID }}
          ROLLBACK_DEPLOYMENT_ID: ${{ needs.authorize.outputs.rollback_deployment_id }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          if test "$ACTION" = "contain"; then
            target_id="$DEMO_HOLDING_DEPLOYMENT_ID"
            mode="holding-record"
          else
            target_id="$ROLLBACK_DEPLOYMENT_ID"
            mode="demo-rollback"
          fi
          [[ "$target_id" =~ ^dpl_[A-Za-z0-9]{8,96}$ ]]
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
            --fail --silent --show-error --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v13/deployments/$target_id$scope_query" \
            --output "$RUNNER_TEMP/public-demo-containment-target.json"
          node --experimental-strip-types scripts/validate-vercel-deployment.mjs "$mode" \
            "$RUNNER_TEMP/public-demo-containment-target.json"

      - name: Roll back to the validated prior demo deployment
        if: needs.authorize.outputs.action == 'rollback'
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          CANDIDATE_DEPLOYMENT_ID: ${{ steps.target.outputs.deployment_id }}
          ROLLBACK_DEPLOYMENT_ID: ${{ steps.target.outputs.deployment_id }}
          ROLLBACK_DEPLOYMENT_URL: ${{ steps.target.outputs.deployment_url }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          [[ "$ROLLBACK_DEPLOYMENT_ID" =~ ^dpl_[A-Za-z0-9]{8,96}$ ]]
          deployment_host="${APP_BASE_URL#https://}"
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          target_is_current() {
            local output_path="$1"
            rm -f "$output_path"
            curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
              --fail --silent --show-error --header "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
              --output "$output_path" \
            && env -u GITHUB_OUTPUT node --experimental-strip-types \
              scripts/validate-vercel-deployment.mjs promoted \
              "$output_path" "$deployment_host" >/dev/null 2>&1
          }
          if target_is_current "$RUNNER_TEMP/public-demo-manual-rollback-current-before.json"; then
            echo "The exact requested rollback deployment is already current."
            exit 0
          fi
          if vercel rollback "$ROLLBACK_DEPLOYMENT_URL" --yes --timeout=5m; then
            exit 0
          fi
          if target_is_current "$RUNNER_TEMP/public-demo-manual-rollback-current-after.json"; then
            echo "The exact requested rollback deployment became current during restoration."
            exit 0
          fi
          exit 1

      - name: Roll back to the pinned static holding deployment
        if: needs.authorize.outputs.action == 'contain'
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          CANDIDATE_DEPLOYMENT_ID: ${{ steps.target.outputs.deployment_id }}
          DEMO_HOLDING_DEPLOYMENT_ID: ${{ steps.target.outputs.deployment_id }}
          HOLDING_DEPLOYMENT_URL: ${{ steps.target.outputs.deployment_url }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          [[ "$DEMO_HOLDING_DEPLOYMENT_ID" =~ ^dpl_[A-Za-z0-9]{8,96}$ ]]
          deployment_host="${APP_BASE_URL#https://}"
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          target_is_current() {
            local output_path="$1"
            rm -f "$output_path"
            curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
              --fail --silent --show-error --header "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
              --output "$output_path" \
            && env -u GITHUB_OUTPUT node --experimental-strip-types \
              scripts/validate-vercel-deployment.mjs promoted \
              "$output_path" "$deployment_host" >/dev/null 2>&1
          }
          if target_is_current "$RUNNER_TEMP/public-demo-contain-current-before.json"; then
            echo "The exact holding deployment is already current."
            exit 0
          fi
          if vercel rollback "$HOLDING_DEPLOYMENT_URL" --yes --timeout=5m; then
            exit 0
          fi
          if target_is_current "$RUNNER_TEMP/public-demo-contain-current-after.json"; then
            echo "The exact holding deployment became current during restoration."
            exit 0
          fi
          exit 1

      - name: Prove the requested canonical containment state
        env:
          ACTION: ${{ needs.authorize.outputs.action }}
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          APPROVED_HOLDING_DEPLOYMENT_ID: ${{ secrets.DEMO_HOLDING_DEPLOYMENT_ID }}
          CANDIDATE_DEPLOYMENT_ID: ${{ steps.target.outputs.deployment_id }}
          KINRESOLVE_DEMO_CANARY_SECRET: ${{ secrets.KINRESOLVE_DEMO_CANARY_SECRET }}
          KINRESOLVE_OBSERVABILITY_PROBE_SECRET: ${{ secrets.KINRESOLVE_OBSERVABILITY_PROBE_SECRET }}
          PUBLIC_DEMO_ORIGIN: ${{ vars.APP_BASE_URL }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          deployment_host="${APP_BASE_URL#https://}"
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          canonical_ready="false"
          for attempt in $(seq 1 20); do
            curl --connect-timeout 10 --max-time 30 --fail --silent --show-error \
              --header "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
              --output "$RUNNER_TEMP/public-demo-contained.json"
            if test "$ACTION" = "contain"; then
              mode="holding"
            else
              mode="promoted"
            fi
            if env -u GITHUB_OUTPUT node --experimental-strip-types \
                scripts/validate-vercel-deployment.mjs "$mode" \
                "$RUNNER_TEMP/public-demo-contained.json" "$deployment_host" >/dev/null 2>&1; then
              canonical_ready="true"
              break
            fi
            if test "$attempt" = 20; then exit 1; fi
            sleep 3
          done
          test "$canonical_ready" = "true"
          if test "$ACTION" = "contain"; then
            status="$(curl --connect-timeout 10 --max-time 30 --silent --show-error \
              --max-filesize 1048576 --output "$RUNNER_TEMP/public-demo-contained.html" \
              --write-out '%{http_code}' "$APP_BASE_URL/")"
            test "$status" = "200"
            cmp "$RUNNER_TEMP/public-demo-contained.html" holding/login.html
            health_status="$(curl --connect-timeout 10 --max-time 30 --silent --show-error \
              --output /dev/null --write-out '%{http_code}' "$APP_BASE_URL/api/health")"
            test "$health_status" = "404"
          else
            node --experimental-strip-types scripts/public-demo-monitor.mjs full
            node --experimental-strip-types scripts/public-demo-internal-health-monitor.mjs
          fi
