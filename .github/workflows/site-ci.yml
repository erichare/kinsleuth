name: Marketing site CI

on:
  pull_request:
    paths:
      - "site/**"
      - "openapi/**"
      - "scripts/validate-launch-media.mjs"
      - "scripts/launch-media-text.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/site-ci.yml"
  push:
    branches: [main]
    paths:
      - "site/**"
      - "openapi/**"
      - "scripts/validate-launch-media.mjs"
      - "scripts/launch-media-text.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/site-ci.yml"

permissions:
  contents: read

concurrency:
  group: marketing-site-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify ${{ matrix.release-mode }} with ${{ matrix.application-mode }} intake, ${{ matrix.demo-mode }} demo, and ${{ matrix.analytics-mode || 'off' }} analytics
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        release-mode: [prelaunch, application, api-launch]
        application-mode: [mailto, application]
        demo-mode: [pending, live]
        # The include entries extend two existing combinations with the
        # plausible analytics mode, so both analytics values are proved
        # without adding jobs; every other combination stays off.
        include:
          - release-mode: prelaunch
            application-mode: mailto
            demo-mode: pending
            analytics-mode: plausible
          - release-mode: application
            application-mode: application
            demo-mode: live
            analytics-mode: plausible
    env:
      KINRESOLVE_MARKETING_RELEASE_MODE: ${{ matrix.release-mode }}
      KINRESOLVE_MARKETING_BETA_APPLICATION_MODE: ${{ matrix.application-mode }}
      KINRESOLVE_MARKETING_DEMO_MODE: ${{ matrix.demo-mode }}
      KINRESOLVE_MARKETING_ANALYTICS: ${{ matrix.analytics-mode || 'off' }}
    defaults:
      run:
        working-directory: site
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            site/package-lock.json

      - name: Install launch-media validator dependencies
        working-directory: .
        run: npm ci

      - name: Install marketing dependencies
        run: npm ci

      - name: Validate the committed synthetic launch media
        working-directory: .
        run: npm run launch:media:validate

      - name: Verify the exact release and intake export
        run: |
          rm -rf .next out
          npm run verify
