name: Marketing site CI

on:
  pull_request:
    paths:
      - "site/**"
      - "openapi/**"
      - "scripts/validate-launch-media.mjs"
      - "scripts/launch-media-text.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/site-ci.yml"
  push:
    branches: [main]
    paths:
      - "site/**"
      - "openapi/**"
      - "scripts/validate-launch-media.mjs"
      - "scripts/launch-media-text.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/site-ci.yml"

permissions:
  contents: read

concurrency:
  group: marketing-site-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify ${{ matrix.release-mode }} with ${{ matrix.application-mode }} intake and ${{ matrix.demo-mode }} demo
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        release-mode: [prelaunch, application, api-launch]
        application-mode: [mailto, application]
        demo-mode: [pending, live]
    env:
      KINRESOLVE_MARKETING_RELEASE_MODE: ${{ matrix.release-mode }}
      KINRESOLVE_MARKETING_BETA_APPLICATION_MODE: ${{ matrix.application-mode }}
      KINRESOLVE_MARKETING_DEMO_MODE: ${{ matrix.demo-mode }}
    defaults:
      run:
        working-directory: site
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js and install launch-media validator dependencies
        uses: ./.github/actions/setup-node-npm
        with:
          node-version: "24"
          cache-dependency-path: |
            package-lock.json
            site/package-lock.json

      - name: Install marketing dependencies
        run: npm ci

      - name: Validate the committed synthetic launch media
        working-directory: .
        run: npm run launch:media:validate

      - name: Verify the exact release and intake export
        run: |
          rm -rf .next out
          npm run verify
