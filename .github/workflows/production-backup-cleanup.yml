name: Production backup fence cleanup
run-name: Clean backup run ${{ github.event.workflow_run.id }} attempt ${{ github.event.workflow_run.run_attempt }}

on:
  workflow_run:
    workflows:
      - Production encrypted backup
    types:
      - completed

permissions:
  actions: read
  contents: read

concurrency:
  group: kinresolve-beta-production-backup-cleanup
  queue: max
  cancel-in-progress: false

jobs:
  authorize:
    name: Authorize exact failed backup fence cleanup
    if: >-
      github.event.workflow_run.conclusion == 'failure' ||
      github.event.workflow_run.conclusion == 'cancelled' ||
      github.event.workflow_run.conclusion == 'timed_out'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
    outputs:
      artifact_id: ${{ steps.discover.outputs.artifact_id }}
      authorized: ${{ steps.validate_lease.outputs.authorized || steps.absent_lease.outputs.authorized }}
    env:
      BACKUP_CLEANUP_LEASE_ARTIFACT_NAME: production-backup-cleanup-lease-${{ github.event.workflow_run.run_attempt }}
      EXPECTED_SOURCE_WORKFLOW_ID: ${{ vars.PRODUCTION_BACKUP_WORKFLOW_ID }}
      REQUIRE_EXPECTED_SOURCE_WORKFLOW_ID: "true"
      SOURCE_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
      SOURCE_RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
      SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}

    steps:
      - name: Check out the trusted authorization gate from main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Node.js for the credential-free authorization gate
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Authorize the exact failed production backup event without credentials
        shell: bash
        env:
          ALLOWED_SOURCE_CONCLUSIONS: failure,cancelled,timed_out
          ALLOWED_SOURCE_EVENTS: workflow_dispatch
          EXPECTED_SOURCE_WORKFLOW_PATH: .github/workflows/production-backup.yml
          REQUIRED_HEAD_BRANCH: main
        run: |
          set -euo pipefail
          node --experimental-strip-types scripts/authorize-workflow-run-source.mjs
          work="${RUNNER_TEMP}/kinresolve-production-backup-cleanup-authorization"
          install -d -m 700 "${work}"
          echo "BACKUP_CLEANUP_AUTH_WORK=${work}" >> "${GITHUB_ENV}"

      - name: Query the exact source run for its cleanup lease artifact
        id: discover
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api --method GET \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${GITHUB_REPOSITORY}/actions/runs/${SOURCE_RUN_ID}/artifacts?name=${BACKUP_CLEANUP_LEASE_ARTIFACT_NAME}&per_page=100" \
            > "${BACKUP_CLEANUP_AUTH_WORK}/artifacts.json"
          node - <<'NODE'
          const { appendFileSync, readFileSync } = require("node:fs");
          const response = JSON.parse(readFileSync(
            `${process.env.BACKUP_CLEANUP_AUTH_WORK}/artifacts.json`, "utf8"
          ));
          const artifacts = response?.artifacts;
          if (!Number.isSafeInteger(response?.total_count) || response.total_count < 0 ||
              !Array.isArray(artifacts) || response.total_count !== artifacts.length) process.exit(1);
          if (artifacts.length === 0) {
            appendFileSync(process.env.GITHUB_OUTPUT, "lease_present=false\n");
            process.exit(0);
          }
          if (artifacts.length !== 1) process.exit(1);
          const artifact = artifacts[0];
          const expiresAt = Date.parse(artifact?.expires_at ?? "");
          if (!Number.isSafeInteger(artifact?.id) || artifact.id < 1 ||
              artifact?.name !== process.env.BACKUP_CLEANUP_LEASE_ARTIFACT_NAME ||
              String(artifact?.workflow_run?.id ?? "") !== process.env.SOURCE_RUN_ID ||
              artifact?.workflow_run?.head_branch !== "main" ||
              artifact?.workflow_run?.head_sha !== process.env.SOURCE_HEAD_SHA ||
              artifact?.expired !== false || !Number.isFinite(expiresAt) || expiresAt <= Date.now() ||
              !Number.isSafeInteger(artifact?.size_in_bytes) || artifact.size_in_bytes < 1) process.exit(1);
          appendFileSync(
            process.env.GITHUB_OUTPUT,
            `lease_present=true\nartifact_id=${artifact.id}\n`
          );
          NODE

      - name: Prove an absent lease was never published by the exact source attempt
        id: absent_lease
        if: steps.discover.outputs.lease_present == 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api --method GET \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${GITHUB_REPOSITORY}/actions/runs/${SOURCE_RUN_ID}/attempts/${SOURCE_RUN_ATTEMPT}/jobs?per_page=100" \
            > "${BACKUP_CLEANUP_AUTH_WORK}/source-attempt-jobs.json"
          node - <<'NODE'
          const { appendFileSync, readFileSync } = require("node:fs");
          const response = JSON.parse(readFileSync(
            `${process.env.BACKUP_CLEANUP_AUTH_WORK}/source-attempt-jobs.json`, "utf8"
          ));
          const jobs = response?.jobs;
          if (!Number.isSafeInteger(response?.total_count) || response.total_count < 0 ||
              !Array.isArray(jobs) || response.total_count !== jobs.length) process.exit(1);
          const backupJobs = jobs.filter((job) =>
            job?.name === "Capture and round-trip the isolated production cell" &&
            String(job?.run_id ?? "") === process.env.SOURCE_RUN_ID &&
            String(job?.run_attempt ?? "") === process.env.SOURCE_RUN_ATTEMPT
          );
          if (backupJobs.length > 1) process.exit(1);
          const publicationSteps = backupJobs.flatMap((job) =>
            Array.isArray(job?.steps)
              ? job.steps.filter((step) =>
                  step?.name === "Publish the immutable backup cleanup lease before fence acquisition"
                )
              : []
          );
          if (publicationSteps.length > 1 || publicationSteps[0]?.conclusion === "success") {
            process.exit(1);
          }
          appendFileSync(process.env.GITHUB_OUTPUT, "authorized=false\n");
          NODE
          echo "The exact source attempt never published a cleanup lease; it could not acquire a fence." \
            >> "${GITHUB_STEP_SUMMARY}"

      - name: Check out the trusted cleanup implementation from protected main
        if: steps.discover.outputs.lease_present == 'true'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify trusted implementation and exact source provenance
        if: steps.discover.outputs.lease_present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main:refs/remotes/origin/main --force --no-tags
          test "$(git rev-parse --verify 'HEAD^{commit}')" = "${GITHUB_SHA}"
          git merge-base --is-ancestor HEAD origin/main
          git merge-base --is-ancestor "${SOURCE_HEAD_SHA}" origin/main

      - name: Set up the pinned Node runtime
        if: steps.discover.outputs.lease_present == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Install exact authorization dependencies
        if: steps.discover.outputs.lease_present == 'true'
        shell: bash
        run: npm ci

      - name: Download only the immutable artifact selected by ID
        if: steps.discover.outputs.lease_present == 'true'
        shell: bash
        env:
          ARTIFACT_ID: ${{ steps.discover.outputs.artifact_id }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          [[ "${ARTIFACT_ID}" =~ ^[1-9][0-9]{0,19}$ ]]
          gh api --method GET \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}/zip" \
            > "${BACKUP_CLEANUP_AUTH_WORK}/cleanup-lease.zip"
          mapfile -t entries < <(unzip -Z1 "${BACKUP_CLEANUP_AUTH_WORK}/cleanup-lease.zip")
          test "${#entries[@]}" -eq 1
          test "${entries[0]}" = "production-backup-cleanup-lease.json"
          unzip -p "${BACKUP_CLEANUP_AUTH_WORK}/cleanup-lease.zip" \
            production-backup-cleanup-lease.json \
            > "${BACKUP_CLEANUP_AUTH_WORK}/production-backup-cleanup-lease.json"

      - name: Validate the lease against the exact failed source run
        id: validate_lease
        if: steps.discover.outputs.lease_present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          node --experimental-strip-types scripts/production-backup-cleanup-lease.mjs validate-source \
            "${BACKUP_CLEANUP_AUTH_WORK}/production-backup-cleanup-lease.json"
          release_commit=$(jq -er '.releaseCommit' \
            "${BACKUP_CLEANUP_AUTH_WORK}/production-backup-cleanup-lease.json")
          git cat-file -e "${release_commit}^{commit}"
          git merge-base --is-ancestor "${release_commit}" origin/main
          echo "authorized=true" >> "${GITHUB_OUTPUT}"

      - name: Remove local authorization material
        if: always()
        shell: bash
        run: |
          if test -n "${BACKUP_CLEANUP_AUTH_WORK:-}"; then
            rm -rf "${BACKUP_CLEANUP_AUTH_WORK}"
          fi

  cleanup:
    name: Release only the exact failed backup fence
    needs: authorize
    if: needs.authorize.result == 'success' && needs.authorize.outputs.authorized == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: production-backup-cleanup
    permissions:
      actions: read
      contents: read
    env:
      BACKUP_CLEANUP_LEASE_ARTIFACT_NAME: production-backup-cleanup-lease-${{ github.event.workflow_run.run_attempt }}
      EXPECTED_DATABASE_IDENTITY: ${{ vars.KINRESOLVE_DATABASE_IDENTITY }}
      SOURCE_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
      SOURCE_RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
      SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}

    steps:
      - name: Validate current protected identity before immutable checkout
        shell: bash
        env:
          AUTHORIZED_ARTIFACT_ID: ${{ needs.authorize.outputs.artifact_id }}
        run: |
          set -euo pipefail
          [[ "${SOURCE_RUN_ID}" =~ ^[1-9][0-9]{0,19}$ ]]
          [[ "${SOURCE_RUN_ATTEMPT}" =~ ^[1-9][0-9]{0,19}$ ]]
          [[ "${SOURCE_HEAD_SHA}" =~ ^[a-f0-9]{40}$ ]]
          [[ "${AUTHORIZED_ARTIFACT_ID}" =~ ^[1-9][0-9]{0,19}$ ]]
          [[ "${EXPECTED_DATABASE_IDENTITY}" =~ ^[a-f0-9]{64}$ ]]
          work="${RUNNER_TEMP}/kinresolve-production-backup-cleanup"
          install -d -m 700 "${work}"
          echo "BACKUP_CLEANUP_WORK=${work}" >> "${GITHUB_ENV}"

      - name: Check out the trusted cleanup implementation from protected main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify trusted implementation and exact source provenance again
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main:refs/remotes/origin/main --force --no-tags
          test "$(git rev-parse --verify 'HEAD^{commit}')" = "${GITHUB_SHA}"
          git merge-base --is-ancestor HEAD origin/main
          git merge-base --is-ancestor "${SOURCE_HEAD_SHA}" origin/main

      - name: Set up the pinned Node runtime
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Install exact cleanup dependencies
        shell: bash
        run: npm ci

      - name: Re-query the authorized immutable cleanup artifact by ID
        shell: bash
        env:
          ARTIFACT_ID: ${{ needs.authorize.outputs.artifact_id }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api --method GET \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}" \
            > "${BACKUP_CLEANUP_WORK}/artifact.json"
          node - <<'NODE'
          const { readFileSync } = require("node:fs");
          const artifact = JSON.parse(readFileSync(
            `${process.env.BACKUP_CLEANUP_WORK}/artifact.json`, "utf8"
          ));
          const expiresAt = Date.parse(artifact?.expires_at ?? "");
          if (String(artifact?.id ?? "") !== process.env.ARTIFACT_ID ||
              artifact?.name !== process.env.BACKUP_CLEANUP_LEASE_ARTIFACT_NAME ||
              String(artifact?.workflow_run?.id ?? "") !== process.env.SOURCE_RUN_ID ||
              artifact?.workflow_run?.head_branch !== "main" ||
              artifact?.workflow_run?.head_sha !== process.env.SOURCE_HEAD_SHA ||
              artifact?.expired !== false || !Number.isFinite(expiresAt) || expiresAt <= Date.now() ||
              !Number.isSafeInteger(artifact?.size_in_bytes) || artifact.size_in_bytes < 1) process.exit(1);
          NODE

      - name: Re-download only the authorized immutable cleanup artifact
        shell: bash
        env:
          ARTIFACT_ID: ${{ needs.authorize.outputs.artifact_id }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api --method GET \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}/zip" \
            > "${BACKUP_CLEANUP_WORK}/cleanup-lease.zip"
          mapfile -t entries < <(unzip -Z1 "${BACKUP_CLEANUP_WORK}/cleanup-lease.zip")
          test "${#entries[@]}" -eq 1
          test "${entries[0]}" = "production-backup-cleanup-lease.json"
          unzip -p "${BACKUP_CLEANUP_WORK}/cleanup-lease.zip" \
            production-backup-cleanup-lease.json \
            > "${BACKUP_CLEANUP_WORK}/production-backup-cleanup-lease.json"

      - name: Revalidate the exact fence and current protected database identity
        shell: bash
        run: |
          set -euo pipefail
          lease="${BACKUP_CLEANUP_WORK}/production-backup-cleanup-lease.json"
          RELEASE_COMMIT=$(jq -er '.releaseCommit' "${lease}")
          RELEASE_FENCE_ID=$(jq -er '.fenceId' "${lease}")
          export RELEASE_COMMIT RELEASE_FENCE_ID
          node --experimental-strip-types scripts/production-backup-cleanup-lease.mjs validate "${lease}"
          git cat-file -e "${RELEASE_COMMIT}^{commit}"
          git merge-base --is-ancestor "${RELEASE_COMMIT}" origin/main
          echo "RELEASE_COMMIT=${RELEASE_COMMIT}" >> "${GITHUB_ENV}"
          echo "RELEASE_FENCE_ID=${RELEASE_FENCE_ID}" >> "${GITHUB_ENV}"

      - name: Release the exact failed-attempt fence or prove it is absent
        shell: bash
        env:
          RELEASE_FENCE_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
        run: |
          set -euo pipefail
          node --experimental-strip-types scripts/release-production-backup-fence.mjs \
            > "${BACKUP_CLEANUP_WORK}/fence-cleanup.json"
          jq -e \
            '(.found == false and .transition == "not-found") or
             (.found == true and
              (.transition == "released" or .transition == "already-released") and
              .fence.fenceId == env.RELEASE_FENCE_ID and
              .fence.releaseCommitSha == env.RELEASE_COMMIT and
              .fence.state == "released")' \
            "${BACKUP_CLEANUP_WORK}/fence-cleanup.json" > /dev/null
          echo "Exact backup fence cleanup completed or safely found no matching fence." \
            >> "${GITHUB_STEP_SUMMARY}"

      - name: Remove local cleanup material
        if: always()
        shell: bash
        run: |
          if test -n "${BACKUP_CLEANUP_WORK:-}"; then
            rm -rf "${BACKUP_CLEANUP_WORK}"
          fi
