name: Recovery target cleanup
run-name: Clean recovery run ${{ github.event.workflow_run.id }} attempt ${{ github.event.workflow_run.run_attempt }}

on:
  workflow_run:
    workflows:
      - Production recovery evidence
    types:
      - completed

permissions:
  actions: read
  contents: read

concurrency:
  group: kinresolve-beta-recovery-cleanup
  queue: max
  cancel-in-progress: false

jobs:
  authorize:
    name: Authorize the immutable failed-run cleanup lease
    if: >-
      github.event.workflow_run.conclusion == 'failure' ||
      github.event.workflow_run.conclusion == 'cancelled' ||
      github.event.workflow_run.conclusion == 'timed_out'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
    outputs:
      artifact_id: ${{ steps.discover.outputs.artifact_id }}
      authorized: ${{ steps.validate_lease.outputs.authorized || steps.discover.outputs.authorized }}
    env:
      RECOVERY_CLEANUP_LEASE_ARTIFACT_NAME: production-recovery-cleanup-lease-${{ github.event.workflow_run.run_attempt }}
      SOURCE_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
      SOURCE_RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
      SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}

    steps:
      - name: Validate the exact failed protected recovery event without credentials
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          const { readFileSync } = require("node:fs");
          const event = JSON.parse(readFileSync(process.env.GITHUB_EVENT_PATH, "utf8"));
          const run = event.workflow_run;
          if (
            event.action !== "completed" ||
            event.repository?.full_name !== process.env.GITHUB_REPOSITORY ||
            run?.repository?.full_name !== process.env.GITHUB_REPOSITORY ||
            run?.head_repository?.full_name !== process.env.GITHUB_REPOSITORY ||
            run?.name !== "Production recovery evidence" ||
            run?.path !== ".github/workflows/recovery-evidence.yml" ||
            run?.event !== "workflow_dispatch" ||
            run?.head_branch !== "main" ||
            !/^[1-9][0-9]{0,19}$/.test(String(run?.id ?? "")) ||
            !/^[1-9][0-9]{0,9}$/.test(String(run?.run_attempt ?? "")) ||
            !/^[a-f0-9]{40}$/.test(run?.head_sha ?? "") ||
            !["failure", "cancelled", "timed_out"].includes(run?.conclusion)
          ) process.exit(1);
          NODE
          work="${RUNNER_TEMP}/kinresolve-recovery-cleanup-authorization"
          install -d -m 700 "${work}"
          echo "RECOVERY_CLEANUP_AUTH_WORK=${work}" >> "${GITHUB_ENV}"

      - name: Query the exact source run for its cleanup lease artifact
        id: discover
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api --method GET \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${GITHUB_REPOSITORY}/actions/runs/${SOURCE_RUN_ID}/artifacts?name=${RECOVERY_CLEANUP_LEASE_ARTIFACT_NAME}&per_page=100" \
            > "${RECOVERY_CLEANUP_AUTH_WORK}/artifacts.json"
          node - <<'NODE'
          const { appendFileSync, readFileSync } = require("node:fs");
          const response = JSON.parse(readFileSync(
            `${process.env.RECOVERY_CLEANUP_AUTH_WORK}/artifacts.json`, "utf8"
          ));
          const artifacts = response?.artifacts;
          if (!Number.isSafeInteger(response?.total_count) || response.total_count < 0 ||
              !Array.isArray(artifacts) || response.total_count !== artifacts.length) process.exit(1);
          if (artifacts.length === 0) {
            appendFileSync(process.env.GITHUB_OUTPUT, "lease_present=false\n");
            process.exit(0);
          }
          if (artifacts.length !== 1) process.exit(1);
          const artifact = artifacts[0];
          const expiresAt = Date.parse(artifact?.expires_at ?? "");
          if (!Number.isSafeInteger(artifact?.id) || artifact.id < 1 ||
              artifact?.name !== process.env.RECOVERY_CLEANUP_LEASE_ARTIFACT_NAME ||
              String(artifact?.workflow_run?.id ?? "") !== process.env.SOURCE_RUN_ID ||
              artifact?.workflow_run?.head_branch !== "main" ||
              artifact?.workflow_run?.head_sha !== process.env.SOURCE_HEAD_SHA ||
              artifact?.expired !== false || !Number.isFinite(expiresAt) || expiresAt <= Date.now() ||
              !Number.isSafeInteger(artifact?.size_in_bytes) || artifact.size_in_bytes < 1) process.exit(1);
          appendFileSync(
            process.env.GITHUB_OUTPUT,
            `lease_present=true\nartifact_id=${artifact.id}\n`
          );
          NODE

      - name: Prove an absent lease was never published by the exact source attempt
        id: absent_lease
        if: steps.discover.outputs.lease_present == 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api --method GET \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${GITHUB_REPOSITORY}/actions/runs/${SOURCE_RUN_ID}/attempts/${SOURCE_RUN_ATTEMPT}/jobs?per_page=100" \
            > "${RECOVERY_CLEANUP_AUTH_WORK}/source-attempt-jobs.json"
          node - <<'NODE'
          const { appendFileSync, readFileSync } = require("node:fs");
          const response = JSON.parse(readFileSync(
            `${process.env.RECOVERY_CLEANUP_AUTH_WORK}/source-attempt-jobs.json`, "utf8"
          ));
          const jobs = response?.jobs;
          if (!Number.isSafeInteger(response?.total_count) || response.total_count < 0 ||
              !Array.isArray(jobs) || response.total_count !== jobs.length) process.exit(1);
          const recoverJobs = jobs.filter((job) =>
            job?.name === "Prove encrypted production recovery" &&
            String(job?.run_id ?? "") === process.env.SOURCE_RUN_ID &&
            String(job?.run_attempt ?? "") === process.env.SOURCE_RUN_ATTEMPT
          );
          if (recoverJobs.length > 1) process.exit(1);
          const publicationSteps = recoverJobs.flatMap((job) =>
            Array.isArray(job?.steps)
              ? job.steps.filter((step) =>
                  step?.name === "Publish the immutable source-run cleanup lease before protected mutations"
                )
              : []
          );
          if (publicationSteps.length > 1 || publicationSteps[0]?.conclusion === "success") {
            process.exit(1);
          }
          appendFileSync(process.env.GITHUB_OUTPUT, "authorized=false\n");
          NODE
          echo "The exact source attempt never published a cleanup lease, so no later protected mutation could run." \
            >> "${GITHUB_STEP_SUMMARY}"

      - name: Check out the immutable trusted cleanup implementation
        if: steps.discover.outputs.lease_present == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify trusted implementation and exact source provenance
        if: steps.discover.outputs.lease_present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main:refs/remotes/origin/main --force --no-tags
          test "$(git rev-parse --verify 'HEAD^{commit}')" = "${GITHUB_SHA}"
          git merge-base --is-ancestor HEAD origin/main
          git merge-base --is-ancestor "${SOURCE_HEAD_SHA}" origin/main

      - name: Set up the pinned Node runtime
        if: steps.discover.outputs.lease_present == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install exact authorization dependencies
        if: steps.discover.outputs.lease_present == 'true'
        shell: bash
        run: npm ci

      - name: Download only the immutable artifact selected by ID
        if: steps.discover.outputs.lease_present == 'true'
        shell: bash
        env:
          ARTIFACT_ID: ${{ steps.discover.outputs.artifact_id }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          [[ "${ARTIFACT_ID}" =~ ^[1-9][0-9]{0,19}$ ]]
          gh api --method GET \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}/zip" \
            > "${RECOVERY_CLEANUP_AUTH_WORK}/cleanup-lease.zip"
          mapfile -t entries < <(unzip -Z1 "${RECOVERY_CLEANUP_AUTH_WORK}/cleanup-lease.zip")
          test "${#entries[@]}" -eq 1
          test "${entries[0]}" = "production-recovery-cleanup-lease.json"
          unzip -p "${RECOVERY_CLEANUP_AUTH_WORK}/cleanup-lease.zip" \
            production-recovery-cleanup-lease.json \
            > "${RECOVERY_CLEANUP_AUTH_WORK}/production-recovery-cleanup-lease.json"

      - name: Validate the lease against the exact failed source run
        id: validate_lease
        if: steps.discover.outputs.lease_present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          node --experimental-strip-types scripts/recovery-cleanup-lease.mjs validate-source \
            "${RECOVERY_CLEANUP_AUTH_WORK}/production-recovery-cleanup-lease.json"
          echo "authorized=true" >> "${GITHUB_OUTPUT}"

      - name: Remove local authorization material
        if: always()
        shell: bash
        run: |
          if test -n "${RECOVERY_CLEANUP_AUTH_WORK:-}"; then
            rm -rf "${RECOVERY_CLEANUP_AUTH_WORK}"
          fi

  cleanup:
    name: Contain the exact lease-bound failed recovery target
    needs: authorize
    if: needs.authorize.result == 'success' && needs.authorize.outputs.authorized == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    environment: production-recovery-cleanup
    permissions:
      actions: read
      contents: read
    env:
      EXPECTED_ARCHIVE_ID: ${{ vars.EXPECTED_ARCHIVE_ID }}
      KINRESOLVE_DATABASE_IDENTITY: ${{ vars.KINRESOLVE_DATABASE_IDENTITY }}
      KINRESOLVE_OBJECT_STORAGE_IDENTITY: ${{ vars.KINRESOLVE_OBJECT_STORAGE_IDENTITY }}
      KINRESOLVE_OBJECT_STORAGE_PROVIDER_ID: ${{ vars.KINRESOLVE_OBJECT_STORAGE_PROVIDER_ID }}
      RECOVERY_TARGET_DATABASE_IDENTITY: ${{ vars.RECOVERY_TARGET_DATABASE_IDENTITY }}
      RECOVERY_TARGET_OBJECT_STORAGE_IDENTITY: ${{ vars.RECOVERY_TARGET_OBJECT_STORAGE_IDENTITY }}
      RECOVERY_TARGET_OBJECT_STORAGE_PROVIDER_ID: ${{ vars.RECOVERY_TARGET_OBJECT_STORAGE_PROVIDER_ID }}
      RECOVERY_CLEANUP_LEASE_ARTIFACT_NAME: production-recovery-cleanup-lease-${{ github.event.workflow_run.run_attempt }}
      SOURCE_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
      SOURCE_RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
      SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      RECOVERY_TARGET_SUPABASE_PROJECT_REF: ${{ vars.RECOVERY_TARGET_SUPABASE_PROJECT_REF }}

    steps:
      - name: Validate current protected identities before immutable checkout
        shell: bash
        env:
          AUTHORIZED_ARTIFACT_ID: ${{ needs.authorize.outputs.artifact_id }}
        run: |
          set -euo pipefail
          [[ "${SOURCE_RUN_ID}" =~ ^[1-9][0-9]{0,19}$ ]]
          [[ "${SOURCE_RUN_ATTEMPT}" =~ ^[1-9][0-9]{0,19}$ ]]
          [[ "${SOURCE_HEAD_SHA}" =~ ^[a-f0-9]{40}$ ]]
          [[ "${AUTHORIZED_ARTIFACT_ID}" =~ ^[1-9][0-9]{0,19}$ ]]
          required=(
            EXPECTED_ARCHIVE_ID KINRESOLVE_DATABASE_IDENTITY KINRESOLVE_OBJECT_STORAGE_IDENTITY
            KINRESOLVE_OBJECT_STORAGE_PROVIDER_ID RECOVERY_TARGET_DATABASE_IDENTITY
            RECOVERY_TARGET_OBJECT_STORAGE_IDENTITY RECOVERY_TARGET_OBJECT_STORAGE_PROVIDER_ID
            SUPABASE_PROJECT_REF RECOVERY_TARGET_SUPABASE_PROJECT_REF
          )
          for name in "${required[@]}"; do test -n "${!name}"; done
          test "${KINRESOLVE_DATABASE_IDENTITY}" != "${RECOVERY_TARGET_DATABASE_IDENTITY}"
          test "${KINRESOLVE_OBJECT_STORAGE_IDENTITY}" != "${RECOVERY_TARGET_OBJECT_STORAGE_IDENTITY}"
          test "${KINRESOLVE_OBJECT_STORAGE_PROVIDER_ID}" != "${RECOVERY_TARGET_OBJECT_STORAGE_PROVIDER_ID}"
          [[ "${SUPABASE_PROJECT_REF}" =~ ^[a-z0-9]{20}$ ]]
          [[ "${RECOVERY_TARGET_SUPABASE_PROJECT_REF}" =~ ^[a-z0-9]{20}$ ]]
          test "${SUPABASE_PROJECT_REF}" != "${RECOVERY_TARGET_SUPABASE_PROJECT_REF}"
          work="${RUNNER_TEMP}/kinresolve-recovery-cleanup"
          install -d -m 700 "${work}"
          echo "RECOVERY_CLEANUP_WORK=${work}" >> "${GITHUB_ENV}"

      - name: Check out the immutable trusted cleanup implementation
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify trusted implementation and exact source provenance again
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main:refs/remotes/origin/main --force --no-tags
          test "$(git rev-parse --verify 'HEAD^{commit}')" = "${GITHUB_SHA}"
          git merge-base --is-ancestor HEAD origin/main
          git merge-base --is-ancestor "${SOURCE_HEAD_SHA}" origin/main

      - name: Set up the pinned Node runtime
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install exact cleanup dependencies
        id: install
        shell: bash
        run: npm ci

      - name: Re-query the authorized immutable cleanup artifact by ID
        shell: bash
        env:
          ARTIFACT_ID: ${{ needs.authorize.outputs.artifact_id }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api --method GET \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}" \
            > "${RECOVERY_CLEANUP_WORK}/artifact.json"
          node - <<'NODE'
          const { readFileSync } = require("node:fs");
          const artifact = JSON.parse(readFileSync(
            `${process.env.RECOVERY_CLEANUP_WORK}/artifact.json`, "utf8"
          ));
          const expiresAt = Date.parse(artifact?.expires_at ?? "");
          if (String(artifact?.id ?? "") !== process.env.ARTIFACT_ID ||
              artifact?.name !== process.env.RECOVERY_CLEANUP_LEASE_ARTIFACT_NAME ||
              String(artifact?.workflow_run?.id ?? "") !== process.env.SOURCE_RUN_ID ||
              artifact?.workflow_run?.head_branch !== "main" ||
              artifact?.workflow_run?.head_sha !== process.env.SOURCE_HEAD_SHA ||
              artifact?.expired !== false || !Number.isFinite(expiresAt) || expiresAt <= Date.now() ||
              !Number.isSafeInteger(artifact?.size_in_bytes) || artifact.size_in_bytes < 1) process.exit(1);
          NODE

      - name: Re-download only the authorized immutable cleanup artifact
        shell: bash
        env:
          ARTIFACT_ID: ${{ needs.authorize.outputs.artifact_id }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api --method GET \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}/zip" \
            > "${RECOVERY_CLEANUP_WORK}/cleanup-lease.zip"
          mapfile -t entries < <(unzip -Z1 "${RECOVERY_CLEANUP_WORK}/cleanup-lease.zip")
          test "${#entries[@]}" -eq 1
          test "${entries[0]}" = "production-recovery-cleanup-lease.json"
          unzip -p "${RECOVERY_CLEANUP_WORK}/cleanup-lease.zip" \
            production-recovery-cleanup-lease.json \
            > "${RECOVERY_CLEANUP_WORK}/production-recovery-cleanup-lease.json"

      - name: Revalidate the lease against current protected identities
        id: lease
        shell: bash
        run: |
          set -euo pipefail
          node --experimental-strip-types scripts/recovery-cleanup-lease.mjs validate \
            "${RECOVERY_CLEANUP_WORK}/production-recovery-cleanup-lease.json"
          echo "authorized=true" >> "${GITHUB_OUTPUT}"

      - name: Empty only the lease-bound disposable object namespaces
        id: object-cleanup
        if: steps.lease.outcome == 'success' && steps.lease.outputs.authorized == 'true'
        shell: bash
        env:
          RECOVERY_TARGET_BLOB_READ_WRITE_TOKEN: ${{ secrets.RECOVERY_TARGET_BLOB_READ_WRITE_TOKEN }}
        run: |
          set -euo pipefail
          node --experimental-strip-types scripts/cleanup-recovery-object-target.mjs \
            "${RECOVERY_CLEANUP_WORK}/target-object-cleanup-proof.json"

      - name: Destroy the lease-bound disposable database project
        if: >-
          always() &&
          steps.install.outcome == 'success' &&
          steps.lease.outcome == 'success' &&
          steps.lease.outputs.authorized == 'true'
        shell: bash
        env:
          RECOVERY_TARGET_DATABASE_URL: ${{ secrets.RECOVERY_TARGET_DATABASE_URL }}
          RECOVERY_TARGET_DESTRUCTION_REQUIRE_EXISTING: "false"
          RECOVERY_TARGET_DESTRUCTION_VERIFY_SOURCE: "false"
          RECOVERY_TARGET_SUPABASE_ACCESS_TOKEN: ${{ secrets.RECOVERY_TARGET_SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          node --experimental-strip-types scripts/destroy-recovery-database-target.mjs \
            "${RECOVERY_CLEANUP_WORK}/target-database-cleanup-proof.json"

      - name: Remove local cleanup proof
        if: always()
        shell: bash
        run: |
          if test -n "${RECOVERY_CLEANUP_WORK:-}"; then
            rm -rf "${RECOVERY_CLEANUP_WORK}"
          fi
