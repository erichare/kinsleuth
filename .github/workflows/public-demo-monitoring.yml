name: Monitor Kin Resolve public demo
run-name: Public demo monitor ${{ github.event.schedule || 'manual' }} run ${{ github.run_id }} attempt ${{ github.run_attempt }}

on:
  schedule:
    - cron: "*/15 * * * *"
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: kinresolve-public-demo-monitor-${{ github.event.schedule || 'manual' }}
  cancel-in-progress: false

jobs:
  shallow:
    name: Check demo landing, health, and public family bodies
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: demo-monitoring
    steps:
      - name: Check out the exact monitored main revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up the pinned Node.js runtime
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Run the body-aware shallow monitor
        env:
          KINRESOLVE_OBSERVABILITY_PROBE_SECRET: ${{ secrets.KINRESOLVE_OBSERVABILITY_PROBE_SECRET }}
          PUBLIC_DEMO_ORIGIN: ${{ vars.APP_BASE_URL }}
        run: |
          set -euo pipefail
          test "$PUBLIC_DEMO_ORIGIN" = "https://demo.kinresolve.com"
          node --experimental-strip-types scripts/public-demo-monitor.mjs shallow
          node --experimental-strip-types scripts/public-demo-internal-health-monitor.mjs

      - name: Signal a fixed-schema shallow monitor failure
        if: failure()
        env:
          DEMO_MONITOR_ALERT_URL: ${{ secrets.DEMO_MONITOR_ALERT_URL }}
        run: |
          set -euo pipefail
          if test -z "$DEMO_MONITOR_ALERT_URL"; then exit 0; fi
          [[ "$DEMO_MONITOR_ALERT_URL" =~ ^https:// ]]
          curl --fail --silent --show-error --connect-timeout 10 --max-time 30 \
            --retry 2 --retry-all-errors --request POST \
            --data-urlencode "monitor=public-demo-shallow" \
            --data-urlencode "status=failed" \
            --data-urlencode "run_id=$GITHUB_RUN_ID" \
            "$DEMO_MONITOR_ALERT_URL" > /dev/null

  full:
    name: Run the disposable start-task-end demo canary
    needs: shallow
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '17 */6 * * *'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    environment: demo-monitoring
    steps:
      - name: Check out the exact monitored main revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Set up the pinned Node.js runtime
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install the exact browser-canary dependencies
        run: npm ci

      - name: Install the pinned Chromium browser
        run: npx playwright install --with-deps chromium

      - name: Run the HTTP and Playwright disposable demo journeys
        env:
          KINRESOLVE_DEMO_CANARY_SECRET: ${{ secrets.KINRESOLVE_DEMO_CANARY_SECRET }}
          PUBLIC_DEMO_ORIGIN: ${{ vars.APP_BASE_URL }}
        run: |
          set -euo pipefail
          test "$PUBLIC_DEMO_ORIGIN" = "https://demo.kinresolve.com"
          node --experimental-strip-types scripts/public-demo-monitor.mjs full
          node scripts/public-demo-browser-canary.mjs

      - name: Signal a fixed-schema full monitor failure
        if: failure()
        env:
          DEMO_MONITOR_ALERT_URL: ${{ secrets.DEMO_MONITOR_ALERT_URL }}
        run: |
          set -euo pipefail
          if test -z "$DEMO_MONITOR_ALERT_URL"; then exit 0; fi
          [[ "$DEMO_MONITOR_ALERT_URL" =~ ^https:// ]]
          curl --fail --silent --show-error --connect-timeout 10 --max-time 30 \
            --retry 2 --retry-all-errors --request POST \
            --data-urlencode "monitor=public-demo-full" \
            --data-urlencode "status=failed" \
            --data-urlencode "run_id=$GITHUB_RUN_ID" \
            "$DEMO_MONITOR_ALERT_URL" > /dev/null
