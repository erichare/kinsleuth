name: Deploy stable release to Vercel

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: vercel-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.release.prerelease == false
    runs-on: ubuntu-latest
    environment: production
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: kinsleuth_test
          POSTGRES_USER: kinsleuth
          POSTGRES_PASSWORD: kinsleuth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kinsleuth -d kinsleuth_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PRODUCTION_URL: https://kinsleuth.vercel.app
      RELEASE_TAG: ${{ github.event.release.tag_name }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Check out the released revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Test Postgres persistence
        env:
          TEST_DATABASE_URL: postgres://kinsleuth:kinsleuth@localhost:5432/kinsleuth_test
        run: npm run test:db

      - name: Test large GEDCOM persistence
        env:
          TEST_DATABASE_URL: postgres://kinsleuth:kinsleuth@localhost:5432/kinsleuth_test
        run: npm run test:db:large

      - name: Pull Vercel production settings
        run: npx --yes vercel@55.0.0 pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Verify required production settings
        run: |
          npx --yes vercel@55.0.0 env ls production --format json --token="$VERCEL_TOKEN" > "$RUNNER_TEMP/vercel-env.json"
          node -e '
            const { readFileSync } = require("node:fs");
            const required = ["DATABASE_URL", "AUTH_SECRET", "KINSLEUTH_APP_PASSWORD", "BLOB_READ_WRITE_TOKEN", "CRON_SECRET"];
            const { envs = [] } = JSON.parse(readFileSync(`${process.env.RUNNER_TEMP}/vercel-env.json`, "utf8"));
            const project = JSON.parse(readFileSync(".vercel/project.json", "utf8"));
            const configured = new Set(
              envs
                .filter(({ target = [] }) => target.includes("production"))
                .map(({ key }) => key)
            );
            const missing = required.filter((name) => !configured.has(name));
            if (missing.length) {
              console.error(`Missing required Vercel production settings: ${missing.join(", ")}`);
              process.exit(1);
            }
            if (project.settings?.framework !== "nextjs") {
              console.error(`Expected the Vercel framework preset to be nextjs, got ${project.settings?.framework ?? "unset"}`);
              process.exit(1);
            }
          '

      - name: Build production artifact
        run: npx --yes vercel@55.0.0 build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production artifact
        id: deploy
        run: |
          deployment_url="$(npx --yes vercel@55.0.0 deploy --prebuilt --prod --token="$VERCEL_TOKEN")"
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Verify production health and access gate
        run: |
          health_status="$(curl --retry 10 --retry-delay 3 --retry-all-errors --fail-with-body --max-time 20 --silent --show-error --output health.json --write-out '%{http_code}' "$PRODUCTION_URL/api/health")"
          test "$health_status" = "200"
          node -e '
            const { readFileSync } = require("node:fs");
            const health = JSON.parse(readFileSync("health.json", "utf8"));
            const expectedVersion = process.env.RELEASE_TAG.replace(/^v/, "");
            if (health.status !== "ok" || health.database?.connected !== true || health.storage?.configured !== true || health.version !== expectedVersion) {
              console.error("Production health response did not match the released, connected application", health);
              process.exit(1);
            }
          '

          app_status="$(curl --max-time 20 --silent --show-error --dump-header app-headers.txt --output /dev/null --write-out '%{http_code}' "$PRODUCTION_URL/app")"
          case "$app_status" in
            302|303|307|308) ;;
            *) echo "Expected /app to redirect to login, got HTTP $app_status" >&2; exit 1 ;;
          esac
          app_location="$(awk 'tolower($1) == "location:" { print $2 }' app-headers.txt | tr -d '\r')"
          APP_LOCATION="$app_location" node -e '
            const expectedOrigin = new URL(process.env.PRODUCTION_URL).origin;
            const location = new URL(process.env.APP_LOCATION, expectedOrigin);
            if (location.origin !== expectedOrigin || location.pathname !== "/login" || location.searchParams.get("next") !== "/app") {
              console.error(`Expected /app to redirect to the Kin Resolve login gate, got ${location}`);
              process.exit(1);
            }
          '

          echo "Production deployment: ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Public application: $PRODUCTION_URL" >> "$GITHUB_STEP_SUMMARY"
