name: Release Kin Resolve beta candidate
run-name: Kin Resolve beta release run ${{ github.run_id }} attempt ${{ github.run_attempt }}

on:
  workflow_dispatch:
    inputs:
      release_commit:
        description: Full 40-character commit SHA currently at main
        required: true
        type: string
      release_version:
        description: Stable package version without the v prefix
        required: true
        type: string
      release_target:
        description: Stop after the isolated staging rehearsal, or continue through production
        required: true
        type: choice
        default: production
        options:
          - staging-only
          - production
      release_policy_acknowledged_at:
        description: RFC3339 timestamp of the forward-only cutover review
        required: true
        type: string
      first_cutover_acknowledgement:
        description: Exact forward-only acknowledgement from db/release-policy.json
        required: true
        type: string
      recovery_run_id:
        description: Successful production recovery-evidence workflow run ID; empty for staging-only
        required: false
        type: string
        default: ""
      recovery_evidence_sha256:
        description: SHA-256 of the attested recovery-evidence.json artifact; empty for staging-only
        required: false
        type: string
        default: ""
      release_mode:
        description: Keep the developer API disabled, or launch it with attested edge evidence
        required: true
        type: choice
        default: application
        options:
          - application
          - api-launch
      beta_intake_enabled:
        description: Enable the public fixed-field beta application intake after product and mail proof
        required: true
        type: boolean
        default: false
      beta_intake_acknowledgement:
        description: Exact synthetic intake and controlled-delivery acknowledgement; empty when intake is disabled
        required: false
        type: string
        default: ""
      api_edge_run_id:
        description: Successful API edge-evidence workflow run ID; required only for api-launch
        required: false
        type: string
        default: ""
      api_edge_evidence_sha256:
        description: SHA-256 of api-edge-evidence.json; required only for api-launch
        required: false
        type: string
        default: ""
      auto_assignment_acknowledgement:
        description: Exact acknowledgement that protected Vercel dashboard auto-assignment is disabled
        required: true
        type: string
      deployment_protection_acknowledgement:
        description: Exact acknowledgement that Standard Protection covers every generated URL with no exceptions
        required: true
        type: string
      writer_perimeter_acknowledgement:
        description: Exact production writer-perimeter acknowledgement; empty for staging-only
        required: false
        type: string
        default: ""

permissions:
  actions: read
  contents: read

concurrency:
  group: kinresolve-beta-release
  queue: max
  cancel-in-progress: false

jobs:
  safety:
    name: Require prior automatic safety work to finish
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out the trusted safety gate from main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Node.js for the credential-free safety gate
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Refuse to overtake unresolved containment or cleanup
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SAFETY_CURRENT_WORKFLOW: release
        run: node --experimental-strip-types scripts/validate-release-safety-queue.mjs

  verify:
    needs: safety
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      postgres:
        image: pgvector/pgvector:0.8.1-pg16@sha256:33198da2828a14c30348d2ccb4750833d5ed9a44c88d840a0e523d7417120337
        env:
          POSTGRES_DB: kinresolve_release_test
          POSTGRES_USER: kinresolve_ci
          POSTGRES_PASSWORD: kinresolve_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kinresolve_ci -d kinresolve_release_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Validate dispatch request before checkout
        env:
          GITHUB_REF_VALUE: ${{ github.ref }}
          EXPECTED_GITHUB_SHA: ${{ github.sha }}
          AUTO_ASSIGNMENT_ACKNOWLEDGEMENT: ${{ inputs.auto_assignment_acknowledgement }}
          DEPLOYMENT_PROTECTION_ACKNOWLEDGEMENT: ${{ inputs.deployment_protection_acknowledgement }}
          WRITER_PERIMETER_ACKNOWLEDGEMENT: ${{ inputs.writer_perimeter_acknowledgement }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RELEASE_MODE: ${{ inputs.release_mode }}
          RELEASE_TARGET: ${{ inputs.release_target }}
          BETA_INTAKE_ENABLED: ${{ inputs.beta_intake_enabled }}
          BETA_INTAKE_ACKNOWLEDGEMENT: ${{ inputs.beta_intake_acknowledgement }}
          API_EDGE_EVIDENCE_SHA256: ${{ inputs.api_edge_evidence_sha256 }}
          API_EDGE_RUN_ID: ${{ inputs.api_edge_run_id }}
          RECOVERY_EVIDENCE_SHA256: ${{ inputs.recovery_evidence_sha256 }}
          RECOVERY_RUN_ID: ${{ inputs.recovery_run_id }}
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          set -euo pipefail
          test "$GITHUB_REF_VALUE" = "refs/heads/main"
          [[ "$RELEASE_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$EXPECTED_GITHUB_SHA" =~ ^[0-9a-f]{40}$ ]]
          test "$RELEASE_COMMIT" = "$EXPECTED_GITHUB_SHA"
          test "$AUTO_ASSIGNMENT_ACKNOWLEDGEMENT" = "I acknowledge Vercel production deployment auto-assignment is disabled in the protected project dashboard."
          test "$DEPLOYMENT_PROTECTION_ACKNOWLEDGEMENT" = "I acknowledge Vercel Standard Protection covers every generated deployment URL and has no exceptions."
          [[ "$RELEASE_VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]
          [[ "$BETA_INTAKE_ENABLED" = "true" || "$BETA_INTAKE_ENABLED" = "false" ]]
          if [[ "$BETA_INTAKE_ENABLED" = "true" ]]; then
            test "$BETA_INTAKE_ACKNOWLEDGEMENT" = "I acknowledge the beta intake canary submits only fixed synthetic fields to the owner-approved controlled delivery sink and deletes its exact database row."
          else
            test -z "$BETA_INTAKE_ACKNOWLEDGEMENT"
          fi
          case "$RELEASE_TARGET" in
            staging-only)
              test "$RELEASE_MODE" = "application"
              test "$BETA_INTAKE_ENABLED" = "false"
              test -z "$RECOVERY_RUN_ID"
              test -z "$RECOVERY_EVIDENCE_SHA256"
              test -z "$API_EDGE_RUN_ID"
              test -z "$API_EDGE_EVIDENCE_SHA256"
              test -z "$WRITER_PERIMETER_ACKNOWLEDGEMENT"
              ;;
            production)
              [[ "$RECOVERY_RUN_ID" =~ ^[1-9][0-9]{0,19}$ ]]
              [[ "$RECOVERY_EVIDENCE_SHA256" =~ ^[0-9a-f]{64}$ ]]
              test "$WRITER_PERIMETER_ACKNOWLEDGEMENT" = "I acknowledge the production writer perimeter contains only the canonical Vercel runtime and protected GitHub release/recovery workflows; no external workers, SQL/API writers, or shared database/Blob credentials remain."
              ;;
            *)
              echo "Unsupported release target." >&2
              exit 1
              ;;
          esac
          case "$RELEASE_MODE" in
            application)
              test -z "$API_EDGE_RUN_ID"
              test -z "$API_EDGE_EVIDENCE_SHA256"
              ;;
            api-launch)
              [[ "$API_EDGE_RUN_ID" =~ ^[1-9][0-9]{0,19}$ ]]
              [[ "$API_EDGE_EVIDENCE_SHA256" =~ ^[0-9a-f]{64}$ ]]
              ;;
            *)
              echo "Unsupported release mode." >&2
              exit 1
              ;;
          esac

      - name: Check out the exact candidate revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.release_commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact candidate provenance
        env:
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          RELEASE_TAG: ${{ format('v{0}', inputs.release_version) }}
        run: |
          set -euo pipefail
          git fetch origin main:refs/remotes/origin/main --force --no-tags
          checked_out_commit="$(git rev-parse --verify 'HEAD^{commit}')"
          resolved_release_commit="$(git rev-parse --verify --end-of-options "${RELEASE_COMMIT}^{commit}")"
          test "$checked_out_commit" = "$RELEASE_COMMIT"
          test "$resolved_release_commit" = "$RELEASE_COMMIT"
          git merge-base --is-ancestor "$RELEASE_COMMIT" origin/main
          package_version="$(node -e '
            const { readFileSync } = require("node:fs");
            const value = JSON.parse(readFileSync("package.json", "utf8")).version;
            if (typeof value !== "string") process.exit(1);
            process.stdout.write(value);
          ')"
          test "$package_version" = "$RELEASE_VERSION"
          test "$RELEASE_TAG" = "v$package_version"

      - name: Verify the candidate release namespace is vacant or exactly repairable
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RELEASE_MODE: ${{ inputs.release_mode }}
          RELEASE_TAG: ${{ format('v{0}', inputs.release_version) }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          RELEASE_WORKFLOW_RUN_ID: ${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api --paginate --slurp "repos/$REPOSITORY/releases?per_page=100" \
            > "$RUNNER_TEMP/verify-release-namespace.json"
          remote_tag_sha="$(git ls-remote --tags origin "refs/tags/$RELEASE_TAG" \
            | awk 'NR == 1 { print $1 }')"
          node --experimental-strip-types scripts/github-release-namespace.mjs repairable \
            "$RUNNER_TEMP/verify-release-namespace.json" "${remote_tag_sha:-absent}"

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Validate the checked-in Vercel deployment bypass guard
        run: npm run vercel:config:validate

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit and contract tests
        run: npm test

      - name: Verify immutable migrations
        run: npm run migrations:verify

      - name: Verify fictional demo boundary
        run: npm run demo:verify

      - name: Test complete Postgres persistence
        env:
          TEST_DATABASE_URL: postgres://kinresolve_ci:kinresolve_ci@localhost:5432/kinresolve_release_test
        run: npm run test:db

      - name: Rehearse the latest stable database upgrade
        env:
          TEST_RELEASE_UPGRADE_DATABASE_URL: postgres://kinresolve_ci:kinresolve_ci@localhost:5432/postgres
        run: npm run test:release-upgrade

      - name: Prove the latest stable release is forward-only incompatible
        env:
          TEST_RELEASE_UPGRADE_DATABASE_URL: postgres://kinresolve_ci:kinresolve_ci@localhost:5432/postgres
        run: npm run test:release-compatibility

      - name: Test large GEDCOM persistence
        env:
          TEST_DATABASE_URL: postgres://kinresolve_ci:kinresolve_ci@localhost:5432/kinresolve_release_test
        run: npm run test:db:large

      - name: Test large hosted integration refresh
        env:
          TEST_DATABASE_URL: postgres://kinresolve_ci:kinresolve_ci@localhost:5432/kinresolve_release_test
        run: npm run test:db:integration-large

      - name: Build application
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  staging:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: beta-staging
    outputs:
      app_base_url: ${{ steps.staging-release-contract.outputs.app_base_url }}
      archive_id: ${{ steps.staging-release-contract.outputs.archive_id }}
      candidate_deployment_id: ${{ steps.staging-candidate.outputs.deployment_id }}
      database_identity: ${{ steps.staging-release-contract.outputs.database_identity }}
      browser_baseline_prepared: ${{ steps.staging-browser-baseline.outputs.prepared }}
      holding_deployment_id: ${{ steps.staging-holding.outputs.deployment_id }}
      holding_deployment_url: ${{ steps.staging-holding.outputs.deployment_url }}
      object_storage_identity: ${{ steps.staging-release-contract.outputs.object_storage_identity }}
      object_storage_provider_id: ${{ steps.staging-identity-exclusions.outputs.object_storage_provider_id }}
      api_v1_enabled: ${{ steps.staging-release-contract.outputs.api_v1_enabled }}
      beta_applications_enabled: ${{ steps.staging-release-contract.outputs.beta_applications_enabled }}
      beta_intake_proven: ${{ steps.staging-beta-intake-smoke.outputs.proven }}
    steps:
      - name: Check out the verified candidate
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.release_commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Recheck the safety queue for this staging attempt
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SAFETY_CURRENT_WORKFLOW: release
        run: node --experimental-strip-types scripts/validate-release-safety-queue.mjs

      - name: Install dependencies
        run: npm ci

      - name: Install the pinned Vercel CLI before loading deploy credentials
        run: npm install --global --ignore-scripts vercel@56.1.0

      - name: Fetch protected main
        run: git fetch origin main:refs/remotes/origin/main --force --no-tags

      - name: Validate staging Vercel identifiers
        env:
          EXPECTED_VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          PRODUCTION_VERCEL_PROJECT_ID: prj_ZK8tbbhxoDuuGFy1k67kW7XgjXzs
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          [[ "$VERCEL_ORG_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          [[ "$VERCEL_PROJECT_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          [[ "$EXPECTED_VERCEL_PROJECT_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          test "$VERCEL_PROJECT_ID" = "$EXPECTED_VERCEL_PROJECT_ID"
          test "$VERCEL_PROJECT_ID" != "$PRODUCTION_VERCEL_PROJECT_ID"
          test -n "$VERCEL_TOKEN"
          test -n "$VERCEL_AUTOMATION_BYPASS_SECRET"

      - name: Pull isolated staging production settings
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          umask 077
          vercel pull --yes --environment=production

      - name: Fetch staging environment metadata
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          umask 077
          scope_query="?limit=100"
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="$scope_query&teamId=$VERCEL_ORG_ID"; fi
          curl --connect-timeout 10 --max-time 45 --retry 3 --retry-all-errors --fail --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env$scope_query" \
            --output "$RUNNER_TEMP/staging-environment.json"

      - name: Validate staging environment metadata
        env:
          EXPECTED_BETA_APPLICATIONS_ENABLED: ${{ inputs.beta_intake_enabled }}
        run: >-
          node --experimental-strip-types scripts/validate-vercel-environment.mjs
          "$RUNNER_TEMP/staging-environment.json" .vercel/.env.production.local

      - name: Validate staging release contract
        id: staging-release-contract
        env:
          EXPECTED_APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          EXPECTED_ARCHIVE_ID: kinresolve-staging-demo
          EXPECTED_DATASET_MODE: demo
          EXPECTED_SCHEDULED_WRITES_ENABLED: "false"
          EXPECTED_API_V1_ENABLED: ${{ inputs.release_mode == 'api-launch' }}
          EXPECTED_BETA_APPLICATIONS_ENABLED: ${{ inputs.beta_intake_enabled }}
          EXPECTED_VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          FORBIDDEN_APP_BASE_URL: https://app.kinresolve.com
          FORBIDDEN_VERCEL_PROJECT_ID: prj_ZK8tbbhxoDuuGFy1k67kW7XgjXzs
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RELEASE_TAG: ${{ format('v{0}', inputs.release_version) }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: node --experimental-strip-types scripts/validate-release-contract.mjs

      - name: Verify approved staging legal document bytes
        run: npm run beta:legal:validate -- .vercel/.env.production.local

      - name: Attest the staging runtime database role
        env:
          EXPECTED_DATABASE_IDENTITY: ${{ steps.staging-release-contract.outputs.database_identity }}
          MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
        run: |
          set -euo pipefail
          output="$RUNNER_TEMP/staging-runtime-database-role.json"
          npm run db:runtime-role:attest -- "$output"
          jq -e --arg database_identity "$EXPECTED_DATABASE_IDENTITY" '
            (. | keys | sort) == ([
              "adminMembership", "bypassRls", "createDatabase", "createRole",
              "credentialsDistinct", "databaseIdentity", "migrationRoleMembership",
              "ownsDatabase", "ownsPublicFunctions", "ownsPublicRelations",
              "ownsPublicSchema", "ownsPublicTypes", "persistentMutation",
              "pgWriteAllDataMembership", "publicSchemaCreate", "releaseFenceDelete",
              "releaseFenceInsert", "releaseFenceReferences", "releaseFenceSelect",
              "releaseFenceTrigger", "releaseFenceTruncate", "releaseFenceUpdate",
              "replication", "representativeAppWriteRolledBack",
              "runtimeRoleIdentitySha256", "sameDatabaseSessionVerified",
              "schemaVersion", "superuser"
            ] | sort) and
            .schemaVersion == 1 and
            .databaseIdentity == $database_identity and
            (.runtimeRoleIdentitySha256 | test("^[a-f0-9]{64}$")) and
            .credentialsDistinct == true and
            .sameDatabaseSessionVerified == true and
            .superuser == false and
            (.bypassRls | type) == "boolean" and
            .createDatabase == false and .createRole == false and .replication == false and
            .pgWriteAllDataMembership == false and .migrationRoleMembership == false and
            .adminMembership == false and .ownsDatabase == false and
            .ownsPublicSchema == false and .ownsPublicRelations == false and
            .ownsPublicFunctions == false and .ownsPublicTypes == false and
            .publicSchemaCreate == false and .releaseFenceSelect == true and
            .releaseFenceInsert == false and .releaseFenceUpdate == false and
            .releaseFenceDelete == false and .releaseFenceTruncate == false and
            .releaseFenceTrigger == false and .releaseFenceReferences == false and
            .representativeAppWriteRolledBack == true and .persistentMutation == false
          ' "$output" > /dev/null

      - name: Prove staging cannot target protected production identities
        id: staging-identity-exclusions
        env:
          FORBIDDEN_PRODUCTION_DATABASE_IDENTITY: ${{ vars.FORBIDDEN_PRODUCTION_DATABASE_IDENTITY }}
          FORBIDDEN_PRODUCTION_OBJECT_STORAGE_IDENTITY: ${{ vars.FORBIDDEN_PRODUCTION_OBJECT_STORAGE_IDENTITY }}
          FORBIDDEN_PRODUCTION_OBJECT_STORAGE_PROVIDER_ID: ${{ vars.FORBIDDEN_PRODUCTION_OBJECT_STORAGE_PROVIDER_ID }}
          STAGING_DATABASE_IDENTITY: ${{ steps.staging-release-contract.outputs.database_identity }}
          STAGING_OBJECT_STORAGE_IDENTITY: ${{ steps.staging-release-contract.outputs.object_storage_identity }}
          STAGING_OBJECT_STORAGE_PROVIDER_ID: ${{ vars.KINRESOLVE_OBJECT_STORAGE_PROVIDER_ID }}
        run: |
          set -euo pipefail
          [[ "$FORBIDDEN_PRODUCTION_DATABASE_IDENTITY" =~ ^[a-f0-9]{64}$ ]]
          [[ "$FORBIDDEN_PRODUCTION_OBJECT_STORAGE_IDENTITY" =~ ^[a-f0-9]{64}$ ]]
          [[ "$FORBIDDEN_PRODUCTION_OBJECT_STORAGE_PROVIDER_ID" =~ ^[a-z0-9][a-z0-9-]{7,63}$ ]]
          [[ "$STAGING_DATABASE_IDENTITY" =~ ^[a-f0-9]{64}$ ]]
          [[ "$STAGING_OBJECT_STORAGE_IDENTITY" =~ ^[a-f0-9]{64}$ ]]
          [[ "$STAGING_OBJECT_STORAGE_PROVIDER_ID" =~ ^[a-z0-9][a-z0-9-]{7,63}$ ]]
          test "$STAGING_DATABASE_IDENTITY" != "$FORBIDDEN_PRODUCTION_DATABASE_IDENTITY"
          test "$STAGING_OBJECT_STORAGE_IDENTITY" != "$FORBIDDEN_PRODUCTION_OBJECT_STORAGE_IDENTITY"
          test "$STAGING_OBJECT_STORAGE_PROVIDER_ID" != "$FORBIDDEN_PRODUCTION_OBJECT_STORAGE_PROVIDER_ID"
          printf 'object_storage_provider_id=%s\n' "$STAGING_OBJECT_STORAGE_PROVIDER_ID" >> "$GITHUB_OUTPUT"

      - name: Validate forward-only release policy in staging
        env:
          RELEASE_POLICY_OWNER: ${{ github.actor }}
          RELEASE_POLICY_ACKNOWLEDGED_AT: ${{ inputs.release_policy_acknowledged_at }}
          FIRST_CUTOVER_ACKNOWLEDGEMENT: ${{ inputs.first_cutover_acknowledgement }}
        run: node --experimental-strip-types scripts/validate-release-policy.mjs

      - name: Capture and validate the approved staging holding deployment
        id: staging-holding
        env:
          APP_BASE_URL: ${{ steps.staging-release-contract.outputs.app_base_url }}
          APPROVED_HOLDING_DEPLOYMENT_ID: ${{ secrets.STAGING_HOLDING_DEPLOYMENT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          deployment_host="${APP_BASE_URL#https://}"
          [[ "$deployment_host" =~ ^[A-Za-z0-9.-]{4,253}$ ]]
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          curl --connect-timeout 10 --max-time 45 --retry 3 --retry-all-errors --fail --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
            --output "$RUNNER_TEMP/staging-holding.json"
          node --experimental-strip-types scripts/validate-vercel-deployment.mjs holding \
            "$RUNNER_TEMP/staging-holding.json" \
            "${APP_BASE_URL#https://}"

      - name: Verify immutable staging migrations
        run: npm run migrations:verify

      - name: Build the staging production artifact
        env:
          KINRESOLVE_BUILD_COMMIT_SHA: ${{ inputs.release_commit }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --prod

      - name: Deploy the immutable staging candidate
        id: staging-deploy
        env:
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RELEASE_TAG: ${{ format('v{0}', inputs.release_version) }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          deployment_url="$(vercel deploy --prebuilt --prod --skip-domain --yes \
            --meta "githubCommitSha=$RELEASE_COMMIT" \
            --meta "githubRunId=$GITHUB_RUN_ID" \
            --meta "githubRunAttempt=$GITHUB_RUN_ATTEMPT" \
            --meta "releaseTag=$RELEASE_TAG" \
            --meta "packageVersion=$RELEASE_VERSION")"
          DEPLOYMENT_URL="$deployment_url" node -e '
            const url = new URL(process.env.DEPLOYMENT_URL);
            if (url.protocol !== "https:" || url.origin !== process.env.DEPLOYMENT_URL ||
                !url.hostname.endsWith(".vercel.app") || url.hostname === "vercel.app") process.exit(1);
          '
          printf 'url=%s\n' "$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Fetch the staging candidate deployment record
        env:
          DEPLOYMENT_URL: ${{ steps.staging-deploy.outputs.url }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          deployment_host="${DEPLOYMENT_URL#https://}"
          [[ "$deployment_host" =~ ^[a-z0-9-]+\.vercel\.app$ ]]
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          curl --connect-timeout 10 --max-time 45 --retry 3 --retry-all-errors --fail --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
            --output "$RUNNER_TEMP/staging-candidate.json"

      - name: Validate the staging candidate deployment
        id: staging-candidate
        env:
          APP_BASE_URL: ${{ steps.staging-release-contract.outputs.app_base_url }}
          EXPECTED_GITHUB_COMMIT_SHA: ${{ inputs.release_commit }}
          EXPECTED_GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          EXPECTED_GITHUB_RUN_ID: ${{ github.run_id }}
          PACKAGE_VERSION: ${{ inputs.release_version }}
          PREVIOUS_DEPLOYMENT_ID: ${{ steps.staging-holding.outputs.deployment_id }}
          RELEASE_TAG: ${{ format('v{0}', inputs.release_version) }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: node --experimental-strip-types scripts/validate-vercel-deployment.mjs candidate "$RUNNER_TEMP/staging-candidate.json"

      - name: Prove the generated staging candidate rejects unauthenticated access
        timeout-minutes: 5
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: >-
          node --experimental-strip-types scripts/probe-vercel-candidate-protection.mjs
          "$RUNNER_TEMP/staging-candidate.json"

      - name: Attest the staging candidate database before migration
        env:
          APP_BASE_URL: ${{ steps.staging-release-contract.outputs.app_base_url }}
          KINRESOLVE_DATABASE_IDENTITY: ${{ steps.staging-release-contract.outputs.database_identity }}
          KINRESOLVE_DATASET_MODE: ${{ steps.staging-release-contract.outputs.dataset_mode }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          SMOKE_ORIGIN: ${{ steps.staging-candidate.outputs.deployment_url }}
          SMOKE_PHASE: "identity"
          KINRESOLVE_OBSERVABILITY_PROBE_SECRET: ${{ secrets.KINRESOLVE_OBSERVABILITY_PROBE_SECRET }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: node --experimental-strip-types scripts/smoke-release.mjs

      - name: Prove both signed staging schedulers are disabled before migration
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          STAGING_CANDIDATE_ORIGIN: ${{ steps.staging-candidate.outputs.deployment_url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail
          test -n "$CRON_SECRET"
          test -n "$VERCEL_AUTOMATION_BYPASS_SECRET"
          for path in /api/cron/import-uploads /api/cron/integration-jobs; do
            name="${path##*/}"
            status="$(curl --connect-timeout 10 --max-time 45 --retry 2 --retry-all-errors \
              --silent --show-error \
              --header "Authorization: Bearer $CRON_SECRET" \
              --header "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET" \
              --output "$RUNNER_TEMP/staging-$name-disabled.json" \
              --write-out '%{http_code}' \
              "$STAGING_CANDIDATE_ORIGIN$path")"
            test "$status" = "503"
            jq -e '. == {"error":"Scheduled work is unavailable."}' \
              "$RUNNER_TEMP/staging-$name-disabled.json" > /dev/null
          done

      - name: Revalidate the staging holding deployment immediately before migration
        env:
          APP_BASE_URL: ${{ steps.staging-release-contract.outputs.app_base_url }}
          APPROVED_HOLDING_DEPLOYMENT_ID: ${{ secrets.STAGING_HOLDING_DEPLOYMENT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          deployment_host="${APP_BASE_URL#https://}"
          [[ "$deployment_host" =~ ^[A-Za-z0-9.-]{4,253}$ ]]
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          curl --connect-timeout 10 --max-time 45 --retry 3 --retry-all-errors --fail --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
            --output "$RUNNER_TEMP/staging-holding-pre-migration.json"
          env -u GITHUB_OUTPUT node --experimental-strip-types \
            scripts/validate-vercel-deployment.mjs holding \
            "$RUNNER_TEMP/staging-holding-pre-migration.json" \
            "${APP_BASE_URL#https://}"

      - name: Smoke the staging holding application immediately before migration
        env:
          APP_BASE_URL: ${{ steps.staging-release-contract.outputs.app_base_url }}
          KINRESOLVE_DATABASE_IDENTITY: ${{ steps.staging-release-contract.outputs.database_identity }}
          KINRESOLVE_DATASET_MODE: ${{ steps.staging-release-contract.outputs.dataset_mode }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          SMOKE_ORIGIN: ${{ steps.staging-release-contract.outputs.app_base_url }}
          SMOKE_PHASE: "pre-migration"
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: node --experimental-strip-types scripts/smoke-release.mjs

      - name: Migrate the isolated staging database
        env:
          EXPECTED_ARCHIVE_ID: ${{ steps.staging-release-contract.outputs.archive_id }}
          KINRESOLVE_DATABASE_IDENTITY: ${{ steps.staging-release-contract.outputs.database_identity }}
          MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
        run: npm run db:migrate:production

      - name: Verify the exact staging migration ledger
        env:
          EXPECTED_ARCHIVE_ID: ${{ steps.staging-release-contract.outputs.archive_id }}
          KINRESOLVE_DATABASE_IDENTITY: ${{ steps.staging-release-contract.outputs.database_identity }}
          MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
        run: npm run db:migrations:verify-production

      - name: Grant and re-attest staging beta operations runtime access
        env:
          EXPECTED_DATABASE_IDENTITY: ${{ steps.staging-release-contract.outputs.database_identity }}
          MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
        run: |
          set -euo pipefail
          output="$RUNNER_TEMP/staging-beta-operations-runtime-grants.json"
          npm run db:runtime-role:grant-beta-operations -- "$output"
          jq -e --arg database_identity "$EXPECTED_DATABASE_IDENTITY" '
            (. | keys | sort) == ([
              "credentialsDistinct", "databaseCreate", "databaseIdentity", "exactPrivilegesAttested",
              "grantContract", "managedTablePrivileges", "persistentDataMutation",
              "protectedTablePrivileges", "publicSchemaCreate", "publicSchemaUsage",
              "representativeAppWriteRolledBack", "runtimeRoleIdentitySha256",
              "safeRuntimeRoleReattested", "sameDatabaseSessionVerified", "schemaVersion"
            ] | sort) and
            .schemaVersion == 1 and .grantContract == "beta-operations-v1" and
            .databaseIdentity == $database_identity and
            (.runtimeRoleIdentitySha256 | test("^[a-f0-9]{64}$")) and
            .credentialsDistinct == true and .sameDatabaseSessionVerified == true and
            .safeRuntimeRoleReattested == true and .databaseCreate == false and
            .publicSchemaUsage == true and
            .publicSchemaCreate == false and .exactPrivilegesAttested == true and
            .representativeAppWriteRolledBack == true and .persistentDataMutation == false and
            (.managedTablePrivileges | map({table, select, insert, update, delete})) == [
              {"table":"auth_rate_limit_buckets","select":true,"insert":true,"update":true,"delete":true},
              {"table":"beta_applications","select":true,"insert":true,"update":true,"delete":true},
              {"table":"beta_data_operations","select":true,"insert":true,"update":true,"delete":false},
              {"table":"beta_worker_heartbeats","select":true,"insert":true,"update":true,"delete":false},
              {"table":"api_tokens","select":true,"insert":true,"update":true,"delete":false},
              {"table":"api_rate_limit_buckets","select":true,"insert":true,"update":true,"delete":true},
              {"table":"public_demo_capacity","select":true,"insert":true,"update":true,"delete":false},
              {"table":"public_demo_sessions","select":true,"insert":true,"update":true,"delete":true},
              {"table":"public_demo_rate_limits","select":true,"insert":true,"update":true,"delete":true},
              {"table":"public_demo_generations","select":true,"insert":true,"update":true,"delete":true},
              {"table":"public_demo_ai_attempts","select":true,"insert":true,"update":true,"delete":true},
              {"table":"public_demo_events","select":true,"insert":true,"update":false,"delete":true},
              {"table":"public_demo_stats","select":true,"insert":false,"update":true,"delete":false},
              {"table":"security_events","select":false,"insert":true,"update":false,"delete":false}
            ] and
            all(.managedTablePrivileges[];
              (. | keys | sort) == ([
                "delete", "grantOptions", "insert", "maintain", "references",
                "select", "table", "trigger", "truncate", "update"
              ] | sort) and .truncate == false and .references == false and
              .trigger == false and .maintain == false and .grantOptions == false) and
            (.protectedTablePrivileges | map(.table)) == [
              "release_write_fences", "schema_migrations"
            ] and
            all(.protectedTablePrivileges[];
              (. | keys | sort) == ([
                "delete", "grantOptions", "insert", "maintain", "references",
                "select", "table", "trigger", "truncate", "update"
              ] | sort) and .select == true and .insert == false and .update == false and
              .delete == false and .truncate == false and .references == false and
              .trigger == false and .maintain == false and .grantOptions == false)
          ' "$output" > /dev/null

      - name: Smoke the staging candidate
        env:
          APP_BASE_URL: ${{ steps.staging-release-contract.outputs.app_base_url }}
          KINRESOLVE_DATABASE_IDENTITY: ${{ steps.staging-release-contract.outputs.database_identity }}
          KINRESOLVE_DATASET_MODE: ${{ steps.staging-release-contract.outputs.dataset_mode }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          SMOKE_ORIGIN: ${{ steps.staging-candidate.outputs.deployment_url }}
          SMOKE_PHASE: "full"
          KINRESOLVE_API_V1_ENABLED: ${{ steps.staging-release-contract.outputs.api_v1_enabled }}
          KINRESOLVE_SCHEDULED_WRITES_ENABLED: "false"
          KINRESOLVE_OBSERVABILITY_PROBE_SECRET: ${{ secrets.KINRESOLVE_OBSERVABILITY_PROBE_SECRET }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: node --experimental-strip-types scripts/smoke-release.mjs

      - name: Prove the enabled staging beta intake and remove its exact synthetic row
        id: staging-beta-intake-smoke
        if: inputs.beta_intake_enabled
        timeout-minutes: 10
        env:
          BETA_APPLICATION_CANARY_EMAIL_PATTERN: ${{ secrets.BETA_APPLICATION_CANARY_EMAIL_PATTERN }}
          BETA_APPLICATION_CANARY_PHASE: staging
          BETA_APPLICATION_CANARY_RUN_ATTEMPT: ${{ github.run_attempt }}
          BETA_APPLICATION_CANARY_RUN_ID: ${{ github.run_id }}
          EXPECTED_BETA_APPLICATIONS_ENABLED: ${{ steps.staging-release-contract.outputs.beta_applications_enabled }}
          MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
          STAGING_CANARY_ORIGIN: ${{ steps.staging-candidate.outputs.deployment_url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail
          umask 077
          test "$EXPECTED_BETA_APPLICATIONS_ENABLED" = "true"
          [[ "$STAGING_CANARY_ORIGIN" =~ ^https://[A-Za-z0-9-]+\.vercel\.app$ ]]
          test -n "$VERCEL_AUTOMATION_BYPASS_SECRET"
          CANARY_NAME="Kin Resolve Staging Release Canary ${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          CANARY_HONEYPOT_NAME="$CANARY_NAME Honeypot"
          CANARY_EMAIL_FILE="$RUNNER_TEMP/staging-beta-intake-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.email"
          export BETA_APPLICATION_CANARY_EMAIL_FILE="$CANARY_EMAIL_FILE"
          export BETA_APPLICATION_CANARY_NAME="$CANARY_NAME"
          export BETA_APPLICATION_CANARY_HONEYPOT_NAME="$CANARY_HONEYPOT_NAME"

          cleanup_canary() {
            node --experimental-strip-types scripts/beta-application-release-canary.mjs cleanup \
              >/dev/null 2>&1 || true
            rm -f "$CANARY_EMAIL_FILE"
            rm -f "$RUNNER_TEMP/staging-beta-intake-"*.headers "$RUNNER_TEMP/staging-beta-intake-"*.body
          }
          trap cleanup_canary EXIT
          test ! -e "$CANARY_EMAIL_FILE"
          node --experimental-strip-types scripts/beta-application-release-canary.mjs preflight
          IFS= read -r CANARY_EMAIL < "$CANARY_EMAIL_FILE"
          test -n "$CANARY_EMAIL"
          test "$(wc -l < "$CANARY_EMAIL_FILE" | tr -d '[:space:]')" = "1"

          submit_canary_form() {
            local name="$1" website="$2" prefix="$3" status
            status="$(curl --connect-timeout 10 --max-time 60 --retry 2 --retry-all-errors \
              --silent --show-error --request POST --max-redirs 0 \
              --header "Origin: https://kinresolve.com" \
              --header "Content-Type: application/x-www-form-urlencoded" \
              --header "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET" \
              --data-urlencode "name=$name" \
              --data-urlencode "email=$CANARY_EMAIL" \
              --data-urlencode "researcher_type=developer-self-hoster" \
              --data-urlencode "current_tool=gramps" \
              --data-urlencode "archive_size_band=prefer-not-to-say" \
              --data-urlencode "workflow=developer-api" \
              --data-urlencode "consent_version=beta-communications-v1" \
              --data-urlencode "consent=accepted" \
              --data-urlencode "website=$website" \
              --dump-header "$RUNNER_TEMP/$prefix.headers" \
              --output "$RUNNER_TEMP/$prefix.body" \
              --write-out '%{http_code}' \
              "$STAGING_CANARY_ORIGIN/api/public/beta-applications")"
            test "$status" = "303"
            HEADER_FILE="$RUNNER_TEMP/$prefix.headers" BODY_FILE="$RUNNER_TEMP/$prefix.body" \
              node --input-type=module <<'NODE'
          import { readFile } from "node:fs/promises";
          try {
            const [headers, body] = await Promise.all([
              readFile(process.env.HEADER_FILE, "utf8"),
              readFile(process.env.BODY_FILE)
            ]);
            if (body.byteLength !== 0
              || !/(?:^|\r?\n)location:\s*https:\/\/kinresolve\.com\/beta\/thanks\/\r?$/im.test(headers)
              || !/(?:^|\r?\n)cache-control:\s*no-store\r?$/im.test(headers)
              || !/(?:^|\r?\n)referrer-policy:\s*no-referrer\r?$/im.test(headers)) throw new Error();
          } catch {
            console.error("Staging beta intake redirect proof failed.");
            process.exitCode = 1;
          }
          NODE
          }

          submit_canary_form "$CANARY_HONEYPOT_NAME" "synthetic-canary.invalid" \
            "staging-beta-intake-honeypot"
          submit_canary_form "$CANARY_NAME" "" "staging-beta-intake-application"
          node --experimental-strip-types scripts/beta-application-release-canary.mjs verify-delete
          trap - EXIT
          cleanup_canary
          printf 'proven=true\n' >> "$GITHUB_OUTPUT"

      - name: Install the pinned Chromium browser for the synthetic staging canary
        run: npx playwright install --with-deps chromium

      - name: Capture the exact staging baseline before temporary promotion
        id: staging-browser-baseline
        env:
          KINRESOLVE_CANARY_ALLOW_MUTATION: "true"
          KINRESOLVE_CANARY_ARCHIVE_ID: ${{ steps.staging-release-contract.outputs.archive_id }}
          KINRESOLVE_CANARY_DATASET_MODE: demo
          KINRESOLVE_CANARY_MUTATION_ACKNOWLEDGEMENT: I acknowledge this browser canary may mutate only an isolated synthetic demo cell.
          KINRESOLVE_CANARY_OPERATOR_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
          KINRESOLVE_CANARY_RELEASE_SHA: ${{ inputs.release_commit }}
          KINRESOLVE_CANARY_RUN_ID: gh-${{ github.run_id }}-${{ github.run_attempt }}
          KINRESOLVE_CANARY_USER_ID: ${{ secrets.STAGING_BROWSER_CANARY_USER_ID }}
          KINRESOLVE_DATABASE_IDENTITY: ${{ steps.staging-release-contract.outputs.database_identity }}
          KINSLEUTH_ARCHIVE_ID: ${{ steps.staging-release-contract.outputs.archive_id }}
        run: |
          set -euo pipefail
          node --env-file=.vercel/.env.production.local --import tsx \
            scripts/browser-canary-state.ts prepare staging \
            "$RUNNER_TEMP/staging-browser-canary-state.json"
          printf 'prepared=true\n' >> "$GITHUB_OUTPUT"

      - name: Upload the pre-promotion staging baseline
        if: ${{ steps.staging-browser-baseline.outcome == 'success' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: staging-browser-canary-baseline-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/staging-browser-canary-state.json
          if-no-files-found: error
          retention-days: 1

      - name: Mark the temporary staging promotion attempt
        id: staging-browser-promotion-marker
        run: printf 'attempted=true\n' >> "$GITHUB_OUTPUT"

      - name: Temporarily promote the exact staging candidate
        timeout-minutes: 10
        env:
          CANDIDATE_DEPLOYMENT_URL: ${{ steps.staging-candidate.outputs.deployment_url }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel promote "$CANDIDATE_DEPLOYMENT_URL" --yes --timeout=5m

      - name: Fetch the exact staging candidate at the custom origin
        id: fetch-staging-browser-candidate
        timeout-minutes: 10
        env:
          APP_BASE_URL: ${{ steps.staging-release-contract.outputs.app_base_url }}
          CANDIDATE_DEPLOYMENT_ID: ${{ steps.staging-candidate.outputs.deployment_id }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          deployment_host="${APP_BASE_URL#https://}"
          [[ "$deployment_host" =~ ^[A-Za-z0-9.-]{4,253}$ ]]
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          for attempt in $(seq 1 20); do
            rm -f "$RUNNER_TEMP/staging-browser-candidate.json"
            if curl --connect-timeout 10 --max-time 30 --fail --silent --show-error \
                --header "Authorization: Bearer $VERCEL_TOKEN" \
                "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
                --output "$RUNNER_TEMP/staging-browser-candidate.json" \
              && GITHUB_OUTPUT="$RUNNER_TEMP/staging-browser-candidate-poll-output" \
                node --experimental-strip-types scripts/validate-vercel-deployment.mjs promoted \
                  "$RUNNER_TEMP/staging-browser-candidate.json" \
                  "${APP_BASE_URL#https://}" >/dev/null 2>&1; then
              exit 0
            fi
            if [[ "$attempt" = 20 ]]; then
              echo "Staging custom origin did not converge to the candidate before the deadline." >&2
              exit 1
            fi
            sleep 3
          done

      - name: Validate the exact staging candidate at the custom origin
        id: validate-staging-browser-candidate
        env:
          APP_BASE_URL: ${{ steps.staging-release-contract.outputs.app_base_url }}
          CANDIDATE_DEPLOYMENT_ID: ${{ steps.staging-candidate.outputs.deployment_id }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: >-
          node --experimental-strip-types scripts/validate-vercel-deployment.mjs promoted
          "$RUNNER_TEMP/staging-browser-candidate.json"
          "${APP_BASE_URL#https://}"

      - name: Run the authenticated synthetic journey at the custom origin
        id: staging-browser-journey
        timeout-minutes: 15
        env:
          KINRESOLVE_CANARY_ALLOW_MUTATION: "true"
          KINRESOLVE_CANARY_API_V1_ENABLED: ${{ steps.staging-release-contract.outputs.api_v1_enabled }}
          KINRESOLVE_CANARY_APP_BASE_URL: ${{ steps.staging-release-contract.outputs.app_base_url }}
          KINRESOLVE_CANARY_ARCHIVE_ID: ${{ steps.staging-release-contract.outputs.archive_id }}
          KINRESOLVE_CANARY_DATASET_MODE: demo
          KINRESOLVE_CANARY_EMAIL: ${{ secrets.STAGING_BROWSER_CANARY_EMAIL }}
          KINRESOLVE_CANARY_HEADLESS: "true"
          KINRESOLVE_CANARY_MUTATION_ACKNOWLEDGEMENT: I acknowledge this browser canary may mutate only an isolated synthetic demo cell.
          KINRESOLVE_CANARY_OBSERVABILITY_PROBE_SECRET: ${{ secrets.KINRESOLVE_OBSERVABILITY_PROBE_SECRET }}
          KINRESOLVE_CANARY_ORIGIN: ${{ steps.staging-release-contract.outputs.app_base_url }}
          KINRESOLVE_CANARY_PASSWORD: ${{ secrets.STAGING_BROWSER_CANARY_PASSWORD }}
          KINRESOLVE_CANARY_RELEASE_SHA: ${{ inputs.release_commit }}
          KINRESOLVE_CANARY_RUN_ID: gh-${{ github.run_id }}-${{ github.run_attempt }}
          KINRESOLVE_CANARY_TIMEOUT_MS: "60000"
          KINRESOLVE_CANARY_USER_ID: ${{ secrets.STAGING_BROWSER_CANARY_USER_ID }}
          KINSLEUTH_ARCHIVE_ID: ${{ steps.staging-release-contract.outputs.archive_id }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ""
        run: npm run test:staging-smoke

      - name: Restore the captured staging holding deployment
        id: restore-staging-holding
        if: ${{ always() && steps.staging-browser-promotion-marker.outputs.attempted == 'true' }}
        timeout-minutes: 10
        env:
          HOLDING_DEPLOYMENT_URL: ${{ steps.staging-holding.outputs.deployment_url }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel promote "$HOLDING_DEPLOYMENT_URL" --yes --timeout=5m

      - name: Fetch and validate the restored staging holding deployment
        id: validate-restored-staging-holding
        if: ${{ always() && steps.restore-staging-holding.outcome == 'success' }}
        timeout-minutes: 10
        env:
          APP_BASE_URL: ${{ steps.staging-release-contract.outputs.app_base_url }}
          APPROVED_HOLDING_DEPLOYMENT_ID: ${{ steps.staging-holding.outputs.deployment_id }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          deployment_host="${APP_BASE_URL#https://}"
          [[ "$deployment_host" =~ ^[A-Za-z0-9.-]{4,253}$ ]]
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          for attempt in $(seq 1 20); do
            rm -f "$RUNNER_TEMP/staging-browser-restored-holding.json"
            if curl --connect-timeout 10 --max-time 30 --fail --silent --show-error \
                --header "Authorization: Bearer $VERCEL_TOKEN" \
                "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
                --output "$RUNNER_TEMP/staging-browser-restored-holding.json" \
              && GITHUB_OUTPUT="$RUNNER_TEMP/staging-browser-holding-poll-output" \
                node --experimental-strip-types scripts/validate-vercel-deployment.mjs holding \
                  "$RUNNER_TEMP/staging-browser-restored-holding.json" \
                  "${APP_BASE_URL#https://}" >/dev/null 2>&1; then
              exit 0
            fi
            if [[ "$attempt" = 20 ]]; then
              echo "Staging custom origin did not return to the holding deployment." >&2
              exit 1
            fi
            sleep 3
          done
          env -u GITHUB_OUTPUT node --experimental-strip-types \
            scripts/validate-vercel-deployment.mjs holding \
            "$RUNNER_TEMP/staging-browser-restored-holding.json" \
            "${APP_BASE_URL#https://}"

      - name: Smoke the restored staging holding application
        if: ${{ always() && steps.validate-restored-staging-holding.outcome == 'success' }}
        env:
          APP_BASE_URL: ${{ steps.staging-release-contract.outputs.app_base_url }}
          KINRESOLVE_DATABASE_IDENTITY: ${{ steps.staging-release-contract.outputs.database_identity }}
          KINRESOLVE_DATASET_MODE: ${{ steps.staging-release-contract.outputs.dataset_mode }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          SMOKE_ORIGIN: ${{ steps.staging-release-contract.outputs.app_base_url }}
          SMOKE_PHASE: "pre-migration"
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: node --experimental-strip-types scripts/smoke-release.mjs

      - name: Restore the exact staging archive, identity, and object baseline
        if: ${{ always() && steps.staging-browser-baseline.outcome == 'success' }}
        env:
          JOURNEY_OUTCOME: ${{ steps.staging-browser-journey.outcome }}
          KINRESOLVE_CANARY_ALLOW_MUTATION: "true"
          KINRESOLVE_CANARY_ARCHIVE_ID: ${{ steps.staging-release-contract.outputs.archive_id }}
          KINRESOLVE_CANARY_DATASET_MODE: demo
          KINRESOLVE_CANARY_MUTATION_ACKNOWLEDGEMENT: I acknowledge this browser canary may mutate only an isolated synthetic demo cell.
          KINRESOLVE_CANARY_OPERATOR_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
          KINRESOLVE_CANARY_RELEASE_SHA: ${{ inputs.release_commit }}
          KINRESOLVE_CANARY_RUN_ID: gh-${{ github.run_id }}-${{ github.run_attempt }}
          KINRESOLVE_CANARY_USER_ID: ${{ secrets.STAGING_BROWSER_CANARY_USER_ID }}
          KINRESOLVE_DATABASE_IDENTITY: ${{ steps.staging-release-contract.outputs.database_identity }}
          KINSLEUTH_ARCHIVE_ID: ${{ steps.staging-release-contract.outputs.archive_id }}
        run: |
          set -euo pipefail
          complete=""
          if [[ "$JOURNEY_OUTCOME" == "success" ]]; then complete="--expect-complete"; fi
          node --env-file=.vercel/.env.production.local --import tsx \
            scripts/browser-canary-state.ts cleanup staging \
            "$RUNNER_TEMP/staging-browser-canary-state.json" $complete

      - name: Upload a synthetic-only staging failure screenshot
        if: ${{ failure() && steps.staging-browser-baseline.outcome == 'success' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: staging-browser-canary-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: output/playwright/browser-canary-*.png
          if-no-files-found: ignore
          retention-days: 7

      - name: Remove pulled staging environment material
        if: always()
        run: |
          rm -f .vercel/.env.production.local
          rm -f "$RUNNER_TEMP/staging-environment.json"
          rm -f "$RUNNER_TEMP/staging-runtime-database-role.json"
          rm -f "$RUNNER_TEMP/staging-beta-operations-runtime-grants.json"
          rm -rf .vercel/output

  staging-finalize:
    name: Restore staging holding alias and synthetic baseline
    needs: [verify, staging]
    if: ${{ always() && needs.staging.result != 'skipped' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: beta-staging
    permissions:
      actions: read
      contents: read
    steps:
      - name: Check out the verified candidate for fresh-runner finalization
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.release_commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install finalizer dependencies
        run: npm ci

      - name: Install the pinned Vercel CLI
        run: npm install --global --ignore-scripts vercel@56.1.0

      - name: Fetch and validate the protected staging holding record
        id: finalizer-holding
        env:
          APPROVED_HOLDING_DEPLOYMENT_ID: ${{ secrets.STAGING_HOLDING_DEPLOYMENT_ID }}
          EXPECTED_VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          PRODUCTION_VERCEL_PROJECT_ID: prj_ZK8tbbhxoDuuGFy1k67kW7XgjXzs
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          test "$VERCEL_PROJECT_ID" = "$EXPECTED_VERCEL_PROJECT_ID"
          test "$VERCEL_PROJECT_ID" != "$PRODUCTION_VERCEL_PROJECT_ID"
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors --fail --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v13/deployments/$APPROVED_HOLDING_DEPLOYMENT_ID$scope_query" \
            --output "$RUNNER_TEMP/staging-finalizer-holding-record.json"
          node --experimental-strip-types scripts/validate-vercel-deployment.mjs holding-record \
            "$RUNNER_TEMP/staging-finalizer-holding-record.json"

      - name: Restore the protected staging holding deployment idempotently
        id: finalizer-restore-staging-holding
        if: ${{ always() && steps.finalizer-holding.outcome == 'success' }}
        timeout-minutes: 10
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          APPROVED_HOLDING_DEPLOYMENT_ID: ${{ secrets.STAGING_HOLDING_DEPLOYMENT_ID }}
          HOLDING_DEPLOYMENT_URL: ${{ steps.finalizer-holding.outputs.deployment_url }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          deployment_host="${APP_BASE_URL#https://}"
          [[ "$deployment_host" =~ ^[A-Za-z0-9.-]{4,253}$ ]]
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          if curl --connect-timeout 10 --max-time 30 --fail --silent --show-error \
              --header "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
              --output "$RUNNER_TEMP/staging-finalizer-current.json" \
            && env -u GITHUB_OUTPUT node --experimental-strip-types \
              scripts/validate-vercel-deployment.mjs holding \
              "$RUNNER_TEMP/staging-finalizer-current.json" \
              "${APP_BASE_URL#https://}" >/dev/null 2>&1; then
            exit 0
          fi
          vercel promote "$HOLDING_DEPLOYMENT_URL" --yes --timeout=5m

      - name: Fetch and validate the final staging holding deployment
        id: finalizer-validate-staging-holding
        if: ${{ always() && steps.finalizer-restore-staging-holding.outcome == 'success' }}
        timeout-minutes: 10
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          APPROVED_HOLDING_DEPLOYMENT_ID: ${{ secrets.STAGING_HOLDING_DEPLOYMENT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          deployment_host="${APP_BASE_URL#https://}"
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          for attempt in $(seq 1 20); do
            rm -f "$RUNNER_TEMP/staging-finalizer-holding.json"
            if curl --connect-timeout 10 --max-time 30 --fail --silent --show-error \
                --header "Authorization: Bearer $VERCEL_TOKEN" \
                "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
                --output "$RUNNER_TEMP/staging-finalizer-holding.json" \
              && GITHUB_OUTPUT="$RUNNER_TEMP/staging-finalizer-holding-poll-output" \
                node --experimental-strip-types scripts/validate-vercel-deployment.mjs holding \
                  "$RUNNER_TEMP/staging-finalizer-holding.json" \
                  "${APP_BASE_URL#https://}" >/dev/null 2>&1; then
              break
            fi
            if [[ "$attempt" = 20 ]]; then
              echo "Fresh finalizer could not prove the staging holding deployment." >&2
              exit 1
            fi
            sleep 3
          done
          env -u GITHUB_OUTPUT node --experimental-strip-types \
            scripts/validate-vercel-deployment.mjs holding \
            "$RUNNER_TEMP/staging-finalizer-holding.json" \
            "${APP_BASE_URL#https://}"

      - name: Smoke the final staging holding application
        id: finalizer-smoke-staging-holding
        if: ${{ always() && steps.finalizer-validate-staging-holding.outcome == 'success' }}
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          KINRESOLVE_DATABASE_IDENTITY: ${{ needs.staging.outputs.database_identity }}
          KINRESOLVE_DATASET_MODE: demo
          RELEASE_VERSION: ${{ inputs.release_version }}
          SMOKE_ORIGIN: ${{ vars.APP_BASE_URL }}
          SMOKE_PHASE: "pre-migration"
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: node --experimental-strip-types scripts/smoke-release.mjs

      - name: Download the pre-promotion staging baseline
        id: finalizer-download-browser-baseline
        if: ${{ always() && needs.staging.outputs.browser_baseline_prepared == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: staging-browser-canary-baseline-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/staging-browser-canary-baseline

      - name: Pull isolated staging settings for exact cleanup
        id: finalizer-pull-staging-settings
        if: ${{ always() && needs.staging.outputs.browser_baseline_prepared == 'true' }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          umask 077
          vercel pull --yes --environment=production

      - name: Reapply the exact staging archive, identity, and object baseline
        id: finalizer-reapply-staging-baseline
        if: ${{ always() && needs.staging.outputs.browser_baseline_prepared == 'true' }}
        env:
          KINRESOLVE_CANARY_ALLOW_MUTATION: "true"
          KINRESOLVE_CANARY_ARCHIVE_ID: ${{ needs.staging.outputs.archive_id }}
          KINRESOLVE_CANARY_DATASET_MODE: demo
          KINRESOLVE_CANARY_MUTATION_ACKNOWLEDGEMENT: I acknowledge this browser canary may mutate only an isolated synthetic demo cell.
          KINRESOLVE_CANARY_OPERATOR_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
          KINRESOLVE_CANARY_RELEASE_SHA: ${{ inputs.release_commit }}
          KINRESOLVE_CANARY_RUN_ID: gh-${{ github.run_id }}-${{ github.run_attempt }}
          KINRESOLVE_CANARY_USER_ID: ${{ secrets.STAGING_BROWSER_CANARY_USER_ID }}
          KINRESOLVE_DATABASE_IDENTITY: ${{ needs.staging.outputs.database_identity }}
          KINSLEUTH_ARCHIVE_ID: ${{ needs.staging.outputs.archive_id }}
        run: >-
          node --env-file=.vercel/.env.production.local --import tsx
          scripts/browser-canary-state.ts cleanup staging
          "$RUNNER_TEMP/staging-browser-canary-baseline/staging-browser-canary-state.json"

      - name: Create required staging-only candidate evidence
        id: create-staging-demo-evidence
        if: >-
          ${{ always() && inputs.release_target == 'staging-only' }}
        env:
          BASELINE_DOWNLOAD_OUTCOME: ${{ steps.finalizer-download-browser-baseline.outcome }}
          BASELINE_PREPARED: ${{ needs.staging.outputs.browser_baseline_prepared }}
          BASELINE_REAPPLY_OUTCOME: ${{ steps.finalizer-reapply-staging-baseline.outcome }}
          CANDIDATE_DEPLOYMENT_ID: ${{ needs.staging.outputs.candidate_deployment_id }}
          HOLDING_RESTORE_OUTCOME: ${{ steps.finalizer-restore-staging-holding.outcome }}
          HOLDING_SMOKE_OUTCOME: ${{ steps.finalizer-smoke-staging-holding.outcome }}
          HOLDING_VALIDATION_OUTCOME: ${{ steps.finalizer-validate-staging-holding.outcome }}
          SETTINGS_PULL_OUTCOME: ${{ steps.finalizer-pull-staging-settings.outcome }}
          STAGING_RESULT: ${{ needs.staging.result }}
          RELEASE_RUN_ID: ${{ github.run_id }}
          RELEASE_RUN_ATTEMPT: ${{ github.run_attempt }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          set -euo pipefail
          test "$STAGING_RESULT" = "success"
          test "$HOLDING_RESTORE_OUTCOME" = "success"
          test "$HOLDING_VALIDATION_OUTCOME" = "success"
          test "$HOLDING_SMOKE_OUTCOME" = "success"
          test "$BASELINE_PREPARED" = "true"
          test "$BASELINE_DOWNLOAD_OUTCOME" = "success"
          test "$SETTINGS_PULL_OUTCOME" = "success"
          test "$BASELINE_REAPPLY_OUTCOME" = "success"
          node --experimental-strip-types scripts/create-staging-demo-candidate-evidence.mjs \
            "$RUNNER_TEMP/staging-demo-candidate-evidence.json"

      - name: Upload required staging-only candidate evidence
        id: upload-staging-demo-evidence
        if: >-
          ${{ always() && inputs.release_target == 'staging-only' &&
              steps.create-staging-demo-evidence.outcome == 'success' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: staging-demo-candidate-evidence-${{ github.run_attempt }}
          path: ${{ runner.temp }}/staging-demo-candidate-evidence.json
          if-no-files-found: error
          retention-days: 2
          overwrite: false
          include-hidden-files: false

      - name: Summarize successful staging-only candidate evidence
        if: >-
          ${{ always() && inputs.release_target == 'staging-only' &&
              steps.upload-staging-demo-evidence.outcome == 'success' }}
        env:
          CANDIDATE_DEPLOYMENT_ID: ${{ needs.staging.outputs.candidate_deployment_id }}
          RELEASE_RUN_ID: ${{ github.run_id }}
          RELEASE_RUN_ATTEMPT: ${{ github.run_attempt }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          set -euo pipefail
          # Markdown code spans below are intentionally literal.
          # shellcheck disable=SC2016
          {
            printf '## Kin Resolve staging-only release evidence\n\n'
            printf -- '- Candidate deployment: `%s`\n' "$CANDIDATE_DEPLOYMENT_ID"
            printf -- '- Release run: `%s`\n' "$RELEASE_RUN_ID"
            printf -- '- Release attempt: `%s`\n' "$RELEASE_RUN_ATTEMPT"
            printf -- '- Commit: `%s`\n' "$RELEASE_COMMIT"
            printf -- '- Version: `%s`\n' "$RELEASE_VERSION"
            printf -- '- Result: isolated staging rehearsal and exact holding restoration passed\n'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Remove fresh-runner staging environment material
        if: always()
        run: |
          rm -f .vercel/.env.production.local
          rm -f "$RUNNER_TEMP/staging-demo-candidate-evidence.json"
          rm -f "$RUNNER_TEMP/staging-finalizer-"*.json
          rm -rf .vercel/output
          rm -rf "$RUNNER_TEMP/staging-browser-canary-baseline"

  production:
    name: Deploy and promote production candidate
    needs: [verify, staging, staging-finalize]
    if: ${{ inputs.release_target == 'production' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    environment: production
    permissions:
      actions: read
      attestations: read
      contents: read
    outputs:
      app_base_url: ${{ steps.production-release-contract.outputs.app_base_url }}
      api_v1_enabled: ${{ steps.production-release-contract.outputs.api_v1_enabled }}
      beta_applications_enabled: ${{ steps.production-release-contract.outputs.beta_applications_enabled }}
      beta_intake_proven: ${{ steps.production-beta-intake-smoke.outputs.proven }}
      api_edge_run_attempt: ${{ steps.api-edge-evidence-source.outputs.run_attempt }}
      api_canary_evidence_sha256: ${{ steps.api-canary-evidence.outputs.evidence_sha256 }}
      api_launch_receipt_sha256: ${{ steps.api-launch-receipt.outputs.receipt_sha256 }}
      candidate_deployment_id: ${{ steps.production-candidate.outputs.deployment_id }}
      release_workflow_run_attempt: ${{ steps.release-attempt.outputs.run_attempt }}
      staging_beta_intake_proven: ${{ needs.staging.outputs.beta_intake_proven }}
    steps:
      - name: Check out the verified candidate
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.release_commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Capture the candidate-owning release attempt
        id: release-attempt
        env:
          RELEASE_WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_WORKFLOW_RUN_ATTEMPT" =~ ^[1-9][0-9]{0,19}$ ]]
          printf 'run_attempt=%s\n' "$RELEASE_WORKFLOW_RUN_ATTEMPT" >> "$GITHUB_OUTPUT"

      - name: Require the matching staging beta intake proof
        env:
          BETA_INTAKE_ENABLED: ${{ inputs.beta_intake_enabled }}
          STAGING_BETA_INTAKE_PROVEN: ${{ needs.staging.outputs.beta_intake_proven }}
        run: |
          set -euo pipefail
          if [[ "$BETA_INTAKE_ENABLED" = "true" ]]; then
            test "$STAGING_BETA_INTAKE_PROVEN" = "true"
          else
            test "$BETA_INTAKE_ENABLED" = "false"
            test -z "$STAGING_BETA_INTAKE_PROVEN"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Recheck the safety queue for this production attempt
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SAFETY_CURRENT_WORKFLOW: release
        run: node --experimental-strip-types scripts/validate-release-safety-queue.mjs

      - name: Install dependencies
        run: npm ci

      - name: Install the pinned Chromium browser for production UI proof
        run: npx playwright install --with-deps chromium

      - name: Install the pinned Vercel CLI before loading deploy credentials
        run: npm install --global --ignore-scripts vercel@56.1.0

      - name: Fetch protected main
        run: git fetch origin main:refs/remotes/origin/main --force --no-tags

      - name: Validate production Vercel identifiers
        env:
          EXPECTED_VERCEL_PROJECT_ID: prj_ZK8tbbhxoDuuGFy1k67kW7XgjXzs
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          [[ "$VERCEL_ORG_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          [[ "$VERCEL_PROJECT_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          test "$VERCEL_PROJECT_ID" = "$EXPECTED_VERCEL_PROJECT_ID"
          test -n "$VERCEL_TOKEN"
          test -n "$VERCEL_AUTOMATION_BYPASS_SECRET"

      - name: Pull production settings
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          umask 077
          vercel pull --yes --environment=production

      - name: Fetch production environment metadata
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          umask 077
          scope_query="?limit=100"
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="$scope_query&teamId=$VERCEL_ORG_ID"; fi
          curl --connect-timeout 10 --max-time 45 --retry 3 --retry-all-errors --fail --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID/env$scope_query" \
            --output "$RUNNER_TEMP/production-environment.json"

      - name: Validate production environment metadata
        env:
          EXPECTED_BETA_APPLICATIONS_ENABLED: ${{ inputs.beta_intake_enabled }}
        run: >-
          node --experimental-strip-types scripts/validate-vercel-environment.mjs
          "$RUNNER_TEMP/production-environment.json" .vercel/.env.production.local

      - name: Validate production release contract
        id: production-release-contract
        env:
          EXPECTED_APP_BASE_URL: https://app.kinresolve.com
          EXPECTED_ARCHIVE_ID: kinresolve-pilot-01
          EXPECTED_DATASET_MODE: pilot
          EXPECTED_SCHEDULED_WRITES_ENABLED: "true"
          EXPECTED_API_V1_ENABLED: ${{ inputs.release_mode == 'api-launch' }}
          EXPECTED_BETA_APPLICATIONS_ENABLED: ${{ inputs.beta_intake_enabled }}
          EXPECTED_VERCEL_PROJECT_ID: prj_ZK8tbbhxoDuuGFy1k67kW7XgjXzs
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RELEASE_TAG: ${{ format('v{0}', inputs.release_version) }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: node --experimental-strip-types scripts/validate-release-contract.mjs

      - name: Verify approved production legal document bytes
        run: npm run beta:legal:validate -- .vercel/.env.production.local

      - name: Attest the production runtime database role
        env:
          EXPECTED_DATABASE_IDENTITY: ${{ steps.production-release-contract.outputs.database_identity }}
          MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
        run: |
          set -euo pipefail
          output="$RUNNER_TEMP/production-runtime-database-role.json"
          npm run db:runtime-role:attest -- "$output"
          jq -e --arg database_identity "$EXPECTED_DATABASE_IDENTITY" '
            (. | keys | sort) == ([
              "adminMembership", "bypassRls", "createDatabase", "createRole",
              "credentialsDistinct", "databaseIdentity", "migrationRoleMembership",
              "ownsDatabase", "ownsPublicFunctions", "ownsPublicRelations",
              "ownsPublicSchema", "ownsPublicTypes", "persistentMutation",
              "pgWriteAllDataMembership", "publicSchemaCreate", "releaseFenceDelete",
              "releaseFenceInsert", "releaseFenceReferences", "releaseFenceSelect",
              "releaseFenceTrigger", "releaseFenceTruncate", "releaseFenceUpdate",
              "replication", "representativeAppWriteRolledBack",
              "runtimeRoleIdentitySha256", "sameDatabaseSessionVerified",
              "schemaVersion", "superuser"
            ] | sort) and
            .schemaVersion == 1 and
            .databaseIdentity == $database_identity and
            (.runtimeRoleIdentitySha256 | test("^[a-f0-9]{64}$")) and
            .credentialsDistinct == true and
            .sameDatabaseSessionVerified == true and
            .superuser == false and
            (.bypassRls | type) == "boolean" and
            .createDatabase == false and .createRole == false and .replication == false and
            .pgWriteAllDataMembership == false and .migrationRoleMembership == false and
            .adminMembership == false and .ownsDatabase == false and
            .ownsPublicSchema == false and .ownsPublicRelations == false and
            .ownsPublicFunctions == false and .ownsPublicTypes == false and
            .publicSchemaCreate == false and .releaseFenceSelect == true and
            .releaseFenceInsert == false and .releaseFenceUpdate == false and
            .releaseFenceDelete == false and .releaseFenceTruncate == false and
            .releaseFenceTrigger == false and .releaseFenceReferences == false and
            .representativeAppWriteRolledBack == true and .persistentMutation == false
          ' "$output" > /dev/null

      - name: Prove staging and production release-cell isolation
        env:
          PRODUCTION_APP_BASE_URL: ${{ steps.production-release-contract.outputs.app_base_url }}
          PRODUCTION_ARCHIVE_ID: ${{ steps.production-release-contract.outputs.archive_id }}
          PRODUCTION_DATABASE_IDENTITY: ${{ steps.production-release-contract.outputs.database_identity }}
          PRODUCTION_OBJECT_STORAGE_IDENTITY: ${{ steps.production-release-contract.outputs.object_storage_identity }}
          PRODUCTION_OBJECT_STORAGE_PROVIDER_ID: ${{ vars.KINRESOLVE_OBJECT_STORAGE_PROVIDER_ID }}
          STAGING_APP_BASE_URL: ${{ needs.staging.outputs.app_base_url }}
          STAGING_ARCHIVE_ID: ${{ needs.staging.outputs.archive_id }}
          STAGING_DATABASE_IDENTITY: ${{ needs.staging.outputs.database_identity }}
          STAGING_OBJECT_STORAGE_IDENTITY: ${{ needs.staging.outputs.object_storage_identity }}
          STAGING_OBJECT_STORAGE_PROVIDER_ID: ${{ needs.staging.outputs.object_storage_provider_id }}
        run: |
          set -euo pipefail
          [[ "$PRODUCTION_OBJECT_STORAGE_PROVIDER_ID" =~ ^[a-z0-9][a-z0-9-]{7,63}$ ]]
          [[ "$STAGING_OBJECT_STORAGE_PROVIDER_ID" =~ ^[a-z0-9][a-z0-9-]{7,63}$ ]]
          test "$PRODUCTION_APP_BASE_URL" != "$STAGING_APP_BASE_URL"
          test "$PRODUCTION_ARCHIVE_ID" != "$STAGING_ARCHIVE_ID"
          test "$PRODUCTION_DATABASE_IDENTITY" != "$STAGING_DATABASE_IDENTITY"
          test "$PRODUCTION_OBJECT_STORAGE_IDENTITY" != "$STAGING_OBJECT_STORAGE_IDENTITY"
          test "$PRODUCTION_OBJECT_STORAGE_PROVIDER_ID" != "$STAGING_OBJECT_STORAGE_PROVIDER_ID"

      - name: Validate forward-only production release policy
        env:
          RELEASE_POLICY_OWNER: ${{ github.actor }}
          RELEASE_POLICY_ACKNOWLEDGED_AT: ${{ inputs.release_policy_acknowledged_at }}
          FIRST_CUTOVER_ACKNOWLEDGEMENT: ${{ inputs.first_cutover_acknowledgement }}
        run: node --experimental-strip-types scripts/validate-release-policy.mjs

      - name: Download and verify attested recovery evidence
        id: recovery-readiness
        env:
          EXPECTED_ARCHIVE_ID: ${{ steps.production-release-contract.outputs.archive_id }}
          EXPECTED_EVIDENCE_SHA256: ${{ inputs.recovery_evidence_sha256 }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          KINRESOLVE_DATABASE_IDENTITY: ${{ steps.production-release-contract.outputs.database_identity }}
          KINRESOLVE_OBJECT_STORAGE_IDENTITY: ${{ steps.production-release-contract.outputs.object_storage_identity }}
          KINRESOLVE_OBJECT_STORAGE_PROVIDER_ID: ${{ vars.KINRESOLVE_OBJECT_STORAGE_PROVIDER_ID }}
          RECOVERY_TARGET_DATABASE_IDENTITY: ${{ vars.RECOVERY_TARGET_DATABASE_IDENTITY }}
          RECOVERY_TARGET_OBJECT_STORAGE_IDENTITY: ${{ vars.RECOVERY_TARGET_OBJECT_STORAGE_IDENTITY }}
          RECOVERY_TARGET_OBJECT_STORAGE_PROVIDER_ID: ${{ vars.RECOVERY_TARGET_OBJECT_STORAGE_PROVIDER_ID }}
          RECOVERY_TARGET_SUPABASE_PROJECT_REF: ${{ vars.RECOVERY_TARGET_SUPABASE_PROJECT_REF }}
          RECOVERY_RUN_ID: ${{ inputs.recovery_run_id }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          [[ "$RECOVERY_RUN_ID" =~ ^[1-9][0-9]{0,19}$ ]]
          [[ "$EXPECTED_EVIDENCE_SHA256" =~ ^[0-9a-f]{64}$ ]]
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$RECOVERY_RUN_ID" \
            > "$RUNNER_TEMP/recovery-run.json"
          recovery_run_attempt="$(node -e '
            const { readFileSync } = require("node:fs");
            const run = JSON.parse(readFileSync(process.env.RUNNER_TEMP + "/recovery-run.json", "utf8"));
            if (run.event !== "workflow_dispatch" || run.conclusion !== "success" ||
                run.head_sha !== process.env.RELEASE_COMMIT || run.head_branch !== "main" ||
                run.path !== ".github/workflows/recovery-evidence.yml" ||
                run.repository?.full_name !== process.env.GITHUB_REPOSITORY ||
                String(run.id ?? "") !== process.env.RECOVERY_RUN_ID ||
                !Number.isSafeInteger(run.run_attempt) || run.run_attempt < 1 ||
                run.run_attempt > 9999999999 ||
                run.display_title !== "Kin Resolve recovery run " + run.id + " attempt " + run.run_attempt) {
              process.exit(1);
            }
            process.stdout.write(String(run.run_attempt));
          ')"
          [[ "$recovery_run_attempt" =~ ^[1-9][0-9]{0,9}$ ]]
          evidence_directory="$RUNNER_TEMP/recovery-evidence"
          mkdir -p "$evidence_directory"
          gh run download "$RECOVERY_RUN_ID" --repo "$GITHUB_REPOSITORY" \
            --name "production-recovery-evidence-$recovery_run_attempt" --dir "$evidence_directory"
          evidence_file="$evidence_directory/recovery-evidence.json"
          test -f "$evidence_file"
          test "$(find "$evidence_directory" -type f | wc -l | tr -d ' ')" = "1"
          actual_sha256="$(sha256sum "$evidence_file" | awk '{ print $1 }')"
          test "$actual_sha256" = "$EXPECTED_EVIDENCE_SHA256"
          gh attestation verify "$evidence_file" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/recovery-evidence.yml" \
            --source-ref refs/heads/main \
            --source-digest "$RELEASE_COMMIT" \
            --deny-self-hosted-runners
          node --experimental-strip-types scripts/validate-release-readiness.mjs "$evidence_file"

      - name: Download and verify attested API edge evidence
        id: api-edge-evidence-source
        if: inputs.release_mode == 'api-launch'
        env:
          API_EDGE_EVIDENCE_SHA256: ${{ inputs.api_edge_evidence_sha256 }}
          API_EDGE_RUN_ID: ${{ inputs.api_edge_run_id }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
        run: |
          set -euo pipefail
          [[ "$API_EDGE_RUN_ID" =~ ^[1-9][0-9]{0,19}$ ]]
          [[ "$API_EDGE_EVIDENCE_SHA256" =~ ^[0-9a-f]{64}$ ]]
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$API_EDGE_RUN_ID" \
            > "$RUNNER_TEMP/api-edge-run.json"
          api_edge_run_attempt="$(node -e '
            const { readFileSync } = require("node:fs");
            const run = JSON.parse(readFileSync(process.env.RUNNER_TEMP + "/api-edge-run.json", "utf8"));
            if (run.event !== "workflow_dispatch" || run.conclusion !== "success" ||
                run.head_sha !== process.env.RELEASE_COMMIT || run.head_branch !== "main" ||
                run.path !== ".github/workflows/api-edge-evidence.yml" ||
                run.repository?.full_name !== process.env.GITHUB_REPOSITORY ||
                String(run.id ?? "") !== process.env.API_EDGE_RUN_ID ||
                !Number.isSafeInteger(run.run_attempt) || run.run_attempt < 1 ||
                run.run_attempt > 9999999999 ||
                run.display_title !== "Kin Resolve API edge evidence run " + run.id + " attempt " + run.run_attempt) {
              process.exit(1);
            }
            process.stdout.write(String(run.run_attempt));
          ')"
          [[ "$api_edge_run_attempt" =~ ^[1-9][0-9]{0,9}$ ]]
          evidence_directory="$RUNNER_TEMP/api-edge-evidence"
          mkdir -p "$evidence_directory"
          gh run download "$API_EDGE_RUN_ID" --repo "$GITHUB_REPOSITORY" \
            --name "production-api-edge-evidence-$api_edge_run_attempt" --dir "$evidence_directory"
          evidence_file="$evidence_directory/api-edge-evidence.json"
          test -f "$evidence_file"
          test "$(find "$evidence_directory" -type f | wc -l | tr -d ' ')" = "1"
          actual_sha256="$(sha256sum "$evidence_file" | awk '{ print $1 }')"
          test "$actual_sha256" = "$API_EDGE_EVIDENCE_SHA256"
          gh attestation verify "$evidence_file" \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/api-edge-evidence.yml" \
            --source-ref refs/heads/main \
            --source-digest "$RELEASE_COMMIT" \
            --deny-self-hosted-runners
          API_EDGE_RUN_ATTEMPT="$api_edge_run_attempt" \
            node --experimental-strip-types scripts/validate-api-edge-evidence.mjs "$evidence_file"
          printf 'run_attempt=%s\n' "$api_edge_run_attempt" >> "$GITHUB_OUTPUT"

      - name: Capture and validate the approved holding deployment
        id: production-holding
        env:
          APP_BASE_URL: ${{ steps.production-release-contract.outputs.app_base_url }}
          APPROVED_HOLDING_DEPLOYMENT_ID: ${{ secrets.FIRST_CUTOVER_HOLDING_DEPLOYMENT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          deployment_host="${APP_BASE_URL#https://}"
          [[ "$deployment_host" =~ ^[A-Za-z0-9.-]{4,253}$ ]]
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          curl --connect-timeout 10 --max-time 45 --retry 3 --retry-all-errors --fail --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
            --output "$RUNNER_TEMP/production-holding.json"
          node --experimental-strip-types scripts/validate-vercel-deployment.mjs holding \
            "$RUNNER_TEMP/production-holding.json" \
            "${APP_BASE_URL#https://}"

      - name: Smoke the holding application before migration
        env:
          APP_BASE_URL: ${{ steps.production-release-contract.outputs.app_base_url }}
          KINRESOLVE_DATABASE_IDENTITY: ${{ steps.production-release-contract.outputs.database_identity }}
          KINRESOLVE_DATASET_MODE: ${{ steps.production-release-contract.outputs.dataset_mode }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          SMOKE_ORIGIN: ${{ steps.production-release-contract.outputs.app_base_url }}
          SMOKE_PHASE: "pre-migration"
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: node --experimental-strip-types scripts/smoke-release.mjs

      - name: Assert the evidenced production fence before production-target deployment
        id: assert-write-fence-before-deploy
        env:
          EXPECTED_DATABASE_IDENTITY: ${{ steps.production-release-contract.outputs.database_identity }}
          EXPECTED_FENCE_ACTIVATED_AT: ${{ steps.recovery-readiness.outputs.fence_activated_at }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RELEASE_FENCE_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
          RELEASE_FENCE_ID: ${{ steps.recovery-readiness.outputs.fence_id }}
        run: |
          set -euo pipefail
          npm run --silent release:fence:control -- assert > "$RUNNER_TEMP/assert-write-fence-before-deploy.json"
          jq -e '
            .found == true and
            .transition == "asserted" and
            .fence.fenceId == env.RELEASE_FENCE_ID and
            .fence.releaseCommitSha == env.RELEASE_COMMIT and
            .fence.state == "active" and
            .fence.activatedAt == env.EXPECTED_FENCE_ACTIVATED_AT and
            (.fence.activationGeneration | type) == "number" and
            .fence.activationGeneration >= 1 and
            .fence.activationGeneration == (.fence.activationGeneration | floor)
          ' "$RUNNER_TEMP/assert-write-fence-before-deploy.json" > /dev/null
          jq -r '"activation_generation=\(.fence.activationGeneration)"' \
            "$RUNNER_TEMP/assert-write-fence-before-deploy.json" >> "$GITHUB_OUTPUT"

      - name: Build the production artifact before database mutation
        env:
          KINRESOLVE_BUILD_COMMIT_SHA: ${{ inputs.release_commit }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --prod

      - name: Deploy the immutable production candidate
        id: production-deploy
        env:
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RELEASE_TAG: ${{ format('v{0}', inputs.release_version) }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          deployment_url="$(vercel deploy --prebuilt --prod --skip-domain --yes \
            --meta "githubCommitSha=$RELEASE_COMMIT" \
            --meta "githubRunId=$GITHUB_RUN_ID" \
            --meta "githubRunAttempt=$GITHUB_RUN_ATTEMPT" \
            --meta "releaseTag=$RELEASE_TAG" \
            --meta "packageVersion=$RELEASE_VERSION")"
          DEPLOYMENT_URL="$deployment_url" node -e '
            const url = new URL(process.env.DEPLOYMENT_URL);
            if (url.protocol !== "https:" || url.origin !== process.env.DEPLOYMENT_URL ||
                !url.hostname.endsWith(".vercel.app") || url.hostname === "vercel.app") process.exit(1);
          '
          printf 'url=%s\n' "$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Fetch the production candidate deployment record
        env:
          DEPLOYMENT_URL: ${{ steps.production-deploy.outputs.url }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          deployment_host="${DEPLOYMENT_URL#https://}"
          [[ "$deployment_host" =~ ^[a-z0-9-]+\.vercel\.app$ ]]
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          curl --connect-timeout 10 --max-time 45 --retry 3 --retry-all-errors --fail --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
            --output "$RUNNER_TEMP/production-candidate.json"

      - name: Validate the production candidate deployment
        id: production-candidate
        env:
          APP_BASE_URL: ${{ steps.production-release-contract.outputs.app_base_url }}
          EXPECTED_GITHUB_COMMIT_SHA: ${{ inputs.release_commit }}
          EXPECTED_GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          EXPECTED_GITHUB_RUN_ID: ${{ github.run_id }}
          PACKAGE_VERSION: ${{ inputs.release_version }}
          PREVIOUS_DEPLOYMENT_ID: ${{ steps.production-holding.outputs.deployment_id }}
          RELEASE_TAG: ${{ format('v{0}', inputs.release_version) }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: node --experimental-strip-types scripts/validate-vercel-deployment.mjs candidate "$RUNNER_TEMP/production-candidate.json"

      - name: Prove the generated production candidate rejects unauthenticated access
        timeout-minutes: 5
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: >-
          node --experimental-strip-types scripts/probe-vercel-candidate-protection.mjs
          "$RUNNER_TEMP/production-candidate.json"

      - name: Attest the production candidate database before migration
        env:
          APP_BASE_URL: ${{ steps.production-release-contract.outputs.app_base_url }}
          KINRESOLVE_DATABASE_IDENTITY: ${{ steps.production-release-contract.outputs.database_identity }}
          KINRESOLVE_DATASET_MODE: ${{ steps.production-release-contract.outputs.dataset_mode }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          SMOKE_ORIGIN: ${{ steps.production-candidate.outputs.deployment_url }}
          SMOKE_PHASE: "identity"
          KINRESOLVE_OBSERVABILITY_PROBE_SECRET: ${{ secrets.KINRESOLVE_OBSERVABILITY_PROBE_SECRET }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: node --experimental-strip-types scripts/smoke-release.mjs

      - name: Recheck the release namespace immediately before database mutation
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RELEASE_MODE: ${{ inputs.release_mode }}
          RELEASE_TAG: ${{ format('v{0}', inputs.release_version) }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          RELEASE_WORKFLOW_RUN_ID: ${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api --paginate --slurp "repos/$REPOSITORY/releases?per_page=100" \
            > "$RUNNER_TEMP/pre-mutation-release-namespace.json"
          remote_tag_sha="$(git ls-remote --tags origin "refs/tags/$RELEASE_TAG" \
            | awk 'NR == 1 { print $1 }')"
          node --experimental-strip-types scripts/github-release-namespace.mjs repairable \
            "$RUNNER_TEMP/pre-mutation-release-namespace.json" "${remote_tag_sha:-absent}"

      - name: Revalidate the production holding deployment immediately before migration
        id: production-holding-pre-migration
        env:
          APP_BASE_URL: ${{ steps.production-release-contract.outputs.app_base_url }}
          APPROVED_HOLDING_DEPLOYMENT_ID: ${{ steps.production-holding.outputs.deployment_id }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          deployment_host="${APP_BASE_URL#https://}"
          [[ "$deployment_host" =~ ^[A-Za-z0-9.-]{4,253}$ ]]
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          curl --connect-timeout 10 --max-time 45 --retry 3 --retry-all-errors --fail --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
            --output "$RUNNER_TEMP/production-holding-pre-migration.json"
          env -u GITHUB_OUTPUT node --experimental-strip-types \
            scripts/validate-vercel-deployment.mjs holding \
            "$RUNNER_TEMP/production-holding-pre-migration.json" \
            "${APP_BASE_URL#https://}"

      - name: Smoke the production holding application immediately before migration
        id: production-holding-pre-migration-smoke
        env:
          APP_BASE_URL: ${{ steps.production-release-contract.outputs.app_base_url }}
          KINRESOLVE_DATABASE_IDENTITY: ${{ steps.production-release-contract.outputs.database_identity }}
          KINRESOLVE_DATASET_MODE: ${{ steps.production-release-contract.outputs.dataset_mode }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          SMOKE_ORIGIN: ${{ steps.production-release-contract.outputs.app_base_url }}
          SMOKE_PHASE: "pre-migration"
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: node --experimental-strip-types scripts/smoke-release.mjs

      - name: Assert the live production write fence immediately before database mutation
        id: assert-write-fence-before-migration
        timeout-minutes: 5
        env:
          RELEASE_FENCE_SECRET: ${{ secrets.RELEASE_FENCE_SECRET }}
          EXPECTED_FENCE_ACTIVATED_AT: ${{ steps.recovery-readiness.outputs.fence_activated_at }}
          EXPECTED_FENCE_ID: ${{ steps.recovery-readiness.outputs.fence_id }}
          FENCE_ORIGIN: ${{ steps.production-candidate.outputs.deployment_url }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_FENCE_SECRET" =~ ^[A-Za-z0-9_-]{43,128}$ ]]
          [[ "$EXPECTED_FENCE_ID" =~ ^fence-[a-z0-9][a-z0-9-]{7,63}$ ]]
          [[ "$RELEASE_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          test -n "$VERCEL_AUTOMATION_BYPASS_SECRET"
          body="$(printf '{\"fenceId\":\"%s\",\"releaseCommitSha\":\"%s\"}' \
            "$EXPECTED_FENCE_ID" "$RELEASE_COMMIT")"
          request_args=(
            --connect-timeout 10 --max-time 45 --retry 3 --retry-all-errors
            --fail --silent --show-error --request POST
            --header "Authorization: Bearer $RELEASE_FENCE_SECRET"
            --header "Content-Type: application/json"
            --header "User-Agent: kinresolve-release-fence/1.0"
            --header "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET"
            --data "$body"
          )
          curl "${request_args[@]}" "$FENCE_ORIGIN/api/release/fence/assert" \
            --output "$RUNNER_TEMP/assert-write-fence-before-migration.json"
          node -e '
            const { readFileSync } = require("node:fs");
            const value = JSON.parse(readFileSync(process.env.RUNNER_TEMP + "/assert-write-fence-before-migration.json", "utf8"));
            if (value.fenceId !== process.env.EXPECTED_FENCE_ID ||
                value.releaseCommitSha !== process.env.RELEASE_COMMIT ||
                value.activatedAt !== process.env.EXPECTED_FENCE_ACTIVATED_AT ||
                value.active !== true || value.transition !== "asserted") process.exit(1);
          '

      - name: Migrate production through the dedicated connection
        env:
          EXPECTED_ARCHIVE_ID: ${{ steps.production-release-contract.outputs.archive_id }}
          KINRESOLVE_DATABASE_IDENTITY: ${{ steps.production-release-contract.outputs.database_identity }}
          EXPECTED_MIGRATION_PREFIX_COUNT: ${{ steps.recovery-readiness.outputs.source_migration_count }}
          EXPECTED_MIGRATION_PREFIX_LEDGER_SHA256: ${{ steps.recovery-readiness.outputs.source_migration_ledger_sha256 }}
          MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
        run: npm run db:migrate:production

      - name: Verify the exact production migration ledger
        env:
          EXPECTED_ARCHIVE_ID: ${{ steps.production-release-contract.outputs.archive_id }}
          KINRESOLVE_DATABASE_IDENTITY: ${{ steps.production-release-contract.outputs.database_identity }}
          MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
        run: npm run db:migrations:verify-production

      - name: Grant and re-attest production beta operations runtime access
        env:
          EXPECTED_DATABASE_IDENTITY: ${{ steps.production-release-contract.outputs.database_identity }}
          MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
        run: |
          set -euo pipefail
          output="$RUNNER_TEMP/production-beta-operations-runtime-grants.json"
          npm run db:runtime-role:grant-beta-operations -- "$output"
          jq -e --arg database_identity "$EXPECTED_DATABASE_IDENTITY" '
            (. | keys | sort) == ([
              "credentialsDistinct", "databaseCreate", "databaseIdentity", "exactPrivilegesAttested",
              "grantContract", "managedTablePrivileges", "persistentDataMutation",
              "protectedTablePrivileges", "publicSchemaCreate", "publicSchemaUsage",
              "representativeAppWriteRolledBack", "runtimeRoleIdentitySha256",
              "safeRuntimeRoleReattested", "sameDatabaseSessionVerified", "schemaVersion"
            ] | sort) and
            .schemaVersion == 1 and .grantContract == "beta-operations-v1" and
            .databaseIdentity == $database_identity and
            (.runtimeRoleIdentitySha256 | test("^[a-f0-9]{64}$")) and
            .credentialsDistinct == true and .sameDatabaseSessionVerified == true and
            .safeRuntimeRoleReattested == true and .databaseCreate == false and
            .publicSchemaUsage == true and
            .publicSchemaCreate == false and .exactPrivilegesAttested == true and
            .representativeAppWriteRolledBack == true and .persistentDataMutation == false and
            (.managedTablePrivileges | map({table, select, insert, update, delete})) == [
              {"table":"auth_rate_limit_buckets","select":true,"insert":true,"update":true,"delete":true},
              {"table":"beta_applications","select":true,"insert":true,"update":true,"delete":true},
              {"table":"beta_data_operations","select":true,"insert":true,"update":true,"delete":false},
              {"table":"beta_worker_heartbeats","select":true,"insert":true,"update":true,"delete":false},
              {"table":"api_tokens","select":true,"insert":true,"update":true,"delete":false},
              {"table":"api_rate_limit_buckets","select":true,"insert":true,"update":true,"delete":true},
              {"table":"public_demo_capacity","select":true,"insert":true,"update":true,"delete":false},
              {"table":"public_demo_sessions","select":true,"insert":true,"update":true,"delete":true},
              {"table":"public_demo_rate_limits","select":true,"insert":true,"update":true,"delete":true},
              {"table":"public_demo_generations","select":true,"insert":true,"update":true,"delete":true},
              {"table":"public_demo_ai_attempts","select":true,"insert":true,"update":true,"delete":true},
              {"table":"public_demo_events","select":true,"insert":true,"update":false,"delete":true},
              {"table":"public_demo_stats","select":true,"insert":false,"update":true,"delete":false},
              {"table":"security_events","select":false,"insert":true,"update":false,"delete":false}
            ] and
            all(.managedTablePrivileges[];
              (. | keys | sort) == ([
                "delete", "grantOptions", "insert", "maintain", "references",
                "select", "table", "trigger", "truncate", "update"
              ] | sort) and .truncate == false and .references == false and
              .trigger == false and .maintain == false and .grantOptions == false) and
            (.protectedTablePrivileges | map(.table)) == [
              "release_write_fences", "schema_migrations"
            ] and
            all(.protectedTablePrivileges[];
              (. | keys | sort) == ([
                "delete", "grantOptions", "insert", "maintain", "references",
                "select", "table", "trigger", "truncate", "update"
              ] | sort) and .select == true and .insert == false and .update == false and
              .delete == false and .truncate == false and .references == false and
              .trigger == false and .maintain == false and .grantOptions == false)
          ' "$output" > /dev/null

      - name: Reassert the production write fence after migration
        id: assert-write-fence-after-migration
        timeout-minutes: 5
        env:
          RELEASE_FENCE_SECRET: ${{ secrets.RELEASE_FENCE_SECRET }}
          EXPECTED_FENCE_ACTIVATED_AT: ${{ steps.recovery-readiness.outputs.fence_activated_at }}
          EXPECTED_FENCE_ID: ${{ steps.recovery-readiness.outputs.fence_id }}
          FENCE_ORIGIN: ${{ steps.production-candidate.outputs.deployment_url }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_FENCE_SECRET" =~ ^[A-Za-z0-9_-]{43,128}$ ]]
          test -n "$VERCEL_AUTOMATION_BYPASS_SECRET"
          body="$(printf '{\"fenceId\":\"%s\",\"releaseCommitSha\":\"%s\"}' \
            "$EXPECTED_FENCE_ID" "$RELEASE_COMMIT")"
          request_args=(
            --connect-timeout 10 --max-time 45 --retry 3 --retry-all-errors
            --fail --silent --show-error --request POST
            --header "Authorization: Bearer $RELEASE_FENCE_SECRET"
            --header "Content-Type: application/json"
            --header "User-Agent: kinresolve-release-fence/1.0"
            --header "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET"
            --data "$body"
          )
          curl "${request_args[@]}" "$FENCE_ORIGIN/api/release/fence/assert" \
            --output "$RUNNER_TEMP/assert-write-fence-after-migration.json"
          node -e '
            const { readFileSync } = require("node:fs");
            const value = JSON.parse(readFileSync(process.env.RUNNER_TEMP + "/assert-write-fence-after-migration.json", "utf8"));
            if (value.fenceId !== process.env.EXPECTED_FENCE_ID ||
                value.releaseCommitSha !== process.env.RELEASE_COMMIT ||
                value.activatedAt !== process.env.EXPECTED_FENCE_ACTIVATED_AT ||
                value.active !== true || value.transition !== "asserted") process.exit(1);
          '

      - name: Prepare the ephemeral production API canary
        id: prepare-api-canary
        if: inputs.release_mode == 'api-launch'
        timeout-minutes: 5
        env:
          KINRESOLVE_API_CANARY_OWNER_USER_ID: ${{ secrets.KINRESOLVE_API_CANARY_OWNER_USER_ID }}
          MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
        run: |
          set -euo pipefail
          umask 077
          node --experimental-strip-types scripts/production-api-canary.mjs prepare \
            "$RUNNER_TEMP/production-api-canary.token" \
            "$RUNNER_TEMP/production-api-canary-metadata.json" \
            "$RUNNER_TEMP/production-api-canary-evidence.json"

      - name: Smoke the production candidate
        id: candidate-smoke
        env:
          APP_BASE_URL: ${{ steps.production-release-contract.outputs.app_base_url }}
          KINRESOLVE_DATABASE_IDENTITY: ${{ steps.production-release-contract.outputs.database_identity }}
          KINRESOLVE_DATASET_MODE: ${{ steps.production-release-contract.outputs.dataset_mode }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          SMOKE_ORIGIN: ${{ steps.production-candidate.outputs.deployment_url }}
          SMOKE_PHASE: "full"
          KINRESOLVE_API_V1_ENABLED: ${{ steps.production-release-contract.outputs.api_v1_enabled }}
          KINRESOLVE_SCHEDULED_WRITES_ENABLED: "true"
          KINRESOLVE_OBSERVABILITY_PROBE_SECRET: ${{ secrets.KINRESOLVE_OBSERVABILITY_PROBE_SECRET }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: node --experimental-strip-types scripts/smoke-release.mjs

      - name: Prove the exact production candidate UI anonymously
        id: production-candidate-browser-smoke
        timeout-minutes: 10
        env:
          KINRESOLVE_CANARY_API_V1_ENABLED: ${{ steps.production-release-contract.outputs.api_v1_enabled }}
          KINRESOLVE_CANARY_APP_BASE_URL: ${{ steps.production-release-contract.outputs.app_base_url }}
          KINRESOLVE_CANARY_DATASET_MODE: ${{ steps.production-release-contract.outputs.dataset_mode }}
          KINRESOLVE_CANARY_HEADLESS: "true"
          KINRESOLVE_CANARY_OBSERVABILITY_PROBE_SECRET: ${{ secrets.KINRESOLVE_OBSERVABILITY_PROBE_SECRET }}
          KINRESOLVE_CANARY_ORIGIN: ${{ steps.production-candidate.outputs.deployment_url }}
          KINRESOLVE_CANARY_RELEASE_SHA: ${{ inputs.release_commit }}
          KINRESOLVE_CANARY_RUN_ID: production-candidate-${{ github.run_attempt }}
          KINRESOLVE_CANARY_TIMEOUT_MS: "60000"
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: npm run test:production-smoke

      - name: Prove the production candidate API with an ephemeral owner-bound token
        if: inputs.release_mode == 'api-launch'
        timeout-minutes: 5
        env:
          CANARY_ORIGIN: ${{ steps.production-candidate.outputs.deployment_url }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: >-
          node --experimental-strip-types scripts/production-api-canary.mjs probe-candidate
          "$RUNNER_TEMP/production-api-canary.token"
          "$RUNNER_TEMP/production-api-canary-metadata.json"
          "$RUNNER_TEMP/production-api-canary-evidence.json"

      - name: Re-read and verify the live API edge configuration before promotion
        if: inputs.release_mode == 'api-launch'
        timeout-minutes: 5
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          [[ "$VERCEL_ORG_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          [[ "$VERCEL_PROJECT_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          test -n "$VERCEL_TOKEN"
          scope_query="projectId=$VERCEL_PROJECT_ID"
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then
            scope_query="$scope_query&teamId=$VERCEL_ORG_ID"
          fi
          active_config="$RUNNER_TEMP/api-edge-active-before-promotion.json"
          bypass_config="$RUNNER_TEMP/api-edge-bypasses-before-promotion.json"
          curl --connect-timeout 10 --max-time 45 --retry 3 --retry-all-errors \
            --fail --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v1/security/firewall/config/active?$scope_query" \
            --output "$active_config"
          curl --connect-timeout 10 --max-time 45 --retry 3 --retry-all-errors \
            --fail --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v1/security/firewall/bypass?$scope_query&limit=100" \
            --output "$bypass_config"
          node --experimental-strip-types scripts/verify-live-api-edge-config.mjs \
            "$RUNNER_TEMP/api-edge-evidence/api-edge-evidence.json" \
            "$active_config" "$bypass_config"

      - name: Revalidate the captured holding deployment immediately before promotion
        env:
          APP_BASE_URL: ${{ steps.production-release-contract.outputs.app_base_url }}
          APPROVED_HOLDING_DEPLOYMENT_ID: ${{ steps.production-holding.outputs.deployment_id }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          deployment_host="${APP_BASE_URL#https://}"
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          curl --connect-timeout 10 --max-time 45 --retry 3 --retry-all-errors --fail --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
            --output "$RUNNER_TEMP/production-holding-pre-promotion.json"
          node --experimental-strip-types scripts/validate-vercel-deployment.mjs holding \
            "$RUNNER_TEMP/production-holding-pre-promotion.json" \
            "${APP_BASE_URL#https://}"

      - name: Mark promotion attempt
        id: promotion-marker
        run: printf 'attempted=true\n' >> "$GITHUB_OUTPUT"

      - name: Promote the exact production candidate
        id: promote
        timeout-minutes: 10
        env:
          CANDIDATE_DEPLOYMENT_URL: ${{ steps.production-candidate.outputs.deployment_url }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel promote "$CANDIDATE_DEPLOYMENT_URL" --yes --timeout=5m

      - name: Disable and independently attest production domain auto-assignment
        id: domain-auto-assignment
        if: >-
          always() &&
          steps.promotion-marker.outputs.attempted == 'true'
        timeout-minutes: 5
        env:
          EXPECTED_VERCEL_PROJECT_PAUSED: "false"
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          project_api="https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID$scope_query"
          curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
            --fail --silent --show-error --request PATCH \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            --header "Content-Type: application/json" \
            --data '{"autoAssignCustomDomains":false}' \
            "$project_api" --output "$RUNNER_TEMP/production-project-auto-assignment-patch.json"
          curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
            --fail --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "$project_api" --output "$RUNNER_TEMP/production-project-after-auto-assignment.json"
          node --experimental-strip-types scripts/validate-vercel-project-safety.mjs \
            "$RUNNER_TEMP/production-project-after-auto-assignment.json"

      - name: Emergency-pause production if domain auto-assignment cannot be disabled
        if: >-
          always() &&
          steps.promotion-marker.outputs.attempted == 'true' &&
          steps.domain-auto-assignment.outcome != 'success'
        timeout-minutes: 5
        env:
          EXPECTED_VERCEL_PROJECT_PAUSED: "true"
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
            --fail --silent --show-error --request POST \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v1/projects/$VERCEL_PROJECT_ID/pause$scope_query" \
            --output "$RUNNER_TEMP/production-project-emergency-pause.json"
          curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
            --fail --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID$scope_query" \
            --output "$RUNNER_TEMP/production-project-after-emergency-pause.json"
          node --experimental-strip-types scripts/validate-vercel-project-safety.mjs \
            "$RUNNER_TEMP/production-project-after-emergency-pause.json"

      - name: Fetch the promoted canonical deployment record
        id: fetch-promoted
        timeout-minutes: 10
        env:
          APP_BASE_URL: ${{ steps.production-release-contract.outputs.app_base_url }}
          CANDIDATE_DEPLOYMENT_ID: ${{ steps.production-candidate.outputs.deployment_id }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          deployment_host="${APP_BASE_URL#https://}"
          [[ "$deployment_host" =~ ^[A-Za-z0-9.-]{4,253}$ ]]
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          for attempt in $(seq 1 20); do
            rm -f "$RUNNER_TEMP/production-promoted.json"
            if curl --connect-timeout 10 --max-time 30 --fail --silent --show-error \
                --header "Authorization: Bearer $VERCEL_TOKEN" \
                "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
                --output "$RUNNER_TEMP/production-promoted.json" \
              && GITHUB_OUTPUT="$RUNNER_TEMP/promotion-poll-output" \
                node --experimental-strip-types scripts/validate-vercel-deployment.mjs promoted \
                  "$RUNNER_TEMP/production-promoted.json" \
                  "${APP_BASE_URL#https://}" >/dev/null 2>&1; then
              exit 0
            fi
            if [[ "$attempt" = 20 ]]; then
              echo "Canonical alias did not converge to the candidate before the deadline." >&2
              exit 1
            fi
            sleep 3
          done

      - name: Validate the exact promoted deployment and canonical alias
        id: validate-promoted
        env:
          APP_BASE_URL: ${{ steps.production-release-contract.outputs.app_base_url }}
          CANDIDATE_DEPLOYMENT_ID: ${{ steps.production-candidate.outputs.deployment_id }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: node --experimental-strip-types scripts/validate-vercel-deployment.mjs promoted "$RUNNER_TEMP/production-promoted.json" "${APP_BASE_URL#https://}"

      - name: Smoke the canonical production application
        id: canonical-smoke
        timeout-minutes: 15
        env:
          APP_BASE_URL: ${{ steps.production-release-contract.outputs.app_base_url }}
          KINRESOLVE_DATABASE_IDENTITY: ${{ steps.production-release-contract.outputs.database_identity }}
          KINRESOLVE_DATASET_MODE: ${{ steps.production-release-contract.outputs.dataset_mode }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          SMOKE_ORIGIN: ${{ steps.production-release-contract.outputs.app_base_url }}
          SMOKE_PHASE: "full"
          KINRESOLVE_API_V1_ENABLED: ${{ steps.production-release-contract.outputs.api_v1_enabled }}
          KINRESOLVE_SCHEDULED_WRITES_ENABLED: "true"
          KINRESOLVE_OBSERVABILITY_PROBE_SECRET: ${{ secrets.KINRESOLVE_OBSERVABILITY_PROBE_SECRET }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: node --experimental-strip-types scripts/smoke-release.mjs

      - name: Prove the canonical production UI anonymously without a bypass
        id: production-canonical-browser-smoke
        timeout-minutes: 10
        env:
          KINRESOLVE_CANARY_API_V1_ENABLED: ${{ steps.production-release-contract.outputs.api_v1_enabled }}
          KINRESOLVE_CANARY_APP_BASE_URL: ${{ steps.production-release-contract.outputs.app_base_url }}
          KINRESOLVE_CANARY_DATASET_MODE: ${{ steps.production-release-contract.outputs.dataset_mode }}
          KINRESOLVE_CANARY_HEADLESS: "true"
          KINRESOLVE_CANARY_OBSERVABILITY_PROBE_SECRET: ${{ secrets.KINRESOLVE_OBSERVABILITY_PROBE_SECRET }}
          KINRESOLVE_CANARY_ORIGIN: ${{ steps.production-release-contract.outputs.app_base_url }}
          KINRESOLVE_CANARY_RELEASE_SHA: ${{ inputs.release_commit }}
          KINRESOLVE_CANARY_RUN_ID: production-canonical-${{ github.run_attempt }}
          KINRESOLVE_CANARY_TIMEOUT_MS: "60000"
        run: npm run test:production-smoke

      - name: Prove the canonical production API without a protection bypass
        if: inputs.release_mode == 'api-launch'
        timeout-minutes: 5
        env:
          CANARY_ORIGIN: https://app.kinresolve.com
          RELEASE_COMMIT: ${{ inputs.release_commit }}
        run: >-
          node --experimental-strip-types scripts/production-api-canary.mjs probe-canonical
          "$RUNNER_TEMP/production-api-canary.token"
          "$RUNNER_TEMP/production-api-canary-metadata.json"
          "$RUNNER_TEMP/production-api-canary-evidence.json"

      - name: Revoke the ephemeral production API canary
        if: inputs.release_mode == 'api-launch'
        timeout-minutes: 5
        env:
          KINRESOLVE_API_CANARY_OWNER_USER_ID: ${{ secrets.KINRESOLVE_API_CANARY_OWNER_USER_ID }}
          MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
        run: >-
          node --experimental-strip-types scripts/production-api-canary.mjs revoke
          "$RUNNER_TEMP/production-api-canary.token"
          "$RUNNER_TEMP/production-api-canary-metadata.json"
          "$RUNNER_TEMP/production-api-canary-evidence.json"

      - name: Prove the revoked canary is rejected immediately at the canonical edge
        if: inputs.release_mode == 'api-launch'
        timeout-minutes: 5
        env:
          CANARY_ORIGIN: https://app.kinresolve.com
          RELEASE_COMMIT: ${{ inputs.release_commit }}
        run: >-
          node --experimental-strip-types scripts/production-api-canary.mjs prove-revoked
          "$RUNNER_TEMP/production-api-canary.token"
          "$RUNNER_TEMP/production-api-canary-metadata.json"
          "$RUNNER_TEMP/production-api-canary-evidence.json"

      - name: Finalize privacy-safe production API canary evidence
        id: api-canary-evidence
        if: inputs.release_mode == 'api-launch'
        timeout-minutes: 5
        env:
          KINRESOLVE_API_CANARY_OWNER_USER_ID: ${{ secrets.KINRESOLVE_API_CANARY_OWNER_USER_ID }}
          MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
        run: >-
          node --experimental-strip-types scripts/production-api-canary.mjs finalize
          "$RUNNER_TEMP/production-api-canary.token"
          "$RUNNER_TEMP/production-api-canary-metadata.json"
          "$RUNNER_TEMP/production-api-canary-evidence.json"

      - name: Always revoke and remove the ephemeral production API canary
        if: >-
          always() &&
          inputs.release_mode == 'api-launch' &&
          steps.production-release-contract.outcome == 'success'
        timeout-minutes: 5
        env:
          KINRESOLVE_API_CANARY_OWNER_USER_ID: ${{ secrets.KINRESOLVE_API_CANARY_OWNER_USER_ID }}
          MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
        run: >-
          node --experimental-strip-types scripts/production-api-canary.mjs cleanup
          "$RUNNER_TEMP/production-api-canary.token"
          "$RUNNER_TEMP/production-api-canary-metadata.json"
          "$RUNNER_TEMP/production-api-canary-evidence.json"

      - name: Re-read and verify the live API edge configuration after promotion
        if: inputs.release_mode == 'api-launch'
        timeout-minutes: 5
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          [[ "$VERCEL_ORG_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          [[ "$VERCEL_PROJECT_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          test -n "$VERCEL_TOKEN"
          scope_query="projectId=$VERCEL_PROJECT_ID"
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then
            scope_query="$scope_query&teamId=$VERCEL_ORG_ID"
          fi
          active_config="$RUNNER_TEMP/api-edge-active-after-promotion.json"
          bypass_config="$RUNNER_TEMP/api-edge-bypasses-after-promotion.json"
          curl --connect-timeout 10 --max-time 45 --retry 3 --retry-all-errors \
            --fail --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v1/security/firewall/config/active?$scope_query" \
            --output "$active_config"
          curl --connect-timeout 10 --max-time 45 --retry 3 --retry-all-errors \
            --fail --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v1/security/firewall/bypass?$scope_query&limit=100" \
            --output "$bypass_config"
          node --experimental-strip-types scripts/verify-live-api-edge-config.mjs \
            "$RUNNER_TEMP/api-edge-evidence/api-edge-evidence.json" \
            "$active_config" "$bypass_config"

      - name: Assemble the sanitized API launch release receipt
        id: api-launch-receipt
        if: inputs.release_mode == 'api-launch'
        env:
          API_CANARY_EVIDENCE_SHA256: ${{ steps.api-canary-evidence.outputs.evidence_sha256 }}
          API_EDGE_EVIDENCE_SHA256: ${{ inputs.api_edge_evidence_sha256 }}
          API_EDGE_RUN_ATTEMPT: ${{ steps.api-edge-evidence-source.outputs.run_attempt }}
          API_EDGE_RUN_ID: ${{ inputs.api_edge_run_id }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          RELEASE_WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
          RELEASE_WORKFLOW_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          receipt_directory="$RUNNER_TEMP/api-launch-release-receipt"
          install -d -m 700 "$receipt_directory"
          node --experimental-strip-types scripts/api-launch-release-receipt.mjs assemble \
            "$RUNNER_TEMP/api-edge-evidence/api-edge-evidence.json" \
            "$RUNNER_TEMP/production-api-canary-evidence.json" \
            "$receipt_directory/kinresolve-api-launch-receipt.json"

      - name: Upload only the sanitized API launch release receipt
        if: inputs.release_mode == 'api-launch'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-api-launch-release-receipt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/api-launch-release-receipt/kinresolve-api-launch-receipt.json
          if-no-files-found: error
          retention-days: 90
          compression-level: 0

      - name: Remove local API launch receipt inputs after durable upload
        if: inputs.release_mode == 'api-launch'
        run: |
          set -euo pipefail
          rm -f "$RUNNER_TEMP/production-api-canary-evidence.json"
          rm -rf "$RUNNER_TEMP/api-launch-release-receipt"

      - name: Release the attested production write fence
        id: release-write-fence
        timeout-minutes: 5
        env:
          EXPECTED_DATABASE_IDENTITY: ${{ steps.production-release-contract.outputs.database_identity }}
          EXPECTED_FENCE_ACTIVATION_GENERATION: ${{ steps.assert-write-fence-before-deploy.outputs.activation_generation }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RELEASE_FENCE_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
          RELEASE_FENCE_ID: ${{ steps.recovery-readiness.outputs.fence_id }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_FENCE_ID" =~ ^fence-[a-z0-9][a-z0-9-]{7,63}$ ]]
          [[ "$EXPECTED_FENCE_ACTIVATION_GENERATION" =~ ^[1-9][0-9]*$ ]]
          npm run --silent release:fence:control -- release > "$RUNNER_TEMP/release-write-fence.json"
          jq -e --argjson expected_generation "$EXPECTED_FENCE_ACTIVATION_GENERATION" '
            .found == true and
            .transition == "released" and
            .fence.fenceId == env.RELEASE_FENCE_ID and
            .fence.releaseCommitSha == env.RELEASE_COMMIT and
            .fence.state == "released" and
            .fence.activationGeneration == $expected_generation and
            (.fence.releasedAt | type) == "string"
          ' "$RUNNER_TEMP/release-write-fence.json" > /dev/null

      - name: Revalidate the canonical candidate after releasing the fence
        id: final-canonical-validation
        timeout-minutes: 5
        env:
          APP_BASE_URL: ${{ steps.production-release-contract.outputs.app_base_url }}
          CANDIDATE_DEPLOYMENT_ID: ${{ steps.production-candidate.outputs.deployment_id }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          deployment_host="${APP_BASE_URL#https://}"
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors --fail --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
            --output "$RUNNER_TEMP/production-final-canonical.json"
          node --experimental-strip-types scripts/validate-vercel-deployment.mjs promoted \
            "$RUNNER_TEMP/production-final-canonical.json" \
            "${APP_BASE_URL#https://}"

      - name: Smoke the fully enabled canonical production application
        timeout-minutes: 15
        env:
          APP_BASE_URL: ${{ steps.production-release-contract.outputs.app_base_url }}
          KINRESOLVE_DATABASE_IDENTITY: ${{ steps.production-release-contract.outputs.database_identity }}
          KINRESOLVE_DATASET_MODE: ${{ steps.production-release-contract.outputs.dataset_mode }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          SMOKE_ORIGIN: ${{ steps.production-release-contract.outputs.app_base_url }}
          SMOKE_PHASE: "full"
          KINRESOLVE_API_V1_ENABLED: ${{ steps.production-release-contract.outputs.api_v1_enabled }}
          KINRESOLVE_SCHEDULED_WRITES_ENABLED: "true"
          KINRESOLVE_OBSERVABILITY_PROBE_SECRET: ${{ secrets.KINRESOLVE_OBSERVABILITY_PROBE_SECRET }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: node --experimental-strip-types scripts/smoke-release.mjs

      - name: Prove the enabled production beta intake and remove its exact synthetic row
        id: production-beta-intake-smoke
        if: inputs.beta_intake_enabled
        timeout-minutes: 10
        env:
          APP_BASE_URL: ${{ steps.production-release-contract.outputs.app_base_url }}
          BETA_APPLICATION_CANARY_EMAIL_PATTERN: ${{ secrets.BETA_APPLICATION_CANARY_EMAIL_PATTERN }}
          BETA_APPLICATION_CANARY_PHASE: production
          BETA_APPLICATION_CANARY_RUN_ATTEMPT: ${{ github.run_attempt }}
          BETA_APPLICATION_CANARY_RUN_ID: ${{ github.run_id }}
          EXPECTED_BETA_APPLICATIONS_ENABLED: ${{ steps.production-release-contract.outputs.beta_applications_enabled }}
          MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
        run: |
          set -euo pipefail
          umask 077
          test "$APP_BASE_URL" = "https://app.kinresolve.com"
          test "$EXPECTED_BETA_APPLICATIONS_ENABLED" = "true"
          CANARY_NAME="Kin Resolve Production Release Canary ${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          CANARY_HONEYPOT_NAME="$CANARY_NAME Honeypot"
          CANARY_EMAIL_FILE="$RUNNER_TEMP/production-beta-intake-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.email"
          export BETA_APPLICATION_CANARY_EMAIL_FILE="$CANARY_EMAIL_FILE"
          export BETA_APPLICATION_CANARY_NAME="$CANARY_NAME"
          export BETA_APPLICATION_CANARY_HONEYPOT_NAME="$CANARY_HONEYPOT_NAME"

          cleanup_canary() {
            node --experimental-strip-types scripts/beta-application-release-canary.mjs cleanup \
              >/dev/null 2>&1 || true
            rm -f "$CANARY_EMAIL_FILE"
            rm -f "$RUNNER_TEMP/beta-intake-"*.headers "$RUNNER_TEMP/beta-intake-"*.body
          }
          trap cleanup_canary EXIT
          test ! -e "$CANARY_EMAIL_FILE"
          node --experimental-strip-types scripts/beta-application-release-canary.mjs preflight
          IFS= read -r CANARY_EMAIL < "$CANARY_EMAIL_FILE"
          test -n "$CANARY_EMAIL"
          test "$(wc -l < "$CANARY_EMAIL_FILE" | tr -d '[:space:]')" = "1"

          submit_canary_form() {
            local name="$1" website="$2" prefix="$3" status
            status="$(curl --connect-timeout 10 --max-time 60 --retry 2 --retry-all-errors \
              --silent --show-error --request POST --max-redirs 0 \
              --header "Origin: https://kinresolve.com" \
              --header "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "name=$name" \
              --data-urlencode "email=$CANARY_EMAIL" \
              --data-urlencode "researcher_type=developer-self-hoster" \
              --data-urlencode "current_tool=gramps" \
              --data-urlencode "archive_size_band=prefer-not-to-say" \
              --data-urlencode "workflow=developer-api" \
              --data-urlencode "consent_version=beta-communications-v1" \
              --data-urlencode "consent=accepted" \
              --data-urlencode "website=$website" \
              --dump-header "$RUNNER_TEMP/$prefix.headers" \
              --output "$RUNNER_TEMP/$prefix.body" \
              --write-out '%{http_code}' \
              "$APP_BASE_URL/api/public/beta-applications")"
            test "$status" = "303"
            HEADER_FILE="$RUNNER_TEMP/$prefix.headers" BODY_FILE="$RUNNER_TEMP/$prefix.body" \
              node --input-type=module <<'NODE'
          import { readFile } from "node:fs/promises";
          try {
            const [headers, body] = await Promise.all([
              readFile(process.env.HEADER_FILE, "utf8"),
              readFile(process.env.BODY_FILE)
            ]);
            if (body.byteLength !== 0
              || !/(?:^|\r?\n)location:\s*https:\/\/kinresolve\.com\/beta\/thanks\/\r?$/im.test(headers)
              || !/(?:^|\r?\n)cache-control:\s*no-store\r?$/im.test(headers)
              || !/(?:^|\r?\n)referrer-policy:\s*no-referrer\r?$/im.test(headers)) throw new Error();
          } catch {
            console.error("Production beta intake redirect proof failed.");
            process.exitCode = 1;
          }
          NODE
          }

          submit_canary_form "$CANARY_HONEYPOT_NAME" "synthetic-canary.invalid" "beta-intake-honeypot"
          submit_canary_form "$CANARY_NAME" "" "beta-intake-application"
          node --experimental-strip-types scripts/beta-application-release-canary.mjs verify-delete
          trap - EXIT
          cleanup_canary
          printf 'proven=true\n' >> "$GITHUB_OUTPUT"

      - name: Reconcile both signed production schedulers after fence release
        timeout-minutes: 10
        env:
          APP_BASE_URL: ${{ steps.production-release-contract.outputs.app_base_url }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          set -euo pipefail
          test -n "$CRON_SECRET"
          test -n "$VERCEL_AUTOMATION_BYPASS_SECRET"
          for path in /api/cron/import-uploads /api/cron/integration-jobs; do
            name="${path##*/}"
            status="$(curl --connect-timeout 10 --max-time 300 --retry 2 --retry-all-errors \
              --silent --show-error \
              --header "Authorization: Bearer $CRON_SECRET" \
              --header "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET" \
              --output "$RUNNER_TEMP/production-$name-reconcile.json" \
              --write-out '%{http_code}' \
              "$APP_BASE_URL$path")"
            test "$status" = "200"
            jq -e 'type == "object"' "$RUNNER_TEMP/production-$name-reconcile.json" > /dev/null
          done

      - name: Revalidate the canonical candidate after scheduler reconciliation
        timeout-minutes: 5
        env:
          APP_BASE_URL: ${{ steps.production-release-contract.outputs.app_base_url }}
          CANDIDATE_DEPLOYMENT_ID: ${{ steps.production-candidate.outputs.deployment_id }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          deployment_host="${APP_BASE_URL#https://}"
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
            --fail --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
            --output "$RUNNER_TEMP/production-post-reconcile.json"
          env -u GITHUB_OUTPUT node --experimental-strip-types \
            scripts/validate-vercel-deployment.mjs promoted \
            "$RUNNER_TEMP/production-post-reconcile.json" \
            "${APP_BASE_URL#https://}"

      - name: Recheck the release namespace after cutover
        id: final-release-namespace
        timeout-minutes: 5
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RELEASE_MODE: ${{ inputs.release_mode }}
          RELEASE_TAG: ${{ format('v{0}', inputs.release_version) }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          RELEASE_WORKFLOW_RUN_ID: ${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api --paginate --slurp "repos/$REPOSITORY/releases?per_page=100" \
            > "$RUNNER_TEMP/post-cutover-release-namespace.json"
          remote_tag_sha="$(git ls-remote --tags origin "refs/tags/$RELEASE_TAG" \
            | awk 'NR == 1 { print $1 }')"
          node --experimental-strip-types scripts/github-release-namespace.mjs repairable \
            "$RUNNER_TEMP/post-cutover-release-namespace.json" "${remote_tag_sha:-absent}"

      - name: Record the privacy-safe release gate summary
        env:
          FENCE_ID: ${{ steps.recovery-readiness.outputs.fence_id }}
          PRODUCTION_CANDIDATE_DEPLOYMENT_ID: ${{ steps.production-candidate.outputs.deployment_id }}
          PRODUCTION_HOLDING_DEPLOYMENT_ID: ${{ steps.production-holding.outputs.deployment_id }}
          API_EDGE_EVIDENCE_SHA256: ${{ inputs.api_edge_evidence_sha256 }}
          API_CANARY_EVIDENCE_SHA256: ${{ steps.api-canary-evidence.outputs.evidence_sha256 }}
          API_LAUNCH_RECEIPT_SHA256: ${{ steps.api-launch-receipt.outputs.receipt_sha256 }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RELEASE_MODE: ${{ inputs.release_mode }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          STAGING_CANDIDATE_DEPLOYMENT_ID: ${{ needs.staging.outputs.candidate_deployment_id }}
          STAGING_HOLDING_DEPLOYMENT_ID: ${{ needs.staging.outputs.holding_deployment_id }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_COMMIT" =~ ^[a-f0-9]{40}$ ]]
          [[ "$RELEASE_VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]
          [[ "$FENCE_ID" =~ ^fence-[a-z0-9][a-z0-9-]{7,63}$ ]]
          [[ "$RELEASE_MODE" = "application" || "$RELEASE_MODE" = "api-launch" ]]
          if [[ "$RELEASE_MODE" = "api-launch" ]]; then
            [[ "$API_EDGE_EVIDENCE_SHA256" =~ ^[a-f0-9]{64}$ ]]
            [[ "$API_CANARY_EVIDENCE_SHA256" =~ ^[a-f0-9]{64}$ ]]
            [[ "$API_LAUNCH_RECEIPT_SHA256" =~ ^[a-f0-9]{64}$ ]]
          else
            test -z "$API_EDGE_EVIDENCE_SHA256"
            test -z "$API_CANARY_EVIDENCE_SHA256"
            test -z "$API_LAUNCH_RECEIPT_SHA256"
          fi
          for deployment_id in \
            "$STAGING_HOLDING_DEPLOYMENT_ID" \
            "$STAGING_CANDIDATE_DEPLOYMENT_ID" \
            "$PRODUCTION_HOLDING_DEPLOYMENT_ID" \
            "$PRODUCTION_CANDIDATE_DEPLOYMENT_ID"; do
            [[ "$deployment_id" =~ ^dpl_[A-Za-z0-9]{8,96}$ ]]
          done
          # Markdown code spans below are intentionally literal.
          # shellcheck disable=SC2016
          {
            printf '## Kin Resolve release gate summary\n\n'
            printf -- '- Commit: `%s`\n' "$RELEASE_COMMIT"
            printf -- '- Version: `%s`\n' "$RELEASE_VERSION"
            printf -- '- Release mode: `%s`\n' "$RELEASE_MODE"
            if [[ "$RELEASE_MODE" = "api-launch" ]]; then
              printf -- '- API edge evidence SHA-256: `%s`\n' "$API_EDGE_EVIDENCE_SHA256"
              printf -- '- Ephemeral API canary evidence SHA-256: `%s`\n' "$API_CANARY_EVIDENCE_SHA256"
              printf -- '- Combined API launch receipt SHA-256: `%s`\n' "$API_LAUNCH_RECEIPT_SHA256"
            else
              printf -- '- Developer API: disabled for this release\n'
            fi
            printf -- '- Staging holding deployment: `%s`\n' "$STAGING_HOLDING_DEPLOYMENT_ID"
            printf -- '- Staging candidate deployment: `%s`\n' "$STAGING_CANDIDATE_DEPLOYMENT_ID"
            printf -- '- Production holding deployment: `%s`\n' "$PRODUCTION_HOLDING_DEPLOYMENT_ID"
            printf -- '- Production candidate deployment: `%s`\n' "$PRODUCTION_CANDIDATE_DEPLOYMENT_ID"
            printf -- '- Fence: `%s`\n' "$FENCE_ID"
            printf -- '- Gates: staging isolation, holding, candidate identity, migration ledger, authenticated browser canary, and exact restoration passed\n'
            printf -- '- Gates: production recovery, holding, candidate identity, fence, migration ledger, promotion, and anonymous candidate/canonical UI smokes passed\n'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Contain production writes before rollback
        id: contain-production-writes
        if: (failure() || cancelled()) && steps.promotion-marker.outputs.attempted == 'true'
        timeout-minutes: 5
        env:
          EXPECTED_DATABASE_IDENTITY: ${{ steps.production-release-contract.outputs.database_identity }}
          EXPECTED_FENCE_ACTIVATION_GENERATION: ${{ steps.assert-write-fence-before-deploy.outputs.activation_generation }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RELEASE_FENCE_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
          RELEASE_FENCE_ID: ${{ steps.recovery-readiness.outputs.fence_id }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_FENCE_ID" =~ ^fence-[a-z0-9][a-z0-9-]{7,63}$ ]]
          [[ "$EXPECTED_FENCE_ACTIVATION_GENERATION" =~ ^[1-9][0-9]*$ ]]
          npm run --silent release:fence:control -- contain > "$RUNNER_TEMP/contain-production-writes.json"
          jq -e --argjson expected_generation "$EXPECTED_FENCE_ACTIVATION_GENERATION" '
            .found == true and
            .fence.fenceId == env.RELEASE_FENCE_ID and
            .fence.releaseCommitSha == env.RELEASE_COMMIT and
            .fence.state == "active" and
            (
              (.transition == "already-active" and
                (.fence.activationGeneration == $expected_generation or
                 .fence.activationGeneration == ($expected_generation + 1)))
              or
              (.transition == "reacquired" and
                .fence.activationGeneration == ($expected_generation + 1))
            )
          ' "$RUNNER_TEMP/contain-production-writes.json" > /dev/null
          jq -r '"activated_at=\(.fence.activatedAt)"' \
            "$RUNNER_TEMP/contain-production-writes.json" >> "$GITHUB_OUTPUT"

      - name: Drain admitted production work before rollback
        id: drain-production-writes
        if: (failure() || cancelled()) && steps.promotion-marker.outputs.attempted == 'true' && steps.contain-production-writes.outcome == 'success'
        timeout-minutes: 40
        env:
          EXPECTED_ARCHIVE_ID: ${{ steps.production-release-contract.outputs.archive_id }}
          EXPECTED_DATABASE_IDENTITY: ${{ steps.production-release-contract.outputs.database_identity }}
          FENCE_ACTIVATED_AT: ${{ steps.contain-production-writes.outputs.activated_at }}
          RECOVERY_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
          RECOVERY_REQUIRE_STRAGGLER_PROOF: "true"
        run: |
          set -euo pipefail
          sleep 1860
          node --experimental-strip-types scripts/capture-recovery-database.mjs \
            "$RUNNER_TEMP/pre-rollback-drain.json"
          jq -e '.activeJobLeases == 0 and .unexpiredUploadIntents == 0 and .stragglerTransactions == 0' \
            "$RUNNER_TEMP/pre-rollback-drain.json" > /dev/null

      - name: Roll back the production alias to the approved holding deployment
        id: rollback
        if: (failure() || cancelled()) && steps.promotion-marker.outputs.attempted == 'true' && steps.drain-production-writes.outcome == 'success'
        timeout-minutes: 10
        env:
          APPROVED_HOLDING_DEPLOYMENT_ID: ${{ steps.production-holding.outputs.deployment_id }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel rollback "$APPROVED_HOLDING_DEPLOYMENT_ID" --yes --timeout=5m

      - name: Fetch the canonical deployment after rollback
        id: fetch-rollback
        if: always() && steps.rollback.outcome == 'success'
        env:
          APP_BASE_URL: ${{ steps.production-release-contract.outputs.app_base_url }}
          APPROVED_HOLDING_DEPLOYMENT_ID: ${{ steps.production-holding.outputs.deployment_id }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          deployment_host="${APP_BASE_URL#https://}"
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          for attempt in $(seq 1 20); do
            rm -f "$RUNNER_TEMP/production-rollback.json"
            if curl --connect-timeout 10 --max-time 30 --fail --silent --show-error \
                --header "Authorization: Bearer $VERCEL_TOKEN" \
                "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
                --output "$RUNNER_TEMP/production-rollback.json" \
              && GITHUB_OUTPUT="$RUNNER_TEMP/rollback-poll-output" \
                node --experimental-strip-types scripts/validate-vercel-deployment.mjs holding \
                  "$RUNNER_TEMP/production-rollback.json" \
                  "${APP_BASE_URL#https://}" >/dev/null 2>&1; then
              exit 0
            fi
            if [[ "$attempt" = 20 ]]; then
              echo "Canonical alias did not converge to the holding deployment before the deadline." >&2
              exit 1
            fi
            sleep 3
          done

      - name: Verify the holding deployment after rollback
        id: verify-rollback
        if: always() && steps.fetch-rollback.outcome == 'success'
        env:
          APP_BASE_URL: ${{ steps.production-release-contract.outputs.app_base_url }}
          APPROVED_HOLDING_DEPLOYMENT_ID: ${{ steps.production-holding.outputs.deployment_id }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: node --experimental-strip-types scripts/validate-vercel-deployment.mjs holding "$RUNNER_TEMP/production-rollback.json" "${APP_BASE_URL#https://}"

      - name: Prove rollback left production domain auto-assignment disabled
        if: always() && steps.verify-rollback.outcome == 'success'
        env:
          EXPECTED_VERCEL_PROJECT_PAUSED: "false"
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          curl --connect-timeout 10 --max-time 30 --retry 3 --retry-all-errors \
            --fail --silent --show-error \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID$scope_query" \
            --output "$RUNNER_TEMP/production-project-after-rollback.json"
          node --experimental-strip-types scripts/validate-vercel-project-safety.mjs \
            "$RUNNER_TEMP/production-project-after-rollback.json"

      - name: Record mandatory provider cron verification after rollback
        if: always() && steps.verify-rollback.outcome == 'success'
        run: |
          {
            printf '## Production rollback follow-up\n\n'
            printf -- '- Canonical traffic is on the approved zero-runtime holding deployment.\n'
            printf -- '- The durable production write fence remains active.\n'
            printf -- '- Required: verify or disable both schedules in the Vercel Cron Jobs dashboard before resuming service.\n'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Remove sanitized API launch receipt material on every outcome
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/production-api-canary-evidence.json"
          rm -rf "$RUNNER_TEMP/api-launch-release-receipt"

      - name: Remove pulled production environment material
        if: always()
        run: |
          set -euo pipefail
          test ! -e "$RUNNER_TEMP/production-api-canary.token"
          test ! -e "$RUNNER_TEMP/production-api-canary-metadata.json"
          test ! -e "$RUNNER_TEMP/production-api-canary-evidence.json"
          test ! -e "$RUNNER_TEMP/api-launch-release-receipt"
          rm -f .vercel/.env.production.local
          rm -f "$RUNNER_TEMP/production-environment.json"
          rm -f "$RUNNER_TEMP/production-runtime-database-role.json"
          rm -f "$RUNNER_TEMP/production-beta-operations-runtime-grants.json"
          rm -f "$RUNNER_TEMP/api-edge-run.json"
          rm -f "$RUNNER_TEMP/api-edge-active-before-promotion.json"
          rm -f "$RUNNER_TEMP/api-edge-bypasses-before-promotion.json"
          rm -f "$RUNNER_TEMP/api-edge-active-after-promotion.json"
          rm -f "$RUNNER_TEMP/api-edge-bypasses-after-promotion.json"
          rm -rf "$RUNNER_TEMP/api-edge-evidence"
          rm -rf .vercel/output

  marketing:
    name: Publish the evidence-bound marketing intake mode
    needs: production
    if: ${{ inputs.release_target == 'production' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      contents: read
    env:
      KINRESOLVE_MARKETING_DEMO_MODE: ${{ vars.KINRESOLVE_MARKETING_DEMO_MODE || 'pending' }}
      KINRESOLVE_MARKETING_RELEASE_MODE: ${{ inputs.release_mode }}
      KINRESOLVE_MARKETING_SOURCE_COMMIT_SHA: ${{ inputs.release_commit }}
    defaults:
      run:
        working-directory: site
    steps:
      - name: Check out the exact live candidate
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.release_commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Require product and mail proof before application-mode marketing
        env:
          BETA_INTAKE_ENABLED: ${{ inputs.beta_intake_enabled }}
          BETA_INTAKE_PROVEN: ${{ needs.production.outputs.beta_intake_proven }}
          STAGING_BETA_INTAKE_PROVEN: ${{ needs.production.outputs.staging_beta_intake_proven }}
        run: |
          set -euo pipefail
          if [[ "$BETA_INTAKE_ENABLED" = "true" ]]; then
            test "$BETA_INTAKE_PROVEN" = "true"
            test "$STAGING_BETA_INTAKE_PROVEN" = "true"
          else
            test "$BETA_INTAKE_ENABLED" = "false"
            test -z "$BETA_INTAKE_PROVEN"
          fi

      - name: Set up the marketing Node.js runtime
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            site/package-lock.json

      - name: Install launch-media validator dependencies
        working-directory: .
        run: npm ci

      - name: Install marketing dependencies
        run: npm ci

      - name: Validate the committed synthetic launch media
        working-directory: .
        run: npm run launch:media:validate

      - name: Prove both static intake exports before loading deploy credentials
        run: |
          set -euo pipefail
          [[ "$KINRESOLVE_MARKETING_DEMO_MODE" =~ ^(pending|live)$ ]]
          rm -rf .next out
          KINRESOLVE_MARKETING_BETA_APPLICATION_MODE=mailto npm run verify
          rm -rf .next out
          KINRESOLVE_MARKETING_BETA_APPLICATION_MODE=application npm run verify
          rm -rf .next out

      - name: Install the pinned marketing Vercel CLI before loading deploy credentials
        run: npm install --global --ignore-scripts vercel@56.1.0

      - name: Validate the protected marketing deployment identity
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.MARKETING_VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          [[ "$VERCEL_ORG_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          [[ "$VERCEL_PROJECT_ID" =~ ^[A-Za-z0-9_]{4,128}$ ]]
          test -n "$VERCEL_TOKEN"

      - name: Pull the protected marketing production settings
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.MARKETING_VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production

      - name: Build the selected evidence-bound marketing mode
        env:
          KINRESOLVE_MARKETING_BETA_APPLICATION_MODE: ${{ inputs.beta_intake_enabled && 'application' || 'mailto' }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.MARKETING_VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod

      - name: Publish the selected marketing mode
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.MARKETING_VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt --prod --yes

      - name: Prove the canonical marketing release, form, and demo modes
        timeout-minutes: 5
        env:
          EXPECTED_MARKETING_DEMO_MODE: ${{ vars.KINRESOLVE_MARKETING_DEMO_MODE || 'pending' }}
          EXPECTED_MARKETING_MODE: ${{ inputs.beta_intake_enabled && 'application' || 'mailto' }}
          EXPECTED_MARKETING_RELEASE_MODE: ${{ inputs.release_mode }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 20); do
            if curl --connect-timeout 10 --max-time 30 --fail --silent --show-error \
                https://kinresolve.com/beta/ --output "$RUNNER_TEMP/marketing-beta.html" \
              && curl --connect-timeout 10 --max-time 30 --fail --silent --show-error \
                https://kinresolve.com/ --output "$RUNNER_TEMP/marketing-home.html" \
              && EXPECTED_MARKETING_MODE="$EXPECTED_MARKETING_MODE" \
                EXPECTED_MARKETING_RELEASE_MODE="$EXPECTED_MARKETING_RELEASE_MODE" \
                EXPECTED_MARKETING_DEMO_MODE="$EXPECTED_MARKETING_DEMO_MODE" \
                HTML_FILE="$RUNNER_TEMP/marketing-beta.html" \
                HOME_HTML_FILE="$RUNNER_TEMP/marketing-home.html" node --input-type=module <<'NODE'
          import { readFile } from "node:fs/promises";
          const html = await readFile(process.env.HTML_FILE, "utf8");
          const application = html.includes('action="https://app.kinresolve.com/api/public/beta-applications"')
            && html.includes('enctype="application/x-www-form-urlencoded"')
            && html.includes('method="post"');
          const mailto = html.includes('action="mailto:beta@kinresolve.com');
          if ((process.env.EXPECTED_MARKETING_MODE === "application" && (!application || mailto))
            || (process.env.EXPECTED_MARKETING_MODE === "mailto" && (!mailto || application))) process.exit(1);
          const releaseClaims = {
            application: [
              "Hosted private beta is live.",
              "Access is invitation-only for approved participants; the hosted API is not available in this release."
            ],
            "api-launch": [
              "Hosted private beta and API v1 are live.",
              "Access remains invitation-only; API v1 is available only to approved participants for archives they own."
            ]
          };
          const expectedReleaseMode = process.env.EXPECTED_MARKETING_RELEASE_MODE;
          const expectedClaims = releaseClaims[expectedReleaseMode];
          if (!expectedClaims
            || !html.includes(`data-marketing-release-mode="${expectedReleaseMode}"`)
            || expectedClaims.some((claim) => !html.includes(claim))) process.exit(1);
          const home = await readFile(process.env.HOME_HTML_FILE, "utf8");
          const demoHeroCta = "Solve the passenger mystery";
          const expectedDemoMode = process.env.EXPECTED_MARKETING_DEMO_MODE;
          if (expectedDemoMode !== "pending" && expectedDemoMode !== "live") process.exit(1);
          if ((expectedDemoMode === "live") !== home.includes(demoHeroCta)) process.exit(1);
          NODE
            then
              rm -f "$RUNNER_TEMP/marketing-beta.html" "$RUNNER_TEMP/marketing-home.html"
              exit 0
            fi
            if [[ "$attempt" = 20 ]]; then exit 1; fi
            sleep 3
          done

      - name: Remove local marketing deployment material
        if: always()
        run: |
          rm -rf .vercel .next out
          rm -f "$RUNNER_TEMP/marketing-beta.html" "$RUNNER_TEMP/marketing-home.html"

  publish-release:
    name: Publish stable GitHub release
    needs: [production, marketing]
    if: ${{ inputs.release_target == 'production' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    permissions:
      actions: read
      contents: write
    steps:
      - name: Check out the exact live candidate
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.release_commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js for the publication safety gate
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Recheck the safety queue for this publication attempt
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SAFETY_CURRENT_WORKFLOW: release
        run: node --experimental-strip-types scripts/validate-release-safety-queue.mjs

      - name: Download the sanitized API launch release receipt
        if: inputs.release_mode == 'api-launch'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: production-api-launch-release-receipt-${{ needs.production.outputs.release_workflow_run_attempt }}
          path: ${{ runner.temp }}/api-launch-release-receipt

      - name: Validate the exact API launch release receipt before publication
        if: inputs.release_mode == 'api-launch'
        env:
          API_CANARY_EVIDENCE_SHA256: ${{ needs.production.outputs.api_canary_evidence_sha256 }}
          API_EDGE_EVIDENCE_SHA256: ${{ inputs.api_edge_evidence_sha256 }}
          API_EDGE_RUN_ATTEMPT: ${{ needs.production.outputs.api_edge_run_attempt }}
          API_EDGE_RUN_ID: ${{ inputs.api_edge_run_id }}
          API_LAUNCH_RECEIPT_SHA256: ${{ needs.production.outputs.api_launch_receipt_sha256 }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          RELEASE_WORKFLOW_RUN_ATTEMPT: ${{ needs.production.outputs.release_workflow_run_attempt }}
          RELEASE_WORKFLOW_RUN_ID: ${{ github.run_id }}
        run: >-
          node --experimental-strip-types scripts/api-launch-release-receipt.mjs validate
          "$RUNNER_TEMP/api-launch-release-receipt/kinresolve-api-launch-receipt.json"

      - name: Revalidate the live canonical candidate before publication
        env:
          APP_BASE_URL: ${{ needs.production.outputs.app_base_url }}
          CANDIDATE_DEPLOYMENT_ID: ${{ needs.production.outputs.candidate_deployment_id }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          deployment_host="${APP_BASE_URL#https://}"
          [[ "$deployment_host" =~ ^[A-Za-z0-9.-]{4,253}$ ]]
          scope_query=""
          if [[ "$VERCEL_ORG_ID" == team_* ]]; then scope_query="?teamId=$VERCEL_ORG_ID"; fi
          for attempt in $(seq 1 10); do
            if curl --connect-timeout 10 --max-time 30 --fail --silent --show-error \
                --header "Authorization: Bearer $VERCEL_TOKEN" \
                "https://api.vercel.com/v13/deployments/$deployment_host$scope_query" \
                --output "$RUNNER_TEMP/production-publication.json" \
              && GITHUB_OUTPUT="$RUNNER_TEMP/publication-poll-output" \
                node --experimental-strip-types scripts/validate-vercel-deployment.mjs promoted \
                  "$RUNNER_TEMP/production-publication.json" \
                  "${APP_BASE_URL#https://}" >/dev/null 2>&1; then
              exit 0
            fi
            if [[ "$attempt" = 10 ]]; then
              echo "Canonical alias no longer resolves to the promoted candidate." >&2
              exit 1
            fi
            sleep 3
          done

      - name: Prepare or verify the exact run-owned draft release
        id: release-draft
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RELEASE_MODE: ${{ inputs.release_mode }}
          RELEASE_TAG: ${{ format('v{0}', inputs.release_version) }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          RELEASE_WORKFLOW_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          before="$RUNNER_TEMP/release-namespace-before-draft.json"
          gh api --paginate --slurp "repos/$GH_REPO/releases?per_page=100" > "$before"
          remote_tag_sha="$(git ls-remote --tags origin "refs/tags/$RELEASE_TAG" \
            | awk 'NR == 1 { print $1 }')"
          namespace="$(node --experimental-strip-types scripts/github-release-namespace.mjs \
            publication "$before" "${remote_tag_sha:-absent}")"
          state="$(jq -er '.state' <<< "$namespace")"
          case "$state" in
            vacant)
              owner_marker="$(node --experimental-strip-types \
                scripts/github-release-namespace.mjs owner-marker)"
              if ! gh release create "$RELEASE_TAG" --repo "$GH_REPO" --draft \
                --target "$RELEASE_COMMIT" --title "Kin Resolve v$RELEASE_VERSION" \
                --generate-notes --notes "$owner_marker"; then
                echo "Draft creation did not confirm; validating provider state." >&2
              fi
              ;;
            draft|published) ;;
            *) exit 1 ;;
          esac

          current="$RUNNER_TEMP/release-namespace-after-draft.json"
          gh api --paginate --slurp "repos/$GH_REPO/releases?per_page=100" > "$current"
          remote_tag_sha="$(git ls-remote --tags origin "refs/tags/$RELEASE_TAG" \
            | awk 'NR == 1 { print $1 }')"
          namespace="$(node --experimental-strip-types scripts/github-release-namespace.mjs \
            publication "$current" "${remote_tag_sha:-absent}")"
          state="$(jq -er '.state | select(. == "draft" or . == "published")' <<< "$namespace")"
          release_database_id="$(jq -er '.releaseDatabaseId | select(type == "number" and . > 0)' \
            <<< "$namespace")"
          printf 'release_database_id=%s\n' "$release_database_id" >> "$GITHUB_OUTPUT"
          printf 'release_state=%s\n' "$state" >> "$GITHUB_OUTPUT"

      - name: Attach or verify the API launch receipt and exact release-notes marker
        if: inputs.release_mode == 'api-launch' && steps.release-draft.outputs.release_state == 'draft'
        env:
          API_CANARY_EVIDENCE_SHA256: ${{ needs.production.outputs.api_canary_evidence_sha256 }}
          API_EDGE_EVIDENCE_SHA256: ${{ inputs.api_edge_evidence_sha256 }}
          API_EDGE_RUN_ATTEMPT: ${{ needs.production.outputs.api_edge_run_attempt }}
          API_EDGE_RUN_ID: ${{ inputs.api_edge_run_id }}
          API_LAUNCH_RECEIPT_SHA256: ${{ needs.production.outputs.api_launch_receipt_sha256 }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RELEASE_DATABASE_ID: ${{ steps.release-draft.outputs.release_database_id }}
          RELEASE_MODE: ${{ inputs.release_mode }}
          RELEASE_TAG: ${{ format('v{0}', inputs.release_version) }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          RELEASE_WORKFLOW_RUN_ATTEMPT: ${{ needs.production.outputs.release_workflow_run_attempt }}
          RELEASE_WORKFLOW_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_DATABASE_ID" =~ ^[1-9][0-9]{0,19}$ ]]
          assert_owned_draft() {
            gh api "repos/$GH_REPO/releases/$RELEASE_DATABASE_ID" \
              > "$RUNNER_TEMP/current-owned-release.json"
            jq -s '.' "$RUNNER_TEMP/current-owned-release.json" \
              > "$RUNNER_TEMP/current-owned-release-list.json"
            remote_tag_sha="$(git ls-remote --tags origin "refs/tags/$RELEASE_TAG" \
              | awk 'NR == 1 { print $1 }')"
            namespace="$(node --experimental-strip-types scripts/github-release-namespace.mjs \
              draft "$RUNNER_TEMP/current-owned-release-list.json" "${remote_tag_sha:-absent}")"
            test "$(jq -er '.releaseDatabaseId' <<< "$namespace")" = "$RELEASE_DATABASE_ID"
          }

          assert_owned_draft
          receipt="$RUNNER_TEMP/api-launch-release-receipt/kinresolve-api-launch-receipt.json"
          marker="$RUNNER_TEMP/api-launch-release-marker.md"
          node --experimental-strip-types scripts/api-launch-release-receipt.mjs marker \
            "$receipt" "$marker"

          asset_name="$(node --experimental-strip-types scripts/api-launch-release-receipt.mjs asset-name \
            "$receipt")"
          [[ "$asset_name" =~ ^kinresolve-api-launch-receipt-run-[1-9][0-9]*-attempt-[1-9][0-9]*\.json$ ]]
          release_asset="$RUNNER_TEMP/$asset_name"
          install -m 600 "$receipt" "$release_asset"
          asset_count="$(jq -r --arg asset_name "$asset_name" \
            '[.assets[] | select(.name == $asset_name)] | length' \
            "$RUNNER_TEMP/current-owned-release.json")"
          case "$asset_count" in
            0)
              assert_owned_draft
              gh release upload "$RELEASE_TAG" "$release_asset" --repo "$GH_REPO"
              ;;
            1) ;;
            *) exit 1 ;;
          esac

          assert_owned_draft
          asset_count="$(jq -r --arg asset_name "$asset_name" \
            '[.assets[] | select(.name == $asset_name)] | length' \
            "$RUNNER_TEMP/current-owned-release.json")"
          test "$asset_count" = "1"
          asset_id="$(jq -er --arg asset_name "$asset_name" \
            '.assets[] | select(.name == $asset_name) | .id \
              | select(type == "number" and . > 0)' \
            "$RUNNER_TEMP/current-owned-release.json")"
          verify_directory="$RUNNER_TEMP/verified-api-launch-receipt"
          install -d -m 700 "$verify_directory"
          verified_receipt="$verify_directory/$asset_name"
          gh api --header "Accept: application/octet-stream" \
            "repos/$GH_REPO/releases/assets/$asset_id" > "$verified_receipt"
          chmod 600 "$verified_receipt"
          verified_sha256="$(sha256sum "$verified_receipt" | awk '{ print $1 }')"
          test "$verified_sha256" = "$API_LAUNCH_RECEIPT_SHA256"
          node --experimental-strip-types scripts/api-launch-release-receipt.mjs validate \
            "$verified_receipt"

          body="$RUNNER_TEMP/release-body.md"
          jq -er '.body // ""' "$RUNNER_TEMP/current-owned-release.json" > "$body"
          marker_state="$(node --experimental-strip-types \
            scripts/api-launch-release-receipt.mjs notes-state "$body" "$marker")"
          if [[ "$marker_state" = "absent" ]]; then
            updated_body="$RUNNER_TEMP/release-body-with-api-launch.md"
            cp "$body" "$updated_body"
            if [[ -s "$updated_body" ]]; then printf '\n\n' >> "$updated_body"; fi
            cat "$marker" >> "$updated_body"
            assert_owned_draft
            jq -n --rawfile body "$updated_body" '{body: $body}' \
              > "$RUNNER_TEMP/release-notes-patch.json"
            gh api --method PATCH "repos/$GH_REPO/releases/$RELEASE_DATABASE_ID" \
              --input "$RUNNER_TEMP/release-notes-patch.json" > /dev/null
          else
            test "$marker_state" = "present"
          fi

          assert_owned_draft
          jq -er '.body // ""' "$RUNNER_TEMP/current-owned-release.json" \
            > "$RUNNER_TEMP/final-release-body.md"
          node --experimental-strip-types scripts/api-launch-release-receipt.mjs notes-verify \
            "$RUNNER_TEMP/final-release-body.md" "$marker"

      - name: Publish the evidence-complete draft as the stable GitHub release
        env:
          API_CANARY_EVIDENCE_SHA256: ${{ needs.production.outputs.api_canary_evidence_sha256 }}
          API_EDGE_EVIDENCE_SHA256: ${{ inputs.api_edge_evidence_sha256 }}
          API_EDGE_RUN_ATTEMPT: ${{ needs.production.outputs.api_edge_run_attempt }}
          API_EDGE_RUN_ID: ${{ inputs.api_edge_run_id }}
          API_LAUNCH_RECEIPT_SHA256: ${{ needs.production.outputs.api_launch_receipt_sha256 }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_COMMIT: ${{ inputs.release_commit }}
          RELEASE_DATABASE_ID: ${{ steps.release-draft.outputs.release_database_id }}
          RELEASE_MODE: ${{ inputs.release_mode }}
          RELEASE_TAG: ${{ format('v{0}', inputs.release_version) }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          RELEASE_WORKFLOW_RUN_ATTEMPT: ${{ needs.production.outputs.release_workflow_run_attempt }}
          RELEASE_WORKFLOW_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_DATABASE_ID" =~ ^[1-9][0-9]{0,19}$ ]]
          assert_owned_release() {
            gh api "repos/$GH_REPO/releases/$RELEASE_DATABASE_ID" \
              > "$RUNNER_TEMP/publication-owned-release.json"
            jq -s '.' "$RUNNER_TEMP/publication-owned-release.json" \
              > "$RUNNER_TEMP/publication-owned-release-list.json"
            remote_tag_sha="$(git ls-remote --tags origin "refs/tags/$RELEASE_TAG" \
              | awk 'NR == 1 { print $1 }')"
            namespace="$(node --experimental-strip-types scripts/github-release-namespace.mjs \
              publication "$RUNNER_TEMP/publication-owned-release-list.json" \
              "${remote_tag_sha:-absent}")"
            release_state="$(jq -er '.state | select(. == "draft" or . == "published")' \
              <<< "$namespace")"
            test "$(jq -er '.releaseDatabaseId' <<< "$namespace")" = "$RELEASE_DATABASE_ID"
          }
          verify_current_api_receipt() {
            receipt="$RUNNER_TEMP/api-launch-release-receipt/kinresolve-api-launch-receipt.json"
            marker="$RUNNER_TEMP/api-launch-publication-marker.md"
            node --experimental-strip-types scripts/api-launch-release-receipt.mjs marker \
              "$receipt" "$marker"
            asset_name="$(node --experimental-strip-types \
              scripts/api-launch-release-receipt.mjs asset-name "$receipt")"
            asset_count="$(jq -r --arg asset_name "$asset_name" \
              '[.assets[] | select(.name == $asset_name)] | length' \
              "$RUNNER_TEMP/publication-owned-release.json")"
            test "$asset_count" = "1"
            asset_id="$(jq -er --arg asset_name "$asset_name" \
              '.assets[] | select(.name == $asset_name) | .id \
                | select(type == "number" and . > 0)' \
              "$RUNNER_TEMP/publication-owned-release.json")"
            verify_directory="$RUNNER_TEMP/publication-api-launch-receipt"
            rm -rf "$verify_directory"
            install -d -m 700 "$verify_directory"
            verified_receipt="$verify_directory/$asset_name"
            gh api --header "Accept: application/octet-stream" \
              "repos/$GH_REPO/releases/assets/$asset_id" > "$verified_receipt"
            chmod 600 "$verified_receipt"
            test "$(sha256sum "$verified_receipt" | awk '{ print $1 }')" \
              = "$API_LAUNCH_RECEIPT_SHA256"
            node --experimental-strip-types scripts/api-launch-release-receipt.mjs validate \
              "$verified_receipt"
            jq -er '.body // ""' "$RUNNER_TEMP/publication-owned-release.json" \
              > "$RUNNER_TEMP/publication-release-body.md"
            node --experimental-strip-types scripts/api-launch-release-receipt.mjs notes-verify \
              "$RUNNER_TEMP/publication-release-body.md" "$marker"
          }

          assert_owned_release
          if [[ "$RELEASE_MODE" = "api-launch" ]]; then verify_current_api_receipt; fi
          if [[ "$release_state" = "draft" ]]; then
            jq -n '{draft: false, prerelease: false, make_latest: "true"}' \
              > "$RUNNER_TEMP/publish-release-patch.json"
            if ! gh api --method PATCH "repos/$GH_REPO/releases/$RELEASE_DATABASE_ID" \
              --input "$RUNNER_TEMP/publish-release-patch.json" > /dev/null; then
              echo "Stable publication did not confirm; validating provider state." >&2
            fi
          else
            test "$release_state" = "published"
          fi

          gh api "repos/$GH_REPO/releases/$RELEASE_DATABASE_ID" \
            > "$RUNNER_TEMP/published-owned-release.json"
          jq -s '.' "$RUNNER_TEMP/published-owned-release.json" \
            > "$RUNNER_TEMP/published-owned-release-list.json"
          final_tag_sha="$(git ls-remote --tags origin "refs/tags/$RELEASE_TAG" \
            | awk 'NR == 1 { print $1 }')"
          namespace="$(node --experimental-strip-types scripts/github-release-namespace.mjs \
            published "$RUNNER_TEMP/published-owned-release-list.json" \
            "${final_tag_sha:-absent}")"
          test "$(jq -er '.releaseDatabaseId' <<< "$namespace")" = "$RELEASE_DATABASE_ID"
          gh api "repos/$GH_REPO/releases/latest" > "$RUNNER_TEMP/latest-release.json"
          test "$(jq -er '.id | select(type == "number" and . > 0)' \
            "$RUNNER_TEMP/latest-release.json")" = "$RELEASE_DATABASE_ID"
          cp "$RUNNER_TEMP/published-owned-release.json" \
            "$RUNNER_TEMP/publication-owned-release.json"
          if [[ "$RELEASE_MODE" = "api-launch" ]]; then verify_current_api_receipt; fi
