name: Deploy stable release to Vercel

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: vercel-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.release.prerelease == false
    runs-on: ubuntu-latest
    environment: production
    services:
      postgres:
        image: pgvector/pgvector:0.8.1-pg16@sha256:33198da2828a14c30348d2ccb4750833d5ed9a44c88d840a0e523d7417120337
        env:
          POSTGRES_DB: kinresolve_release_test
          POSTGRES_USER: kinresolve_ci
          POSTGRES_PASSWORD: kinresolve_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kinresolve_ci -d kinresolve_release_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}

    steps:
      - name: Check out the released revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Fetch protected main and the release tag
        run: |
          git fetch origin main:refs/remotes/origin/main --no-tags
          git fetch origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}" --force --no-tags

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify release provenance before running repository code
        run: |
          release_commit="$(git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}")"
          checked_out_commit="$(git rev-parse --verify 'HEAD^{commit}')"
          test "$release_commit" = "$checked_out_commit"
          git merge-base --is-ancestor "$release_commit" origin/main
          package_version="$(node -e '
            const { readFileSync } = require("node:fs");
            const value = JSON.parse(readFileSync("package.json", "utf8")).version;
            if (typeof value !== "string" || value.length === 0) process.exit(1);
            process.stdout.write(value);
          ')"
          test "$RELEASE_TAG" = "v$package_version"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit and contract tests
        run: npm test

      - name: Verify immutable migrations
        run: npm run migrations:verify

      - name: Test complete Postgres persistence
        env:
          TEST_DATABASE_URL: postgres://kinresolve_ci:kinresolve_ci@localhost:5432/kinresolve_release_test
        run: npm run test:db

      - name: Rehearse the latest stable database upgrade
        env:
          TEST_RELEASE_UPGRADE_DATABASE_URL: postgres://kinresolve_ci:kinresolve_ci@localhost:5432/postgres
        run: npm run test:release-upgrade

      - name: Test large GEDCOM persistence
        env:
          TEST_DATABASE_URL: postgres://kinresolve_ci:kinresolve_ci@localhost:5432/kinresolve_release_test
        run: npm run test:db:large

      - name: Build application
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Pull Vercel production settings
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx --yes vercel@56.1.0 pull --yes --environment=production

      - name: Verify stable release and production settings
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          test -s .vercel/.env.production.local
          node --experimental-strip-types scripts/validate-release-contract.mjs

      - name: Build production artifact
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx --yes vercel@56.1.0 build --prod

      - name: Deploy production artifact
        id: deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          deployment_url="$(npx --yes vercel@56.1.0 deploy --prebuilt --prod --yes)"
          DEPLOYMENT_URL="$deployment_url" node -e '
            const url = new URL(process.env.DEPLOYMENT_URL);
            if (url.protocol !== "https:" || url.origin !== process.env.DEPLOYMENT_URL) {
              throw new Error("Vercel did not emit one HTTPS deployment origin.");
            }
          '
          printf 'url=%s\n' "$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Verify deployed health and login redirect
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
        run: |
          health_status="$(curl --retry 10 --retry-delay 3 --retry-all-errors --fail-with-body --max-time 20 --silent --show-error --output "$RUNNER_TEMP/health.json" --write-out '%{http_code}' "$DEPLOYMENT_URL/api/health")"
          test "$health_status" = "200"
          node -e '
            const { readFileSync } = require("node:fs");
            const { join } = require("node:path");
            const health = JSON.parse(readFileSync(join(process.env.RUNNER_TEMP, "health.json"), "utf8"));
            const expectedVersion = process.env.RELEASE_TAG.replace(/^v/, "");
            if (
              health.status !== "ok" ||
              health.database?.connected !== true ||
              health.storage?.configured !== true ||
              health.version !== expectedVersion
            ) {
              throw new Error("Deployment health did not match the released, connected application.");
            }
          '

          app_status="$(curl --max-time 20 --silent --show-error --dump-header "$RUNNER_TEMP/app-headers.txt" --output /dev/null --write-out '%{http_code}' "$DEPLOYMENT_URL/app")"
          case "$app_status" in
            302|303|307|308) ;;
            *) echo "Expected /app to redirect to login, got HTTP $app_status" >&2; exit 1 ;;
          esac
          app_location="$(awk 'tolower($1) == "location:" { print $2 }' "$RUNNER_TEMP/app-headers.txt" | tr -d '\r')"
          APP_LOCATION="$app_location" node --experimental-strip-types scripts/validate-deployment-redirect.mjs

          printf 'Production deployment: %s\n' "$DEPLOYMENT_URL" >> "$GITHUB_STEP_SUMMARY"
