name: Set up Node.js and install npm dependencies
description: >-
  Pinned Node.js setup with npm caching followed by a clean dependency
  install from the repository root. Jobs that must run gates between
  Node.js setup and installation keep inline steps instead of this action.

inputs:
  node-version:
    description: Node.js version to install.
    required: false
    default: "22"
  cache-dependency-path:
    description: Lockfile path(s) used to key the npm cache.
    required: false
    default: package-lock.json
  install:
    description: Whether to run npm ci from the repository root after setup.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: ${{ inputs.cache-dependency-path }}

    - name: Install dependencies
      if: ${{ inputs.install == 'true' }}
      shell: bash
      run: npm ci
